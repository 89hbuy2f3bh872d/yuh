services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  casino:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    volumes:
      - ./config.json:/app/config.json:ro
    environment:
      - NODE_ENV=production

volumes:
  mongo_data:
