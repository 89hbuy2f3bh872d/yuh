<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Servers — SirGreen Casino</title>
<link rel="stylesheet" href="/assets/css/app.css">
<style>
.srv-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.85rem;align-items:start}
.svc{background:linear-gradient(180deg,var(--surface),color-mix(in srgb,var(--surface) 94%,#000));border:1px solid var(--border);border-radius:14px;padding:.85rem .85rem .7rem;display:flex;flex-direction:column;gap:.65rem;box-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 8px 24px -16px rgba(0,0,0,.6);transition:border-color .15s,box-shadow .2s}
.svc:hover{border-color:color-mix(in srgb,var(--accent) 35%,var(--border));box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 12px 30px -16px rgba(0,0,0,.7)}
.svc-head{display:flex;align-items:center;gap:.6rem}
.svc-av{width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:800;font-size:1rem;flex:none}
.svc-h-meta{min-width:0;flex:1}
.svc-name{font-weight:700;font-size:.94rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.3rem}
.svc-verified{display:inline-flex;color:#3b9dff;flex:none}
.svc-verified .icon{width:15px;height:15px;stroke-width:2.4}
.svc-sub{font-size:.64rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* compact stat strip: two rows of 3 inline tiles */
.svc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.35rem}
.svc-st{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.35rem .45rem}
.svc-st .n{font-size:.82rem;font-weight:700;line-height:1.1;font-variant-numeric:tabular-nums}
.svc-st .k{font-size:.54rem;text-transform:uppercase;letter-spacing:.03em;color:var(--text3);margin-top:.05rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* bank + tax on one compact row */
.svc-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.svc-bank{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.45rem .65rem;display:flex;align-items:center;justify-content:space-between;flex:1;min-width:0}
.svc-bank .lbl{font-size:.56rem;text-transform:uppercase;letter-spacing:.04em;color:var(--text3)}
.svc-bank .val{font-size:1.2rem;font-weight:800;color:var(--gold);line-height:1.1;font-variant-numeric:tabular-nums}
.svc-bank .val small{font-size:.62rem;color:var(--text3);font-weight:600;margin-left:.15rem}
.svc-tax{display:inline-flex;align-items:center;gap:.35rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.32rem .5rem;font-size:.68rem;color:var(--text2);white-space:nowrap}
.svc-tax .t-val{font-weight:800;color:var(--text)}
/* horizontal icon action bar — replaces the 7 stacked full-width buttons */
.svc-actions{display:flex;flex-wrap:wrap;gap:.3rem;border-top:1px solid var(--border);padding-top:.55rem;margin-top:.1rem}
.svc-act{display:inline-flex;align-items:center;gap:.32rem;height:30px;padding:0 .55rem;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:.66rem;font-weight:700;cursor:pointer;transition:transform .1s,border-color .15s,color .15s,background .15s;white-space:nowrap}
.svc-act .icon{width:14px;height:14px;flex:none}
.svc-act:hover{transform:translateY(-1px);border-color:var(--accent);color:var(--accent);background:var(--surface3,var(--surface2))}
.svc-act:active{transform:translateY(0) scale(.97)}
.svc-act.gold:hover{border-color:var(--gold);color:var(--gold)}
.svc-act.blue:hover{border-color:#3b9dff;color:#3b9dff}
.svc-act.danger:hover{border-color:var(--red,#ef4444);color:var(--red,#ef4444)}
.svc-act.primary{background:color-mix(in srgb,var(--accent) 16%,transparent);border-color:color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent)}
.svc-act.primary:hover{background:color-mix(in srgb,var(--accent) 24%,transparent)}
.svc.feat{border-color:color-mix(in srgb,var(--gold) 35%,var(--border));box-shadow:0 0 0 1px color-mix(in srgb,var(--gold) 20%,transparent) inset,0 8px 24px -16px rgba(0,0,0,.6)}
.svc-perks{display:flex;flex-wrap:wrap;gap:.3rem}
.svc-perk{font-size:.58rem;font-weight:700;border-radius:99px;padding:.12rem .42rem;border:1px solid transparent}
.svc-perk.gold{color:var(--gold);background:color-mix(in srgb,var(--gold) 12%,transparent);border-color:color-mix(in srgb,var(--gold) 30%,transparent)}
.svc-perk.green{color:var(--accent);background:var(--accent-soft);border-color:color-mix(in srgb,var(--accent) 30%,transparent)}
.shop-dlg{width:min(440px,94vw)}
.shop-items{display:flex;flex-direction:column;gap:.55rem;margin:.3rem 0 .2rem}
.shop-it{display:flex;align-items:flex-start;gap:.65rem;background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:.6rem .7rem}
.shop-ic{flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
.shop-ic .icon{width:18px;height:18px}
.shop-info{flex:1;min-width:0}
.shop-name{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
.shop-desc{font-size:.66rem;color:var(--text3);line-height:1.4;margin-top:.15rem}
.shop-act{display:flex;flex-direction:column;align-items:flex-end;gap:.35rem;flex:none}
.shop-color{width:34px;height:26px;border:1px solid var(--border);border-radius:6px;background:var(--surface);padding:0;cursor:pointer}
.shop-owned{font-size:.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--accent);background:var(--accent-soft);border-radius:99px;padding:.05rem .35rem}
/* server-case editor */
.case-list{display:flex;flex-direction:column;gap:.5rem;margin:.3rem 0 .2rem;max-height:46vh;overflow:auto}
.case-empty{font-size:.74rem;color:var(--text3);text-align:center;padding:.8rem}
.case-it{display:flex;align-items:center;gap:.6rem;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:.5rem .6rem}
.case-ic{flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:1.1rem;background:var(--surface)}
.case-info{flex:1;min-width:0}
.case-name{font-size:.82rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.case-sub{font-size:.64rem;color:var(--text3)}
.case-act{display:flex;gap:.3rem;flex:none}
.case-f-grid{display:grid;grid-template-columns:auto 1fr;gap:.45rem .6rem;align-items:center;margin:.2rem 0 .6rem}
.case-f-grid input{padding:.4rem .55rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.82rem}
.case-f-grid input[type=color]{padding:0;width:46px;height:30px;justify-self:start}
.case-items-h{display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:var(--text3);margin-bottom:.3rem}
.case-rtp{font-weight:800;color:var(--accent)}
.case-rtp.bad{color:var(--red,#ef4444)}
.case-items{display:flex;flex-direction:column;gap:.35rem;max-height:34vh;overflow:auto}
.case-row{display:grid;grid-template-columns:48px 1fr 80px 70px 26px;gap:.3rem;align-items:center}
.case-row .ci{padding:.35rem .4rem;border:1px solid var(--border);border-radius:7px;background:var(--surface2);color:var(--text);font-size:.76rem;min-width:0}
.case-rm{display:grid;place-items:center;color:var(--text3);background:transparent;border-radius:6px;height:30px}
.case-rm:hover{color:var(--red,#ef4444);background:var(--surface)}
@media(max-width:520px){.case-row{grid-template-columns:40px 1fr 64px 56px 24px}}
.svc-vote{display:flex;align-items:center;gap:.5rem;font-size:.76rem;color:var(--text2);background:color-mix(in srgb,var(--gold) 10%,transparent);border:1px solid color-mix(in srgb,var(--gold) 35%,transparent);border-radius:10px;padding:.6rem .75rem;margin-bottom:1rem}
.svc-vote a{color:var(--gold);font-weight:700;text-decoration:underline}
.svc-vote .icon{width:16px;height:16px;color:var(--gold);flex:none}
@media(max-width:640px){.srv-cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
__SIDEBAR__
<main class="main">
  <div class="page-head">
    <div>
      <h1 class="page-title">
        <svg class="icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        Servers
      </h1>
      <div class="page-sub">Your servers' banks, taxes &amp; play stats.</div>
    </div>
  </div>

  <div id="voteBanner"></div>
  <div class="srv-cards" id="srvCards"><div class="empty">Loading your servers…</div></div>
</main>
</div>

<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function fmt(n){return Number(n||0).toLocaleString()}
function initials(n){return String(n||'?').trim().slice(0,1).toUpperCase();}

var SRV = {}; // gid -> server data (for live patches)
var ITEMS = []; // shop catalog from the server
var CAN_VERIFY = false; // true for "servers"-perm admins → can toggle verification
var VBADGE = '<span class="svc-verified" title="Verified server"><svg class="icon" viewBox="0 0 24 24"><path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/></svg></span>';

function perkBadges(s){
  var sh=s.shop||{}, out='', now=Date.now();
  if(sh.featured) out+='<span class="svc-perk gold">✨ Featured · '+left(sh.featuredUntil)+'</span>';
  if(sh.taxHoliday) out+='<span class="svc-perk green">Tax holiday · '+left(sh.taxHolidayUntil)+'</span>';
  return out?'<div class="svc-perks">'+out+'</div>':'';
}
function left(until){ var ms=Number(until)-Date.now(); if(ms<=0)return'ended'; var h=Math.floor(ms/3.6e6); if(h>=24)return Math.floor(h/24)+'d left'; if(h>=1)return h+'h left'; return Math.max(1,Math.floor(ms/6e4))+'m left'; }

function actBtn(cls, title, label, svgPath, onclick){
  return '<button class="svc-act '+cls+'" title="'+esc(title)+'" onclick="'+onclick+'">'+svg(svgPath)+'<span>'+esc(label)+'</span></button>';
}
function svg(p){ return '<svg class="icon" viewBox="0 0 24 24">'+p+'</svg>'; }

function card(s){
  var st=s.stats||{}, sh=s.shop||{};
  var accent = sh.accent ? ' style="--accent:'+esc(sh.accent)+'"' : '';
  return '<div class="svc'+(sh.featured?' feat':'')+'" id="svc-'+esc(s.id)+'"'+accent+'>'
    + '<div class="svc-head"><div class="svc-av">'+esc(initials(s.name))+'</div>'
      + '<div class="svc-h-meta"><div class="svc-name">'+esc(s.name)+(s.verified?VBADGE:'')+'</div><div class="svc-sub">'+(s.members!=null?fmt(s.members)+' members · ':'')+(s.owner?'You own this':'Admin view')+'</div></div></div>'
    + (perkBadges(s) ? '<div class="svc-perks">'+perkBadges(s)+'</div>' : '')
    + '<div class="svc-bank"><div><div class="lbl">Bank</div><div class="val" id="bank-'+esc(s.id)+'">'+fmt(s.bank)+'<small>FC</small></div></div>'
      + '<span class="svc-tax"><span>Tax</span><span class="t-val" id="tax-'+esc(s.id)+'">'+((sh.taxHoliday)?'0%':(s.tax/100)+'%')+'</span></span></div>'
    + '<div class="svc-stats">'
      + tileId('games',s.id,st.games,'Games') + tileId('wagered',s.id,st.wagered,'Wagered') + tileId('taxed',s.id,st.taxed,'Tax earned')
      + tileId('payout',s.id,st.payout,'Paid out') + tileId('players',s.id,st.players,'Players') + tileId('big',s.id,st.big,'Biggest win')
    + '</div>'
    + '<div class="svc-actions">'
      + actBtn('primary','Open the server shop','Shop','<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/>','openShop(\''+esc(s.id)+'\')')
      + actBtn('gold','Bank tools — withdraw, transfer, distribute','Bank','<path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/>','openBankTools(\''+esc(s.id)+'\')')
      + (s.manage ? actBtn('','Edit the tax on winnings','Tax','<path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>','editTax(\''+esc(s.id)+'\')') : '')
      + (s.manage ? actBtn('','Edit the server bank amount','Edit bank','<path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>','editBank(\''+esc(s.id)+'\')') : '')
      + (s.manage ? actBtn('','Add or edit the join link','Join link','<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',(s.invite?'editInvite(\''+esc(s.id)+'\')':'editInvite(\''+esc(s.id)+'\')')) : '')
      + (s.manage ? actBtn('','Manage custom cases','Cases','<path d="M20 7h-9M14 17H5M17 3a3 3 0 0 0 0 6h2V3zM7 21a3 3 0 0 0 0-6H5v6z"/>','manageCases(\''+esc(s.id)+'\')') : '')
      + (CAN_VERIFY ? actBtn(s.verified?'danger':'blue', s.verified?'Remove verification':'Verify server', s.verified?'Unverify':'Verify','<path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/>','verifyServer(\''+esc(s.id)+'\')') : '')
    + '</div>'
  + '</div>';
}
function tileId(key,gid,n,k){ return '<div class="svc-st"><div class="n" id="st-'+key+'-'+esc(gid)+'">'+fmt(n)+'</div><div class="k">'+esc(k)+'</div></div>'; }
function setTile(key,gid,v){ var el=document.getElementById('st-'+key+'-'+gid); if(el) el.textContent=fmt(v); }

function editTax(id){ if(window.sgEditTax) window.sgEditTax(id); }
function verifyServer(id){ var s=SRV[id]; if(!s)return;
  fetch('/api/server/verify',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({gid:id,verified:!s.verified})})
    .then(function(r){return r.json()}).then(function(j){ if(j&&j.ok){ s.verified=j.verified; patchCard(s); } else alert((j&&j.error)||'Failed'); })
    .catch(function(){ alert('Failed'); }); }

function patchCard(s){ var el=document.getElementById('svc-'+s.id); if(!el)return; el.outerHTML=card(s); }

// ── Bank tools: withdraw to wallet (5% fee, 50k/day), bank→bank, pay all members ──
function openBankTools(id){
  var s=SRV[id]; if(!s)return;
  var others=Object.keys(SRV).filter(function(k){return k!==id;}).map(function(k){return SRV[k];});
  var dataOpts=others.map(function(o){return '<option value="'+esc(o.id)+'">'+esc(o.name)+'</option>';}).join('');
  var back=document.createElement('div'); back.className='sg-dlg-back';
  back.innerHTML='<div class="sg-dlg bank-dlg" onclick="event.stopPropagation()">'
    +'<div class="sg-dlg-h"><b>'+esc(s.name)+'</b> · Bank tools</div>'
    +'<div class="sg-dlg-bank">Bank: <b id="btBank">'+fmt(s.bank)+' FC</b></div>'
    +'<label class="sg-dlg-lab">Withdraw to your wallet</label>'
    +'<div class="sg-dlg-row"><input id="btWAmt" type="number" min="1" placeholder="Amount from bank"><button class="btn btn-primary" id="btWBtn">Withdraw</button></div>'
    +'<div class="sg-dlg-hint">5% bank fee · max 50,000 FC/day. You receive 95% to your wallet.</div>'
    +'<label class="sg-dlg-lab" style="margin-top:.8rem">Send to another server’s bank</label>'
    +'<div class="sg-dlg-row"><input id="btToGid" list="btSrvList" type="text" placeholder="Destination server ID"><input id="btTAmt" type="number" min="1" placeholder="Amount" style="max-width:130px"></div>'
    +'<datalist id="btSrvList">'+dataOpts+'</datalist>'
    +'<div class="sg-dlg-row"><button class="btn btn-secondary" id="btTBtn" style="flex:1">Send bank → bank</button></div>'
    +'<div class="sg-dlg-hint">Moves FC straight from this bank into the other server’s bank.</div>'
    +'<label class="sg-dlg-lab" style="margin-top:.8rem">Pay every registered member</label>'
    +'<div class="sg-dlg-row"><input id="btDAmt" type="number" min="1" placeholder="FC per member"><button class="btn btn-secondary" id="btDBtn">Pay everyone</button></div>'
    +'<div class="sg-dlg-hint">Each registered member gets that amount — if the bank covers the total.</div>'
    +'<div class="sg-dlg-msg" id="btMsg"></div>'
    +'<div class="sg-dlg-act"><button class="btn btn-secondary" id="btClose">Close</button></div>'
  +'</div>';
  function close(){ try{document.body.removeChild(back);}catch(e){} }
  back.addEventListener('click',close);
  document.body.appendChild(back);
  back.querySelector('#btClose').onclick=close;
  var msg=back.querySelector('#btMsg');
  function setBank(v){ if(v==null)return; s.bank=v; var b=back.querySelector('#btBank'); if(b)b.textContent=fmt(v)+' FC'; var be=document.getElementById('bank-'+id); if(be)be.innerHTML=fmt(v)+'<small>FC</small>'; patchCard(s); }
  function show(cls,t){ msg.className='sg-dlg-msg'+(cls?' '+cls:''); msg.textContent=t; }
  function go(btn,url,body,ok){ btn.disabled=true; show('','…');
    fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)})
      .then(function(r){return r.json()}).then(function(j){ btn.disabled=false;
        if(j&&j.ok){ show('good',ok(j)); setBank(j.fromBank!=null?j.fromBank:j.bank); }
        else show('bad',(j&&j.error)||'Failed');
      }).catch(function(){ btn.disabled=false; show('bad','Network error'); });
  }
  back.querySelector('#btWBtn').onclick=function(){ var a=Math.floor(+back.querySelector('#btWAmt').value||0); if(!(a>0))return show('bad','Enter an amount');
    go(this,'/api/server/bank/withdraw',{gid:id,amount:a},function(j){return 'Withdrew '+fmt(j.net)+' FC (5% fee '+fmt(j.fee)+'). '+fmt(j.remainingToday)+' left today.';}); };
  back.querySelector('#btTBtn').onclick=function(){ var to=(back.querySelector('#btToGid').value||'').trim(); var a=Math.floor(+back.querySelector('#btTAmt').value||0);
    if(!to)return show('bad','Enter a destination server ID'); if(!(a>0))return show('bad','Enter an amount');
    go(this,'/api/server/bank/transfer',{fromGid:id,toGid:to,amount:a},function(j){return 'Sent '+fmt(a)+' FC to that server’s bank.';}); };
  back.querySelector('#btDBtn').onclick=function(){ var a=Math.floor(+back.querySelector('#btDAmt').value||0); if(!(a>0))return show('bad','Enter FC per member');
    if(!confirm('Pay '+fmt(a)+' FC to every registered member of this server?'))return;
    go(this,'/api/server/bank/distribute',{gid:id,amount:a},function(j){return 'Paid '+fmt(j.perUser)+' FC to '+fmt(j.users)+' members ('+fmt(j.total)+' FC total).';}); };
}

function load(){
  fetch('/api/my-servers',{credentials:'same-origin'}).then(function(r){return r.ok?r.json():null}).then(function(d){
    var wrap=document.getElementById('srvCards'); if(!d){ wrap.innerHTML='<div class="empty">Failed to load.</div>'; return; }
    var list=d.servers||[]; SRV={}; ITEMS=d.shopItems||[]; CAN_VERIFY=!!d.manageAll;
    var vb=document.getElementById('voteBanner');
    vb.innerHTML = (list.length && !d.voted)
      ? '<div class="svc-vote"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2 4 7v6c0 5 3.5 8 8 9 4.5-1 8-4 8-9V7Z"/></svg><span>Want to <b>raise</b> your tax above 15%? <a href="'+esc(d.voteUrl||'https://fluxerlist.com')+'" target="_blank" rel="noopener">Vote for the bot on FluxerList</a> to unlock it. (You can always lower it.)</span></div>'
      : '';
    if(!list.length){ wrap.innerHTML='<div class="empty">You don\'t own any servers with the bot yet.</div>'; return; }
    list.forEach(function(s){ SRV[s.id]=s; });
    wrap.innerHTML=list.map(card).join('');
  }).catch(function(){ document.getElementById('srvCards').innerHTML='<div class="empty">Failed to load.</div>'; });
}

// ── Shop modal (spend the server bank on perks) ──────────────────────────────
function shopIcon(k){ var p={star:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',calendar:'<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',palette:'<circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2a10 10 0 0 0 0 20 2.5 2.5 0 0 0 2-4 2.5 2.5 0 0 1 2-4h2a4 4 0 0 0 4-4 10 10 0 0 0-10-8Z"/>'}; return '<svg class="icon" viewBox="0 0 24 24">'+(p[k]||p.star)+'</svg>'; }

function openShop(id){
  var s=SRV[id]; if(!s)return;
  var back=document.createElement('div'); back.className='sg-dlg-back';
  back.innerHTML='<div class="sg-dlg shop-dlg" onclick="event.stopPropagation()">'
    + '<div class="sg-dlg-h"><b>'+esc(s.name)+'</b> · Shop</div>'
    + '<div class="sg-dlg-bank">Bank: <b id="shopBank">'+fmt(s.bank)+' FC</b></div>'
    + '<div class="shop-items" id="shopItems">'+ITEMS.map(function(it){return shopItemHtml(s,it);}).join('')+'</div>'
    + '<div class="sg-dlg-act"><button class="btn btn-secondary" id="shopClose">Close</button></div>'
  + '</div>';
  function close(){ try{document.body.removeChild(back);}catch(e){} }
  back.addEventListener('click',close);
  document.body.appendChild(back);
  back.querySelector('#shopClose').onclick=close;
  bindShop(id, back);
}
function bindShop(id, back){
  Array.prototype.forEach.call(back.querySelectorAll('.shop-buy'),function(btn){ btn.onclick=function(){ buyItem(id, btn.dataset.item, back, btn); }; });
  Array.prototype.forEach.call(back.querySelectorAll('.shop-remove'),function(btn){ btn.onclick=function(){ removeItem(id, btn.dataset.item, back, btn); }; });
}
function refreshShop(id, back, j){
  var s=SRV[id]; if(s){ if(j.bank!=null)s.bank=j.bank; if(j.shop)s.shop=j.shop; }
  if(j.bank!=null){ var bk=back.querySelector('#shopBank'); if(bk)bk.textContent=fmt(j.bank)+' FC';
    var bankEl=document.getElementById('bank-'+id); if(bankEl)bankEl.innerHTML=fmt(j.bank)+'<small>FC</small>'; }
  var wrap=back.querySelector('#shopItems'); if(wrap&&s){ wrap.innerHTML=ITEMS.map(function(it){return shopItemHtml(s,it);}).join(''); bindShop(id, back); }
  if(s) patchCard(s);
}
function removeItem(id,itemId,back,btn){
  btn.disabled=true; var old=btn.textContent; btn.textContent='…';
  fetch('/api/server/shop/remove',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({gid:id,itemId:itemId})})
    .then(function(r){return r.json()}).then(function(j){
      if(j&&j.ok){ refreshShop(id, back, j); }
      else { alert((j&&j.error)||'Failed'); btn.disabled=false; btn.textContent=old; }
    }).catch(function(){ alert('Failed'); btn.disabled=false; btn.textContent=old; });
}
function shopItemHtml(s,it){
  var sh=s.shop||{}, owned='', active=false, ownAccent=false;
  if(it.id==='featured'){ active=!!sh.featured; if(active)owned='<span class="shop-owned">Active · '+left(sh.featuredUntil)+'</span>'; }
  else if(it.id==='tax_holiday'){ active=!!sh.taxHoliday; if(active)owned='<span class="shop-owned">Active · '+left(sh.taxHolidayUntil)+'</span>'; }
  else if(it.id==='accent'){ ownAccent=!!sh.accent; if(ownAccent)owned='<span class="shop-owned" style="color:'+esc(sh.accent)+'">Owned</span>'; }
  var input = it.id==='accent' ? '<input type="color" class="shop-color" id="shopColor" value="'+(sh.accent||'#2ecc71')+'">' : '';
  var btn;
  if(active){ var refund=Math.floor(it.price/2); btn='<button class="btn btn-secondary btn-sm shop-remove" data-item="'+esc(it.id)+'" title="Cancel and refund 50%">Remove · +'+fmt(refund)+'</button>'; }
  else if(ownAccent) btn='<button class="btn btn-primary btn-sm shop-buy" data-item="'+esc(it.id)+'">Recolor · Free</button>';
  else btn='<button class="btn btn-primary btn-sm shop-buy" data-item="'+esc(it.id)+'">Buy · '+fmt(it.price)+'</button>';
  return '<div class="shop-it"><div class="shop-ic">'+shopIcon(it.icon)+'</div>'
    + '<div class="shop-info"><div class="shop-name">'+esc(it.label)+' '+owned+'</div><div class="shop-desc">'+esc(it.desc)+'</div></div>'
    + '<div class="shop-act">'+input+btn+'</div></div>';
}
function buyItem(id,itemId,back,btn){
  var body={gid:id,itemId:itemId};
  if(itemId==='accent'){ var ci=back.querySelector('#shopColor'); if(ci) body.color=ci.value; }
  btn.disabled=true; var old=btn.textContent; btn.textContent='…';
  fetch('/api/server/shop/buy',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(j){
      if(j&&j.ok){ refreshShop(id, back, j); }
      else { alert((j&&j.error)||'Purchase failed'); btn.disabled=false; btn.textContent=old; }
    }).catch(function(){ alert('Purchase failed'); btn.disabled=false; btn.textContent=old; });
}

// ── Set the server's fluxer.gg join link (shown on the leaderboard) ──────────
function editInvite(id){
  var s=SRV[id]; if(!s)return;
  var back=document.createElement('div'); back.className='sg-dlg-back';
  back.innerHTML='<div class="sg-dlg" onclick="event.stopPropagation()">'
    +'<div class="sg-dlg-h"><b>'+esc(s.name)+'</b> · Join link</div>'
    +'<label class="sg-dlg-lab">Invite URL (fluxer.gg only)</label>'
    +'<div class="sg-dlg-row"><input id="invIn" type="text" placeholder="https://fluxer.gg/..." value="'+esc(s.invite||'')+'"></div>'
    +'<div class="sg-dlg-hint">Shown as a <b>Join</b> button on the leaderboard. Only <b>https://fluxer.gg/</b> links are accepted. Leave empty to remove.</div>'
    +'<div class="sg-dlg-act"><button class="btn btn-secondary" id="invClear">Remove</button><button class="btn btn-primary" id="invSave">Save</button></div>'
  +'</div>';
  function close(){ try{document.body.removeChild(back);}catch(e){} }
  back.addEventListener('click',close);
  document.body.appendChild(back);
  function send(val,btn){ btn.disabled=true; var o=btn.textContent; btn.textContent='…';
    fetch('/api/server/invite',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({gid:id,invite:val})})
      .then(function(r){return r.json()}).then(function(j){ if(j&&j.ok){ if(s)s.invite=j.invite; patchCard(s); close(); }
        else { alert((j&&j.error)||'Failed'); btn.disabled=false; btn.textContent=o; } })
      .catch(function(){ alert('Failed'); btn.disabled=false; btn.textContent=o; }); }
  back.querySelector('#invSave').onclick=function(){ var v=back.querySelector('#invIn').value.trim();
    if(v && !/^(https?:\/\/)?(www\.)?fluxer\.gg\//i.test(v)){ alert('Must be a fluxer.gg link'); return; } send(v,this); };
  back.querySelector('#invClear').onclick=function(){ send('',this); };
}

// ── Server cases: per-server custom case tiers (RTP-capped server-side) ───────
var CASE_MAXRTP = 95, caseBack = null;
function closeCases(){ if(caseBack){ try{document.body.removeChild(caseBack);}catch(e){} caseBack=null; } }
function manageCases(id){
  fetch('/api/server/cases?gid='+encodeURIComponent(id),{credentials:'same-origin'})
    .then(function(r){return r.json()}).then(function(d){ if(d.error){alert(d.error);return;} CASE_MAXRTP=d.maxRtp||95;
      if(!caseBack){ caseBack=document.createElement('div'); caseBack.className='sg-dlg-back'; caseBack.addEventListener('click',closeCases); document.body.appendChild(caseBack); }
      renderCaseList(id, d.cases||[]); })
    .catch(function(){ alert('Failed to load cases'); });
}
function caseRow(c){
  var col=/^#[0-9a-fA-F]{6}$/.test(c.color||'')?c.color:'#2ecc71';
  return '<div class="case-it"><div class="case-ic" style="color:'+col+'">'+esc((c.items&&c.items[0]&&c.items[0].s)||'🎁')+'</div>'
    +'<div class="case-info"><div class="case-name">'+esc(c.label)+'</div><div class="case-sub">Entry '+fmt(c.entry)+' FC · '+(c.rtp)+'% payout · '+(c.items?c.items.length:0)+' items</div></div>'
    +'<div class="case-act"><button class="btn btn-secondary btn-sm" data-edit="'+esc(c.id)+'">Edit</button><button class="btn btn-secondary btn-sm" data-del="'+esc(c.id)+'">✕</button></div></div>';
}
function renderCaseList(id, cases){
  caseBack.innerHTML='<div class="sg-dlg shop-dlg" onclick="event.stopPropagation()">'
    +'<div class="sg-dlg-h"><b>Server cases</b></div>'
    +'<div class="sg-dlg-hint">Custom cases your players can pick in case battles on this server. Average payout is capped at <b>'+CASE_MAXRTP+'%</b> so the house keeps an edge.</div>'
    +'<div class="case-list">'+(cases.length?cases.map(caseRow).join(''):'<div class="case-empty">No cases yet — create one below.</div>')+'</div>'
    +'<div class="sg-dlg-act"><button class="btn btn-secondary" id="caseClose">Close</button><button class="btn btn-primary" id="caseNew">+ New case</button></div></div>';
  caseBack.querySelector('#caseClose').onclick=closeCases;
  caseBack.querySelector('#caseNew').onclick=function(){ renderCaseForm(id,null); };
  Array.prototype.forEach.call(caseBack.querySelectorAll('[data-edit]'),function(b){ b.onclick=function(){ var c=cases.filter(function(x){return x.id===b.dataset.edit;})[0]; renderCaseForm(id,c); }; });
  Array.prototype.forEach.call(caseBack.querySelectorAll('[data-del]'),function(b){ b.onclick=function(){ if(!confirm('Delete this case?'))return;
    fetch('/api/server/cases/'+encodeURIComponent(b.dataset.del)+'?gid='+encodeURIComponent(id),{method:'DELETE',credentials:'same-origin'})
      .then(function(r){return r.json()}).then(function(j){ if(j&&j.ok)manageCases(id); else alert((j&&j.error)||'Failed'); }).catch(function(){alert('Failed')}); }; });
}
function caseItemRow(it){ return '<div class="case-row">'
  +'<input class="ci ci-s" placeholder="🎁" value="'+esc(it.s||'')+'" maxlength="8">'
  +'<input class="ci ci-n" placeholder="Name" value="'+esc(it.n||'')+'" maxlength="40">'
  +'<input class="ci ci-v" type="number" min="0" placeholder="Value" value="'+(it.v||0)+'">'
  +'<input class="ci ci-w" type="number" min="1" placeholder="Weight" value="'+(it.w||1)+'">'
  +'<button class="case-rm" type="button" title="Remove">✕</button></div>'; }
function renderCaseForm(id, c){
  var editing=!!c;
  var items=(c&&c.items&&c.items.length)?c.items.slice():[{s:'🎁',n:'Common',v:10,w:60},{s:'💎',n:'Rare',v:80,w:8}];
  caseBack.innerHTML='<div class="sg-dlg shop-dlg case-form" onclick="event.stopPropagation()">'
    +'<div class="sg-dlg-h"><b>'+(editing?'Edit case':'New case')+'</b></div>'
    +'<div class="case-f-grid">'
      +'<label class="sg-dlg-lab">Case id'+(editing?' (locked)':'')+'</label><input id="cfId" '+(editing?'disabled':'')+' placeholder="lucky" value="'+esc(editing?String(c.id).replace(/^s_[0-9]+_/,''):'')+'" maxlength="24">'
      +'<label class="sg-dlg-lab">Label</label><input id="cfLabel" placeholder="Lucky Case" value="'+esc(c?c.label:'')+'" maxlength="24">'
      +'<label class="sg-dlg-lab">Entry (FC)</label><input id="cfEntry" type="number" min="10" value="'+(c?c.entry:100)+'">'
      +'<label class="sg-dlg-lab">Color</label><input id="cfColor" type="color" value="'+(c&&/^#[0-9a-fA-F]{6}$/.test(c.color)?esc(c.color):'#2ecc71')+'">'
    +'</div>'
    +'<div class="case-items-h"><span>Items (chance = weight ÷ total)</span><span class="case-rtp" id="cfRtp">—</span></div>'
    +'<div class="case-items" id="cfItems">'+items.map(caseItemRow).join('')+'</div>'
    +'<button class="btn btn-secondary btn-sm" id="cfAdd" type="button" style="margin-top:.5rem">+ Add item</button>'
    +'<div class="sg-dlg-hint" id="cfWarn"></div>'
    +'<div class="sg-dlg-act"><button class="btn btn-secondary" id="cfBack">Back</button><button class="btn btn-primary" id="cfSave">'+(editing?'Save':'Create')+'</button></div></div>';
  var itemsEl=caseBack.querySelector('#cfItems');
  function readForm(){ var its=[]; Array.prototype.forEach.call(itemsEl.querySelectorAll('.case-row'),function(r){ its.push({ s:r.querySelector('.ci-s').value, n:r.querySelector('.ci-n').value, v:Math.floor(Number(r.querySelector('.ci-v').value)||0), w:Math.floor(Number(r.querySelector('.ci-w').value)||0) }); });
    return { label:caseBack.querySelector('#cfLabel').value, entry:Math.floor(Number(caseBack.querySelector('#cfEntry').value)||0), color:caseBack.querySelector('#cfColor').value, items:its }; }
  function recalc(){ var f=readForm(), tw=0, ev=0; f.items.forEach(function(i){ tw+=i.w; ev+=i.v*i.w; }); var rtp=(tw&&f.entry)?Math.round(ev/tw/f.entry*100):0;
    var el=caseBack.querySelector('#cfRtp'); el.textContent=rtp+'% payout'; el.className='case-rtp'+(rtp>CASE_MAXRTP?' bad':'');
    caseBack.querySelector('#cfWarn').innerHTML = rtp>CASE_MAXRTP ? '<b style="color:var(--red,#ef4444)">Too generous — must be ≤ '+CASE_MAXRTP+'%. Lower item values or raise the entry.</b>' : 'Average payout '+rtp+'% (cap '+CASE_MAXRTP+'%).'; }
  function bind(){ Array.prototype.forEach.call(itemsEl.querySelectorAll('.ci'),function(i){ i.oninput=recalc; });
    Array.prototype.forEach.call(itemsEl.querySelectorAll('.case-rm'),function(b){ b.onclick=function(){ if(itemsEl.children.length<=2){alert('A case needs at least 2 items');return;} itemsEl.removeChild(b.parentNode); recalc(); }; }); }
  caseBack.querySelector('#cfAdd').onclick=function(){ if(itemsEl.children.length>=16){alert('Max 16 items');return;} var t=document.createElement('div'); t.innerHTML=caseItemRow({s:'',n:'',v:0,w:1}); itemsEl.appendChild(t.firstChild); bind(); recalc(); };
  caseBack.querySelector('#cfBack').onclick=function(){ manageCases(id); };
  caseBack.querySelector('#cfSave').onclick=function(){ var f=readForm(); f.gid=id; if(!editing)f.id=caseBack.querySelector('#cfId').value;
    var sv=this; sv.disabled=true; sv.textContent='Saving…';
    fetch(editing?'/api/server/cases/'+encodeURIComponent(c.id):'/api/server/cases',{method:editing?'PUT':'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify(f)})
      .then(function(r){return r.json()}).then(function(j){ if(j&&j.ok)manageCases(id); else { alert((j&&j.error)||'Failed'); sv.disabled=false; sv.textContent=editing?'Save':'Create'; } })
      .catch(function(){ alert('Failed'); sv.disabled=false; sv.textContent=editing?'Save':'Create'; }); };
  bind(); recalc();
}

// ── Admin: set a server bank to an exact amount ──────────────────────────────
function editBank(id){
  var s=SRV[id]; if(!s)return;
  var back=document.createElement('div'); back.className='sg-dlg-back';
  back.innerHTML='<div class="sg-dlg" onclick="event.stopPropagation()">'
    +'<div class="sg-dlg-h"><b>'+esc(s.name)+'</b> · Edit bank</div>'
    +'<div class="sg-dlg-bank">Current: <b>'+fmt(s.bank)+' FC</b></div>'
    +'<label class="sg-dlg-lab">Set bank to (FC)</label>'
    +'<div class="sg-dlg-row"><input id="bankIn" type="number" min="0" step="1" value="'+Math.floor(Number(s.bank)||0)+'"></div>'
    +'<div class="sg-dlg-hint">Admin override — sets the server bank to an exact amount.</div>'
    +'<div class="sg-dlg-act"><button class="btn btn-secondary" id="bankCancel">Cancel</button><button class="btn btn-primary" id="bankSave">Save</button></div>'
  +'</div>';
  function close(){ try{document.body.removeChild(back);}catch(e){} }
  back.addEventListener('click',close);
  document.body.appendChild(back);
  back.querySelector('#bankCancel').onclick=close;
  var sv=back.querySelector('#bankSave');
  sv.onclick=function(){ var v=Math.floor(Number(back.querySelector('#bankIn').value)); if(!(v>=0)){ alert('Enter a valid amount'); return; }
    sv.disabled=true; sv.textContent='Saving…';
    fetch('/api/server/bank',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({gid:id,set:v})})
      .then(function(r){return r.json()}).then(function(j){ if(j&&j.ok){ if(s)s.bank=j.bank; var el=document.getElementById('bank-'+id); if(el)el.innerHTML=fmt(j.bank)+'<small>FC</small>'; close(); }
        else { alert((j&&j.error)||'Failed'); sv.disabled=false; sv.textContent='Save'; } })
      .catch(function(){ alert('Failed'); sv.disabled=false; sv.textContent='Save'; });
  };
}

// Live updates: server bank (WS push) + tax (edited via the sidebar dialog).
// Registered once (pjax re-runs this file's script) — handlers re-query the DOM.
if(!window.__srvDash){ window.__srvDash=1;
  window.addEventListener('sg:ws', function(e){ var d=e.detail; if(!d)return;
    if(d.type==='bank'){
      var el=document.getElementById('bank-'+d.gid); if(el) el.innerHTML=fmt(d.bal)+'<small>FC</small>';
      if(SRV[d.gid]) SRV[d.gid].bank=d.bal;
    } else if(d.type==='server-play'){
      var s=SRV[d.gid]; if(!s)return; var st=s.stats||(s.stats={});
      if(d.dGames){ st.games=(st.games||0)+d.dGames; setTile('games',d.gid,st.games); }
      if(d.dWager){ st.wagered=(st.wagered||0)+d.dWager; setTile('wagered',d.gid,st.wagered); }
      if(d.dPayout){ st.payout=(st.payout||0)+d.dPayout; setTile('payout',d.gid,st.payout); }
      if(d.dTax){ st.taxed=(st.taxed||0)+d.dTax; setTile('taxed',d.gid,st.taxed); }
      if(d.big!=null && d.big>(st.big||0)){ st.big=d.big; setTile('big',d.gid,st.big); }
    } else if(d.type==='server-econ'){
      var sv=SRV[d.gid]; if(!sv)return; sv.tax=d.taxBps; sv.shop=d.shop||sv.shop; if(d.verified!==undefined)sv.verified=d.verified; patchCard(sv); // tax/holiday/perks/verified live
    } else if(d.type==='guild'){
      var gv=SRV[d.gid]; if(!gv)return; if(d.name)gv.name=d.name; if(d.members!=null)gv.members=d.members; patchCard(gv); // rename live
    }
  });
  window.addEventListener('sg:tax', function(e){ var d=e.detail; if(!d)return;
    var el=document.getElementById('tax-'+d.gid); if(el) el.textContent=(d.taxBps/100)+'%';
    if(SRV[d.gid]) SRV[d.gid].tax=d.taxBps;
  });
}

load();
</script>
