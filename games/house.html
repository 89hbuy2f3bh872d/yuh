<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>House Games — SirGreen Casino</title>
        <link rel="stylesheet" href="/assets/css/app.css" />
        <link rel="stylesheet" href="/assets/css/house.css" />
        <style>
            /* Chicken Road — fixed viewport, the road slides under the chicken (no scrollbar) */
            .cr-view {
                position: relative;
                width: 100%;
                height: 312px;
                border-radius: 16px;
                overflow: hidden;
                background: linear-gradient(180deg, #10141f, #0a0d15);
                border: 1px solid var(--border);
            }
            .cr-track {
                display: flex;
                height: 100%;
                transition: transform 0.34s cubic-bezier(0.3, 1, 0.4, 1);
                will-change: transform;
            }
            .cr-empty {
                margin: auto;
                color: var(--text3);
                font-size: 0.84rem;
                padding: 2rem;
                text-align: center;
                align-self: center;
            }
            .cr-lane {
                flex: 0 0 92px;
                box-sizing: border-box;
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                background: linear-gradient(180deg, #23272f, #181b22);
                border-right: 3px dashed rgba(255, 221, 0, 0.16);
                padding-top: 0.55rem;
            }
            .cr-lane.curb,
            .cr-lane.finish {
                background: linear-gradient(180deg, #1c3a25, #13291b);
            }
            .cr-lane.curb {
                border-right: 4px solid rgba(255, 255, 255, 0.12);
            }
            .cr-lane.finish {
                border-right: 0;
            }
            .cr-mult {
                font-size: 0.72rem;
                font-weight: 800;
                color: #cfd6e4;
                background: rgba(0, 0, 0, 0.42);
                border-radius: 99px;
                padding: 0.12rem 0.5rem;
                white-space: nowrap;
                z-index: 2;
            }
            .cr-zone {
                flex: 1;
                width: 100%;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .cr-line {
                position: absolute;
                left: 50%;
                top: 4px;
                bottom: 22px;
                width: 0;
                border-left: 3px dashed rgba(255, 221, 0, 0.2);
                transform: translateX(-50%);
            }
            .cr-foot {
                font-size: 0.55rem;
                font-weight: 800;
                letter-spacing: 0.07em;
                color: var(--text3);
                padding-bottom: 0.4rem;
            }
            .cr-lane.done {
                background: linear-gradient(180deg, #1c3a25, #13291b);
            }
            .cr-lane.done .cr-mult {
                color: #37e07a;
                background: rgba(34, 197, 94, 0.2);
            }
            .cr-lane.dead {
                background: linear-gradient(180deg, #3b1d1d, #281313);
            }
            .cr-lane.cashed .cr-mult {
                color: #ffd34d;
                background: rgba(241, 196, 15, 0.2);
            }
            .cr-lane.next {
                background: linear-gradient(180deg, #2b303d, #21252f);
            }
            .cr-lane.next .cr-mult {
                color: #fff;
                background: var(--gc, #f97316);
                box-shadow: 0 0 14px -2px var(--gc, #f97316);
            }
            .cr-risk {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 0.6rem;
                font-weight: 800;
                color: #fff;
                background: rgba(0, 0, 0, 0.6);
                border: 1px solid rgba(255, 255, 255, 0.16);
                border-radius: 99px;
                padding: 0.12rem 0.45rem;
                white-space: nowrap;
                z-index: 2;
            }
            .cr-chk {
                font-size: 2.2rem;
                line-height: 1;
                filter: drop-shadow(0 5px 7px rgba(0, 0, 0, 0.6));
                z-index: 4;
            }
            .cr-block {
                position: absolute;
                bottom: 24px;
                font-size: 1.05rem;
                z-index: 1;
            }
            .cr-car {
                position: absolute;
                top: 0;
                font-size: 2rem;
                z-index: 3;
                animation: crCar 0.42s ease forwards;
            }
            @keyframes crCar {
                from {
                    transform: translateY(-64px);
                    opacity: 0;
                }
                60% {
                    opacity: 1;
                }
                to {
                    transform: translateY(46px);
                    opacity: 1;
                }
            }
            .cr-flag {
                font-size: 2rem;
            }
            @keyframes crHop {
                0% {
                    transform: translateY(0);
                }
                45% {
                    transform: translateY(-26px) scale(1.08);
                }
                100% {
                    transform: translateY(0);
                }
            }
            .cr-hop {
                animation: crHop 0.3s ease;
            }
            .cr-fade {
                position: absolute;
                top: 0;
                bottom: 0;
                width: 36px;
                pointer-events: none;
                z-index: 5;
            }
            .cr-fade.l {
                left: 0;
                background: linear-gradient(
                    90deg,
                    rgba(10, 13, 21, 0.95),
                    transparent
                );
            }
            .cr-fade.r {
                right: 0;
                background: linear-gradient(
                    270deg,
                    rgba(10, 13, 21, 0.95),
                    transparent
                );
            }
            .cr-hud {
                position: absolute;
                top: 0.5rem;
                right: 0.6rem;
                text-align: right;
                z-index: 6;
                background: rgba(0, 0, 0, 0.45);
                border: 1px solid var(--border);
                border-radius: 11px;
                padding: 0.35rem 0.7rem;
            }
            .cr-hud b {
                font-size: 1.4rem;
                font-weight: 900;
                color: #fff;
                display: block;
                line-height: 1;
            }
            .cr-hud small {
                font-size: 0.62rem;
                color: var(--text2);
            }
            .cr-cross {
                background: var(--gc, #f97316) !important;
                color: #1a0d00 !important;
            }
            /* ── Dice ── */
            .dc-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1.1rem;
                padding: 1rem;
            }
            .dc-num {
                font-size: 2.6rem;
                font-weight: 800;
                color: var(--text);
                font-variant-numeric: tabular-nums;
                letter-spacing: 0.02em;
            }
            .dc-num.win {
                color: var(--gold);
            }
            .dc-num.lose {
                color: var(--text3);
            }
            .dc-track {
                position: relative;
                width: 100%;
                max-width: 440px;
                height: 36px;
                border-radius: 99px;
                background: var(--surface2);
                border: 1px solid var(--border);
                overflow: hidden;
            }
            .dc-win {
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                background: color-mix(
                    in srgb,
                    var(--gc, #14b8a6) 26%,
                    transparent
                );
                border-right: 2px solid var(--gc, #14b8a6);
                transition: width 0.12s;
            }
            .dc-win.over {
                left: auto;
                right: 0;
                border-right: 0;
                border-left: 2px solid var(--gc, #14b8a6);
            }
            .dc-marker {
                position: absolute;
                top: -3px;
                bottom: -3px;
                width: 3px;
                background: var(--text);
                border-radius: 2px;
                transform: translateX(-50%);
                transition: left 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            .dc-slider {
                width: 100%;
                max-width: 440px;
                -webkit-appearance: none;
                appearance: none;
                height: 6px;
                border-radius: 99px;
                background: var(--border);
                outline: none;
                cursor: pointer;
            }
            .dc-slider::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: var(--gc, #14b8a6);
                border: 2px solid var(--bg);
                box-shadow: 0 2px 8px -2px #000;
            }
            .dc-slider::-moz-range-thumb {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: var(--gc, #14b8a6);
                border: 2px solid var(--bg);
            }
            .dc-read {
                font-size: 0.74rem;
                color: var(--text2);
                text-align: center;
            }
            .dc-read b {
                color: var(--text);
            }
            /* ── Crash (rocket) ── */
            .rk-sky {
                position: relative;
                width: 100%;
                height: 340px;
                border-radius: 16px;
                overflow: hidden;
                background: radial-gradient(
                    120% 80% at 30% 110%,
                    #1b2a4a 0%,
                    #0a0f1f 60%,
                    #05070f 100%
                );
                border: 1px solid var(--border);
            }
            /* Tiled starfield — scrolled via background-position to convey speed (camera follow). */
            .rk-stars {
                position: absolute;
                inset: -30%;
                pointer-events: none;
                background-image:
                    radial-gradient(
                        1.4px 1.4px at 22px 30px,
                        #fff,
                        transparent
                    ),
                    radial-gradient(1px 1px at 90px 70px, #fff, transparent),
                    radial-gradient(
                        1.6px 1.6px at 140px 120px,
                        #cfe6ff,
                        transparent
                    ),
                    radial-gradient(1px 1px at 60px 160px, #fff, transparent),
                    radial-gradient(2px 2px at 175px 45px, #fff, transparent),
                    radial-gradient(
                        1.2px 1.2px at 110px 180px,
                        #bdf,
                        transparent
                    );
                background-size: 200px 200px;
                background-repeat: repeat;
                background-position: 0 0;
                animation: rkTw 3.2s ease-in-out infinite;
            }
            @keyframes rkTw {
                0%,
                100% {
                    opacity: 0.45;
                }
                50% {
                    opacity: 0.85;
                }
            }
            .rk-mult {
                position: absolute;
                top: 1rem;
                left: 1.1rem;
                font-size: 2.4rem;
                font-weight: 900;
                color: #fff;
                text-shadow: 0 2px 18px rgba(0, 0, 0, 0.6);
                font-variant-numeric: tabular-nums;
                z-index: 5;
                transition: color 0.2s;
            }
            .rk-mult.crash {
                color: #ff5c5c;
                text-shadow: 0 0 24px rgba(255, 60, 60, 0.7);
            }
            .rk-mult.win {
                color: #ffd34d;
                text-shadow: 0 0 24px rgba(255, 211, 77, 0.7);
            }
            /* Rocket travels diagonally up-right (left/top set by JS). Camera is fixed until it
               reaches the top-right anchor, then the background scrolls (camera follow). */
            .rk-rocket {
                position: absolute;
                left: 20%;
                top: 76%;
                transform: translate(-50%, -50%) rotate(0deg);
                z-index: 4;
                will-change: left, top, transform;
                filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.5));
                transition:
                    transform 0.6s ease-out,
                    opacity 0.4s;
            }
            .rk-rocket.flying {
                transform: translate(-50%, -50%) rotate(45deg);
            }
            .rk-body {
                font-size: 2.8rem;
                line-height: 1;
                display: block;
                transform: rotate(-45deg);
            }
            /* Flames trail below the rocket. Hidden until .flying; blue boost flame on .boost. */
            .rk-flame {
                position: absolute;
                left: 50%;
                top: 100%;
                transform: translateX(-50%);
                width: 20px;
                height: 34px;
                border-radius: 50% 50% 50% 50%/40% 40% 65% 65%;
                filter: blur(0.5px);
                transform-origin: top center;
                animation: rkFlicker 0.09s infinite alternate;
                z-index: -1;
                opacity: 0;
                transition: opacity 0.4s;
            }
            .rk-flame.oj {
                background: linear-gradient(
                    180deg,
                    #fff6b0 0%,
                    #ffd24a 28%,
                    #ff8a1a 62%,
                    #ff3b00 100%
                );
            }
            .rk-flame.oj::after {
                content: "";
                position: absolute;
                left: 50%;
                top: 55%;
                transform: translateX(-50%);
                width: 11px;
                height: 20px;
                background: linear-gradient(
                    180deg,
                    #fff 0%,
                    #ffd24a 55%,
                    #ff7a00 100%
                );
                border-radius: 50%;
                filter: blur(0.6px);
            }
            .rk-rocket.flying .rk-flame.oj {
                opacity: 1;
            }
            .rk-flame.boost {
                width: 30px;
                height: 56px;
                background: linear-gradient(
                    180deg,
                    #e8f7ff 0%,
                    #7fd4ff 35%,
                    #2b8fe6 70%,
                    #1d4ed8 100%
                );
                z-index: -2;
                filter: blur(0.8px);
            }
            .rk-flame.boost::after {
                background: linear-gradient(
                    180deg,
                    #fff 0%,
                    #bff 60%,
                    #2b8fe6 100%
                );
            }
            @keyframes rkFlicker {
                from {
                    transform: translateX(-50%) scaleY(0.8) scaleX(0.9);
                }
                to {
                    transform: translateX(-50%) scaleY(1.15) scaleX(1.08);
                }
            }
            .rk-burst {
                position: absolute;
                left: 50%;
                top: 50%;
                z-index: 6;
                font-size: 3rem;
                transform: translate(-50%, -50%);
                pointer-events: none;
                opacity: 0;
            }
            .rk-burst.go {
                animation: rkBurst 0.6s ease-out forwards;
            }
            .rk-ring {
                position: absolute;
                left: 50%;
                top: 50%;
                z-index: 5;
                transform: translate(-50%, -50%);
                border: 3px solid #ff7a00;
                border-radius: 50%;
                pointer-events: none;
                opacity: 0;
            }
            .rk-ring.go {
                animation: rkRing 0.55s ease-out forwards;
            }
            @keyframes rkBurst {
                0% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.3);
                }
                30% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1.2);
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(1.9);
                }
            }
            @keyframes rkRing {
                0% {
                    opacity: 0.9;
                    width: 10px;
                    height: 10px;
                }
                100% {
                    opacity: 0;
                    width: 170px;
                    height: 170px;
                }
            }
            .rk-sky.shake {
                animation: rkShake 0.5s linear;
            }
            @keyframes rkShake {
                10% {
                    transform: translate(-2px, 1px);
                }
                20% {
                    transform: translate(3px, -2px);
                }
                30% {
                    transform: translate(-3px, 2px);
                }
                40% {
                    transform: translate(2px, 2px);
                }
                50% {
                    transform: translate(-2px, -1px);
                }
                60% {
                    transform: translate(2px, -2px);
                }
                70% {
                    transform: translate(-1px, 1px);
                }
                80% {
                    transform: translate(1px, -1px);
                }
                100% {
                    transform: translate(0, 0);
                }
            }
            .rk-auto {
                display: flex;
                align-items: center;
                gap: 0.4rem;
                justify-content: center;
                font-size: 0.74rem;
                color: var(--text2);
                margin-bottom: 0.5rem;
                flex-wrap: wrap;
            }
            .rk-auto input[type="checkbox"] {
                accent-color: var(--gc, #f43f5e);
            }
            .rk-auto-in {
                width: 72px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 0.35rem 0.5rem;
                color: var(--text);
                font-size: 0.8rem;
                text-align: center;
                outline: none;
            }
            .rk-auto-in:focus {
                border-color: var(--gc, #f43f5e);
            }
            .rk-cash {
                background: linear-gradient(
                    180deg,
                    #22c55e,
                    #16a34a
                ) !important;
                color: #04210d !important;
                font-weight: 800;
            }
        </style>
    </head>
    <body>
        <div class="app">
            __SIDEBAR__
            <main class="main">
                <div id="view-list">
                    <div class="page-head">
                        <div>
                            <h1 class="page-title">
                                <svg class="icon" viewBox="0 0 24 24">
                                    <rect
                                        width="12"
                                        height="12"
                                        x="2"
                                        y="10"
                                        rx="2"
                                        ry="2"
                                    />
                                    <path
                                        d="m17.92 14 3.5-3.5a2.24 2.24 0 0 0 0-3l-5-4.92a2.24 2.24 0 0 0-3 0L10 6"
                                    />
                                    <path d="M6 18h.01" />
                                    <path d="M10 14h.01" />
                                    <path d="M15 6h.01" />
                                    <path d="M18 9h.01" />
                                </svg>
                                House Games
                            </h1>
                            <div class="page-sub">
                                Quick games vs the house — provably resolved
                                server-side.
                            </div>
                        </div>
                        <span class="srv-tax-note" hidden></span>
                    </div>
                    <div class="slot-grid" id="hgGrid">
                        <div class="empty">Loading…</div>
                    </div>
                </div>

                <div id="view-game" class="hidden">
                    <div class="page-head">
                        <div>
                            <h1 class="page-title" id="hgTitle"></h1>
                            <div class="page-sub" id="hgTag"></div>
                        </div>
                        <span class="srv-tax-note" hidden></span>
                        <div class="page-actions">
                            <div class="hg-bal">
                                Balance <b id="balMeter">0</b> FC
                            </div>
                            <button class="btn btn-ghost" onclick="backHouse()">
                                <svg class="icon" viewBox="0 0 24 24">
                                    <path d="M15 18l-6-6 6-6" />
                                </svg>
                                Back
                            </button>
                        </div>
                    </div>
                    <div class="hg-stage">
                        <div class="hg-board" id="hgBoard"></div>
                        <div class="hg-side">
                            <div class="bet-box">
                                <span class="bet-lbl">Bet</span
                                ><button
                                    class="step-btn"
                                    onclick="adjustBet(-1)"
                                >
                                    −</button
                                ><span class="bet-val" id="betVal">20</span
                                ><button
                                    class="step-btn"
                                    onclick="adjustBet(1)"
                                >
                                    +
                                </button>
                            </div>
                            <div id="hgControls"></div>
                            <div class="hg-msg" id="hgMsg"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <script>
            function $(id) {
                return document.getElementById(id);
            }
            function fmt(n) {
                return Number(Math.round(n || 0)).toLocaleString();
            }
            function sfx(n) {
                if (window.SG) SG.sfx(n);
            }
            var GAMES = [],
                PLINKO = null,
                GAME = null,
                bal = 0,
                busy = false;
            var BET = [1, 2, 5, 10, 20, 40, 80, 150, 300, 600, 1000, 2000],
                bi = 4;
            function bet() {
                return BET[bi];
            }
            function adjustBet(d) {
                bi = Math.max(0, Math.min(BET.length - 1, bi + d));
                $("betVal").textContent = fmt(bet());
            }
            function refreshBal() {
                return fetch("/api/balance")
                    .then(function (r) {
                        return r.ok ? r.json() : null;
                    })
                    .then(function (d) {
                        if (d && d.bal !== undefined) {
                            bal = Number(d.bal);
                            setBal();
                        }
                    });
            }
            function setBal() {
                var e = $("sbBal");
                if (e) e.textContent = fmt(bal);
                var b = $("balMeter");
                if (b) b.textContent = fmt(bal);
            }
            function msg(t, cls) {
                var m = $("hgMsg");
                m.textContent = t || "";
                m.className = "hg-msg" + (cls ? " " + cls : "");
            }
            refreshBal(); /* balance kept live via WS */

            fetch("/api/house/games")
                .then(function (r) {
                    return r.json();
                })
                .then(function (d) {
                    GAMES = d.games || [];
                    PLINKO = d.plinko;
                    renderLobby();
                })
                .catch(function () {
                    $("hgGrid").innerHTML =
                        '<div class="empty">Failed to load.</div>';
                });

            function renderLobby() {
                var el = $("hgGrid");
                el.innerHTML = "";
                function ic(p) {
                    return (
                        '<svg class="icon hg-card-ic" viewBox="0 0 24 24">' +
                        p +
                        "</svg>"
                    );
                }
                var icons = {
                    plinko: ic(
                        '<path d="m7 6 5 5 5-5"/><path d="m7 13 5 5 5-5"/>',
                    ),
                    mines: ic(
                        '<circle cx="11" cy="13" r="9"/><path d="m19.5 9.5 1.8-1.8a2.4 2.4 0 0 0 0-3.4l-1.6-1.6a2.41 2.41 0 0 0-3.4 0l-1.8 1.8"/><path d="m22 2-1.5 1.5"/>',
                    ),
                    coinflip: ic(
                        '<circle cx="12" cy="12" r="10"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/>',
                    ),
                    hilo: ic(
                        '<path d="m21 16-4 4-4-4"/><path d="M17 20V4"/><path d="m3 8 4-4 4 4"/><path d="M7 4v16"/>',
                    ),
                    double: ic(
                        '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
                    ),
                    chicken: ic(
                        '<path d="M15.45 15.4c-2.13.65-4.3.32-5.7-1.1-2.29-2.27-1.76-6.5 1.17-9.42 2.93-2.93 7.15-3.46 9.43-1.18 1.41 1.41 1.74 3.57 1.1 5.71-1.4-.51-3.26-.02-4.64 1.36-1.38 1.38-1.87 3.23-1.36 4.63z"/><path d="m11.25 15.6-2.16 2.16a2.5 2.5 0 1 1-4.56 1.73 2.49 2.49 0 0 1-1.41-4.24 2.5 2.5 0 0 1 3.14-.32l2.16-2.16"/>',
                    ),
                    dice: ic(
                        '<rect x="3" y="3" width="18" height="18" rx="4"/><circle cx="8" cy="8" r="1.3" fill="currentColor" stroke="none"/><circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>',
                    ),
                    crash: ic(

                }

            function pkBuildPegs(P) {
                var a = [];

            function pkTick(now) {

            function dcOdds() {
                var t = GAME._dt,
                    m = GAME._dmode;
                var prob = m === "under" ? t / 100 : (100 - t) / 100;
                return {
                    prob: prob,
                    mult: +(0.97 / prob).toFixed(4),
                    chance: +(prob * 100).toFixed(2),
                };
            }
            function dcRenderTrack() {
                var t = GAME._dt,
                    m = GAME._dmode,
                    win = $("dcWin"),
                    knob = $("dcKnob");
                if (m === "under") {
                    win.classList.remove("over");
                    win.style.left = "0";
                    win.style.width = t + "%";
                } else {
                    win.classList.add("over");
                    win.style.left = 100 - t + "%";
                    win.style.width = t + "%";
                }
                if (knob) knob.style.left = t + "%";
            }

                    o.chance +

                    o.mult +

            // ── Crash (rocket) ─────────────────────────────────────────────────────────
            // Trajectory: the rocket creeps from bottom-left toward the top-right corner
            // (camera fixed). Once it passes RK_DCAP (~3×, “out of frame”), the camera follows —
            // the rocket pins at the anchor and the starfield scrolls down-left, accelerating
            // with the multiplier. Flame shows only while flying; a blue boost flame kicks in
            // at high multiplier.
            var rkRaf = 0,
                rkPollT = 0,
                rkLocalStart = 0;
            var RK_SX = 20,
                RK_SY = 76,
                RK_AX = 66,
                RK_AY = 22,
                RK_DCAP = 1.1,
                RK_PX = 240,
                RK_BOOST_AT = 20;
            function rkPos(d) {
                var t01 = Math.min(1, d / RK_DCAP);
                return {
                    x: RK_SX + (RK_AX - RK_SX) * t01,
                    y: RK_SY + (RK_AY - RK_SY) * t01,
                    over: Math.max(0, d - RK_DCAP),
                };
            }
            function rkReset() {
                GAME._flying = false;
                if (rkRaf) {
                    cancelAnimationFrame(rkRaf);
                    rkRaf = 0;
                }
                if (rkPollT) {
                    clearInterval(rkPollT);
                    rkPollT = 0;
                }
                var st = $("rkStart"),
                    ca = $("rkCash"),
                    r = $("rkRocket"),
                    m = $("rkMult"),
                    b = $("rkBurst"),
                    rg = $("rkRing"),
                    s = $("rkStars");
                if (st) st.classList.remove("hidden");
                if (ca) ca.classList.add("hidden");
                if (r) {
                    r.style.transition = "none";
                    r.style.left = RK_SX + "%";
                    r.style.top = RK_SY + "%";
                    r.style.opacity = "1";
                    r.classList.remove("flying");
                }
                var bf = $("rkBoost");
                if (bf) {
                    bf.style.opacity = "0";
                    bf.style.height = "44px";
                }
                if (s) s.style.backgroundPosition = "0 0";
                if (m) {
                    m.textContent = "1.00×";
                    m.className = "rk-mult";
                }
                if (b) b.classList.remove("go");
                if (rg) rg.classList.remove("go");
            }
            RENDER.crash = function () {
                GAME._flying = false;
                GAME._auto = 0;
                GAME._autoOn = false;
                $("hgBoard").innerHTML =
                    '<div class="rk-sky" id="rkSky"><div class="rk-stars" id="rkStars"></div><div class="rk-mult" id="rkMult">1.00×</div><div class="rk-rocket" id="rkRocket"><div class="rk-flame boost" id="rkBoost"></div><div class="rk-flame oj"></div><div class="rk-body">🚀</div></div><div class="rk-ring" id="rkRing"></div><div class="rk-burst" id="rkBurst">💥</div></div>';
                $("hgControls").innerHTML =
                    '<div class="rk-auto"><label><input type="checkbox" id="rkAutoOn" onchange="rkAutoToggle()"> Auto cash out at</label> <input class="rk-auto-in" id="rkAutoIn" type="number" min="1.01" step="0.01" value="2.00"> ×</div>' +
                    '<button class="play-btn" id="rkStart" onclick="rkStart()">Start 🚀</button>' +
                    '<button class="play-btn cash rk-cash hidden" id="rkCash" onclick="rkCashout()">Cash Out <span id="rkCashVal">0</span> FC</button>';
                rkReset();
            };
            function rkAutoToggle() {
                GAME._autoOn = $("rkAutoOn").checked;
            }
            function rkStart() {
                if (busy) return;
                if (bet() > bal) {
                    msg("Not enough balance", "bad");
                    return;
                }
                var auto = GAME._autoOn ? Number($("rkAutoIn").value) : 0;
                busy = true;
                msg("");
                sfx("spin");
                post("crash/start", { bet: bet(), auto: auto })
                    .then(function (d) {
                        busy = false;
                        if (d.error) {
                            msg(d.error, "bad");
                            return;
                        }
                        bal = d.balance;
                        setBal();
                        GAME._flying = true;
                        GAME._k = d.k;
                        GAME._p = d.p;
                        GAME._auto = d.auto || 0;
                        rkLocalStart = Date.now();
                        var m = $("rkMult");
                        m.textContent = "1.00×";
                        m.className = "rk-mult";
                        var r = $("rkRocket");
                        if (r) {
                            r.style.transition = "";
                            r.style.left = RK_SX + "%";
                            r.style.top = RK_SY + "%";
                            r.style.opacity = "1";
                            r.classList.add("flying");
                        }
                        var bf = $("rkBoost");
                        if (bf) {
                            bf.style.opacity = "0";
                            bf.style.height = "44px";
                        }
                        var s = $("rkStars");
                        if (s) s.style.backgroundPosition = "0 0";
                        $("rkStart").classList.add("hidden");
                        $("rkCash").classList.remove("hidden");
                        if (rkRaf) cancelAnimationFrame(rkRaf);
                        rkRaf = requestAnimationFrame(rkLoop);
                        if (rkPollT) clearInterval(rkPollT);
                        rkPollT = setInterval(rkPoll, 120);
                    })
                    .catch(function () {
                        busy = false;
                    });
            }
            function rkLoop() {
                if (!GAME._flying) return;
                var el = (Date.now() - rkLocalStart) / 1000;
                var m = Math.max(1, Math.exp(GAME._k * Math.pow(el, GAME._p)));
                m = Math.floor(m * 100) / 100;
                var d = Math.log(m),
                    p = rkPos(d);
                var r = $("rkRocket");
                if (r) {
                    r.style.left = p.x + "%";
                    r.style.top = p.y + "%";
                }
                // Blue boost flame: fades in slowly once the multiplier passes ~20× and
                // grows as it climbs — a trailing boost jet, not a hard on/off.
                var bf = $("rkBoost");
                if (bf) {
                    var bg =
                        m >= RK_BOOST_AT
                            ? Math.min(
                                  1,
                                  (Math.log(m) - Math.log(RK_BOOST_AT)) /
                                      (Math.log(1000) - Math.log(RK_BOOST_AT)),
                              )
                            : 0;
                    bf.style.opacity = (bg * 0.9).toFixed(3);
                    bf.style.height = 44 + bg * 80 + "px";
                }
                // Camera follow: once past the anchor, pin the rocket and scroll the starfield
                // down-left. The scroll rate tracks dm/dt, so stars accelerate with the rocket.
                var s = $("rkStars");
                if (s)
                    s.style.backgroundPosition =
                        -p.over * RK_PX + "px " + p.over * RK_PX + "px";
                var mult = $("rkMult");
                if (mult) mult.textContent = m.toFixed(2) + "×";
                var cv = $("rkCashVal");
                if (cv) cv.textContent = fmt(Math.round(bet() * m));
                // Auto cash out: the client triggers it at the target mult; the server still
                // validates against the (hidden) crash point, so this is display-only timing.
                if (GAME._auto && GAME._auto > 1 && m >= GAME._auto) {
                    rkCashout();
                    return;
                }
                rkRaf = requestAnimationFrame(rkLoop);
            }
            function rkPoll() {
                if (!GAME._flying) return;
                post("crash/status", {})
                    .then(function (d) {
                        if (GAME._flying && d.crashed) rkCrash(d);
                    })
                    .catch(function () {});
            }
            function rkCashout() {
                if (!GAME._flying || busy) return;
                busy = true;
                post("crash/cashout", {})
                    .then(function (d) {
                        busy = false;
                        if (d.error) return;
                        if (d.cashed) rkWin(d);
                        else if (d.crashed) rkCrash(d);
                    })
                    .catch(function () {
                        busy = false;
                    });
            }
            function rkWin(d) {
                GAME._flying = false;
                if (rkPollT) {
                    clearInterval(rkPollT);
                    rkPollT = 0;
                }
                if (rkRaf) {
                    cancelAnimationFrame(rkRaf);
                    rkRaf = 0;
                }
                bal = d.balance;
                setBal();
                var mult = $("rkMult");
                mult.textContent = d.mult.toFixed(2) + "×";
                mult.className = "rk-mult win";
                var r = $("rkRocket");
                if (r) {
                    r.style.transition =
                        "left .6s ease-in, top .6s ease-in, opacity .6s ease-in";
                    r.style.left = "112%";
                    r.style.top = "-12%";
                    r.style.opacity = "0";
                }
                var bf = $("rkBoost");
                if (bf) bf.style.opacity = "0";
                sfx("win");
                msg(
                    "Cashed out +" +
                        fmt(d.payout) +
                        " FC (" +
                        d.mult.toFixed(2) +
                        "×)",
                    "good",
                );
                setTimeout(rkReset, 800);
            }
            function rkCrash(d) {
                GAME._flying = false;
                if (rkPollT) {
                    clearInterval(rkPollT);
                    rkPollT = 0;
                }
                if (rkRaf) {
                    cancelAnimationFrame(rkRaf);
                    rkRaf = 0;
                }
                if (d.balance !== undefined) {
                    bal = d.balance;
                    setBal();
                }
                var c = d.crash || 1;
                var mult = $("rkMult");
                mult.textContent = c.toFixed(2) + "×";
                mult.className = "rk-mult crash";
                var pc = rkPos(Math.log(c));
                var b = $("rkBurst"),
                    rg = $("rkRing"),
                    r = $("rkRocket"),
                    sky = $("rkSky");
                if (b) {
                    b.style.left = pc.x + "%";
                    b.style.top = pc.y + "%";
                    b.classList.remove("go");
                    void b.offsetWidth;
                    b.classList.add("go");
                }
                if (rg) {
                    rg.style.left = pc.x + "%";
                    rg.style.top = pc.y + "%";
                    rg.classList.remove("go");
                    void rg.offsetWidth;
                    rg.classList.add("go");
                }
                if (r) {
                    r.style.opacity = "0";
                    r.classList.remove("flying");
                }
                var bf = $("rkBoost");
                if (bf) bf.style.opacity = "0";
                if (sky) {
                    sky.classList.remove("shake");
                    void sky.offsetWidth;
                    sky.classList.add("shake");
                }
                sfx("lose");
                msg(
                    "💥 Crashed at " +
                        c.toFixed(2) +
                        "× — lost " +
                        fmt(bet()) +
                        " FC",
                    "bad",
                );
                setTimeout(rkReset, 950);
            }
            window.sgPaintTax && window.sgPaintTax(); // show the active server's tax cut
        </script>
    </body>
</html>
