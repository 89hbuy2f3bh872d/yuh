<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slots — SirGreen Casino</title>
<link rel="stylesheet" href="/assets/css/app.css">
<link rel="stylesheet" href="/assets/css/slots.css">
</head>
<body>
<div class="app">
__SIDEBAR__
<main class="main">

<!-- ── Lobby ─────────────────────────────────────────────────────────── -->
<div id="view-list">
  <div class="page-head"><div>
    <h1 class="page-title"><svg class="icon" viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 13L2 9Z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg> Slots</h1>
    <div class="page-sub">Cluster pays · tumbling reels · free spins & buy bonus.</div>
  </div><span class="srv-tax-note" hidden></span></div>
  <div class="slot-grid" id="slotGrid"><div class="empty">Loading…</div></div>
</div>

<!-- ── Game ──────────────────────────────────────────────────────────── -->
<div id="view-game" class="hidden">
  <div class="page-head">
    <div><h1 class="page-title" id="gameTitle"><span></span></h1><div class="page-sub" id="gameTag"></div></div>
    <span class="srv-tax-note" hidden></span>
    <div class="page-actions">
      <button class="btn btn-ghost" id="muteBtn" onclick="toggleMute()" title="Mute music"><svg class="icon" viewBox="0 0 24 24" id="muteIcon"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg></button>
      <button class="btn btn-ghost" onclick="showInfo()"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg> Paytable</button>
      <button class="btn btn-ghost" onclick="backToLobby()"><svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> Lobby</button>
    </div>
  </div>

  <div class="machine">
    <div class="machine-top">
      <div class="meter-grp">
        <div class="meter"><span class="meter-lbl">Win</span><b id="winMeter">0</b> FC</div>
        <div class="gmult hidden" id="gmult"><span class="meter-lbl">Global</span><b id="gmultVal">×1</b></div>
      </div>
      <div class="fs-banner hidden" id="fsBanner"><svg class="icon" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg> <span id="fsText">Free Spins</span></div>
      <div class="meter right"><span class="meter-lbl">Balance</span><b id="balMeter">0</b> FC</div>
    </div>

    <div class="reel-stage">
      <div class="reels" id="reels"></div>
      <div class="stage-msg hidden" id="stageMsg"></div>
    </div>

    <div class="controls">
      <div class="bet-box">
        <span class="bet-lbl">Bet</span>
        <button class="step-btn" onclick="adjustBet(-1)">−</button>
        <span class="bet-val" id="betVal">20</span>
        <button class="step-btn" onclick="adjustBet(1)">+</button>
      </div>
      <button class="turbo-btn" id="turboBtn" onclick="toggleTurbo()" title="Turbo (faster spins)"><svg class="icon" viewBox="0 0 24 24"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/></svg></button>
      <button class="spin-btn" id="spinBtn" onclick="doSpin(false)">
        <svg class="icon" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-9-9c2.5 0 4.5 1 6 2.5L21 3M21 3v6h-6"/></svg><span>SPIN</span>
      </button>
      <div class="buy-wrap" id="buyWrap">
        <div class="buy-col" id="buyCol">
          <button class="buy-btn reg" id="buyReg" onclick="doSpin('regular')"><span class="buy-top">Buy Bonus</span><span class="buy-cost" id="costReg">—</span></button>
          <button class="buy-btn sup" id="buySup" onclick="doSpin('super')"><span class="buy-top">Buy SUPER</span><span class="buy-cost" id="costSup">—</span></button>
        </div>
      </div>
    </div>
    <div class="quick-bets" id="quickBets"></div>
    <div class="slot-toast hidden" id="slotToast"></div>
  </div>
</div>

<!-- Paytable modal -->
<div id="infoOverlay" class="overlay hidden" onclick="if(event.target===this)hideInfo()">
  <div class="info-card">
    <div class="info-head"><b id="infoTitle">Paytable</b><button class="btn btn-ghost btn-sm" onclick="hideInfo()">✕</button></div>
    <div id="infoBody"></div>
  </div>
</div>

<!-- Free-spins intro -->
<div id="fsIntro" class="overlay hidden">
  <div class="fsi-card">
    <div class="fsi-burst" id="fsiBurst">⚡</div>
    <div class="fsi-title" id="fsiTitle">FREE SPINS!</div>
    <div class="fsi-count"><b id="fsiCount">10</b> spins</div>
    <div class="fsi-sub" id="fsiSub"></div>
    <button class="btn btn-primary fsi-ok" id="fsiOk">Start bonus</button>
  </div>
</div>

<!-- Big-win overlay -->
<div id="winOverlay" class="overlay hidden">
  <div class="bigwin-card">
    <div class="bigwin-label" id="bigwinLabel">BIG WIN</div>
    <div class="bigwin-amt" id="bigwinAmt">0 FC</div>
    <button class="btn btn-primary" id="bwCollect">Collect</button>
  </div>
</div>
</main>
</div>

<script>
function $(id){return document.getElementById(id);}
function fmt(n){return Number(Math.round(n||0)).toLocaleString();}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}

var GAMES=[], GAME=null, bal=0, busy=false, turbo=false;
var BET_LEVELS=[1,2,5,10,20,40,80,150,300,600,1000,2000], betIdx=4;
function toggleTurbo(){ turbo=!turbo; var b=$('turboBtn'); if(b)b.classList.toggle('on',turbo); }

function refreshBal(){ return fetch('/api/balance').then(function(r){return r.ok?r.json():null}).then(function(d){ if(d&&d.bal!==undefined){bal=Number(d.bal);var e=$('sbBal');if(e)e.textContent=fmt(bal);var bm=$('balMeter');if(bm)bm.textContent=fmt(bal);} }).catch(function(){}); }
refreshBal(); /* balance kept live via WS */

function bet(){ return BET_LEVELS[betIdx]; }
// Build the buy-button area. Candy/olympus keep their 2-button .buy-col; bandit gets a
// 4-button .buy-row driven by GAME.buys (FeatureSpins / Rainbow / Luck / Gold).
function renderBuyBar(){
  var wrap=$('buyWrap'); if(!wrap||!GAME)return;
  if(GAME.engine==='bandit'&&GAME.buys){
    var html='<div class="buy-row">';
    GAME.buys.forEach(function(b){
      html+='<button class="buy-btn chip" data-buy="'+b.id+'" onclick="doSpin(\''+b.id+'\')"><span class="buy-top">'+b.top+'</span><span class="buy-cost">'+fmt(bet()*b.mult)+' FC</span></button>';
    });
    html+='</div>';
    wrap.innerHTML=html;
  } else if(!document.getElementById('buyCol')){
    // restored from a bandit game → rebuild the legacy 2-button layout
    wrap.innerHTML='<div class="buy-col" id="buyCol">'
      +'<button class="buy-btn reg" id="buyReg" onclick="doSpin(\'regular\')"><span class="buy-top">Buy Bonus</span><span class="buy-cost" id="costReg">—</span></button>'
      +'<button class="buy-btn sup" id="buySup" onclick="doSpin(\'super\')"><span class="buy-top">Buy SUPER</span><span class="buy-cost" id="costSup">—</span></button>'
      +'</div>';
  }
}
function setBetMeters(){
  $('betVal').textContent=fmt(bet());
  if(GAME&&GAME.engine==='bandit'&&GAME.buys){
    // re-price each bandit buy chip at the current bet
    GAME.buys.forEach(function(b){ var el=document.querySelector('.buy-btn[data-buy="'+b.id+'"] .buy-cost'); if(el)el.textContent=fmt(bet()*b.mult)+' FC'; });
  } else if(GAME&&GAME.buy){
    $('costReg').textContent=fmt(bet()*(GAME.buy.regular||0))+' FC';
    $('costSup').textContent=fmt(bet()*(GAME.buy.super||0))+' FC';
  }
}
function adjustBet(d){ betIdx=Math.max(0,Math.min(BET_LEVELS.length-1,betIdx+d)); setBetMeters(); renderQuick(); }
function renderQuick(){ var el=$('quickBets'); if(!el)return; el.innerHTML=''; BET_LEVELS.forEach(function(v,i){ var b=document.createElement('button'); b.className='qbet'+(i===betIdx?' on':''); b.textContent=fmt(v); b.onclick=function(){betIdx=i;setBetMeters();renderQuick();}; el.appendChild(b); }); }

function toggleMute(){ if(!window.SG)return; var m=!SG.get().muted; SG.setMuted(m); updateMuteIcon(); }
function updateMuteIcon(){ var muted=window.SG?SG.get().muted:false; var ic=$('muteIcon'); if(ic) ic.innerHTML=muted?'<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M23 9l-6 6M17 9l6 6"/>':'<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/>'; }

// ── Lobby ───────────────────────────────────────────────────────────────
fetch('/api/slots/games').then(function(r){return r.json()}).then(function(d){ GAMES=d.games||[]; renderLobby(); }).catch(function(){ $('slotGrid').innerHTML='<div class="empty">Failed to load games.</div>'; });
var LOGOS={
  candy:'<path d="m9.5 7.5-2 2a4.95 4.95 0 1 0 7 7l2-2a4.95 4.95 0 1 0-7-7Z"/><path d="M14 6.5v10"/><path d="M10 7.5v10"/><path d="m16 7 1-5 1.37.68A3 3 0 0 1 20 5.4V7l1.5 1.5a3 3 0 0 1 0 4.2L20 14"/><path d="m8 17-1 5-1.37-.68A3 3 0 0 1 4 18.6V17l-1.5-1.5a3 3 0 0 1 0-4.2L4 10"/>',
  olympus:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  bandit:'<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
};
function slotLogo(g){
  var glyph=LOGOS[g.id]||LOGOS.candy, id='lg-'+g.id;
  return '<svg class="slot-logo" viewBox="0 0 64 64" aria-hidden="true"><defs>'+
    '<linearGradient id="'+id+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+g.color+'"/><stop offset="1" stop-color="#0c0c12"/></linearGradient>'+
    '<radialGradient id="'+id+'-h" cx="0.35" cy="0.3" r="0.8"><stop offset="0" stop-color="#fff" stop-opacity="0.28"/><stop offset="0.6" stop-color="#fff" stop-opacity="0"/></radialGradient></defs>'+
    '<rect x="4" y="4" width="56" height="56" rx="17" fill="url(#'+id+')"/>'+
    '<rect x="4.75" y="4.75" width="54.5" height="54.5" rx="16.25" fill="none" stroke="'+g.color+'" stroke-opacity="0.55"/>'+
    '<rect x="4" y="4" width="56" height="56" rx="17" fill="url(#'+id+'-h)"/>'+
    '<g transform="translate(20 20)" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+glyph+'</g></svg>';
}
function renderLobby(){
  var el=$('slotGrid'); el.innerHTML='';
  GAMES.forEach(function(g){
    var card=document.createElement('div'); card.className='slot-card'; card.style.setProperty('--gc',g.color);
    card.innerHTML='<div class="slot-card-art">'+slotLogo(g)+'</div>'+
      '<div class="slot-card-body"><div class="slot-card-name">'+g.name+'</div><div class="slot-card-tag">'+g.tag+'</div>'+
      '<div class="slot-card-meta">'+g.W+'×'+g.H+' · clusters of '+g.minCluster+'+ · 3/4/5 '+g.scatter.emoji+' = bonus</div></div>'+
      '<button class="btn btn-primary slot-play">Play</button>';
    card.querySelector('.slot-play').onclick=function(){ openGame(g.id); };
    el.appendChild(card);
  });
}

function openGame(id){
  GAME=GAMES.filter(function(g){return g.id===id;})[0]; if(!GAME)return;
  $('view-list').classList.add('hidden'); $('view-game').classList.remove('hidden');
  $('gameTitle').querySelector('span').textContent=GAME.name; $('gameTitle').style.setProperty('--gc',GAME.color);
  $('gameTag').textContent=GAME.tag; document.querySelector('.machine').style.setProperty('--gc',GAME.color);
  setBetMeters(); renderBuyBar(); renderQuick(); updateMuteIcon();
  buildGrid(); fillIdle();
  busy=false; setControls(true); // fresh state
  if(window.SG&&SG.music)SG.music.play(GAME.id);
  refreshBal();
}
function backToLobby(){ if(busy)return; if(window.SG&&SG.music)SG.music.stop(); $('view-game').classList.add('hidden'); $('view-list').classList.remove('hidden'); }

// ── Grid ────────────────────────────────────────────────────────────────
function buildGrid(){
  var r=$('reels'); r.style.setProperty('--w',GAME.W); r.style.setProperty('--h',GAME.H); r.innerHTML='';
  for(var i=0;i<GAME.W*GAME.H;i++){ var c=document.createElement('div'); c.className='cell'; c.id='cell-'+i; c.innerHTML='<div class="sym"></div>'; r.appendChild(c); }
}
function symHtml(s){
  if(s==='SC'||s===GAME.scatter.id) return '<span class="sglow sc"></span>'+(GAME.scatter.emoji||'⭐');
  if(s==='RB') return '<span class="sglow rb"></span>'+(GAME.rainbow||'🌈');
  if(isMult(s)) return '<span class="sglow mu"></span>'+(GAME.mult?GAME.mult.emoji:'🪙')+'<span class="mbadge">×'+multVal(s)+'</span>';
  return GAME.sym[s]||'❔';
}
function isMult(s){ return typeof s==='string'&&s.indexOf('M:')===0; }
function multVal(s){ return parseInt(s.slice(2),10)||0; }
function gridMults(grid){ var a=[]; for(var i=0;i<(grid||[]).length;i++) if(isMult(grid[i])) a.push({pos:i,val:multVal(grid[i])}); return a; }
function setContent(i,s){ var c=$('cell-'+i); if(!c)return; c.style.transition='none'; c.style.transform='translateY(0)'; c.innerHTML='<div class="sym">'+symHtml(s)+'</div>'; }
function renderGrid(cells){ for(var i=0;i<cells.length;i++) setContent(i,cells[i]); }
function fillIdle(){ var keys=Object.keys(GAME.sym),cells=[]; for(var i=0;i<GAME.W*GAME.H;i++)cells.push(keys[Math.floor(Math.random()*keys.length)]); renderGrid(cells); }
function unitPx(){ var c=$('cell-0'); if(!c)return 56; var g=parseFloat(getComputedStyle($('reels')).gap)||6; return c.offsetHeight+g; }

// Drop cells into place. fall[i] = rows ABOVE final spot the cell starts (0 = no move).
// delays[i] = ms before that cell starts. Each cell slides straight down (vertical).
// No opacity fades — cells only translate, so they read as solid objects falling.
function animateFall(cells, fall, delays, dur){
  var unit=unitPx(), maxd=0, i, c, fr;
  for(i=0;i<cells.length;i++){
    c=$('cell-'+i); if(!c)continue;
    c.innerHTML='<div class="sym">'+symHtml(cells[i])+'</div>';
    fr=fall[i]||0;
    c.style.transition='none';
    c.style.opacity='1';
    c.style.transform = fr>0 ? 'translateY('+(-fr*unit)+'px)' : 'translateY(0)';
  }
  void $('reels').offsetHeight; // commit start positions
  for(i=0;i<cells.length;i++){
    c=$('cell-'+i); if(!c)continue; fr=fall[i]||0; if(fr<=0)continue;
    var d=delays[i]||0; if(d>maxd)maxd=d;
    c.style.transition='transform '+dur+'ms cubic-bezier(.34,1.28,.5,1) '+d+'ms';
    c.style.transform='translateY(0)';
  }
  return maxd+dur;
}
// spin-out: the board tumbles DOWN out of frame, one COLUMN at a time (right→left) —
// mirrored by dropGrid, which fills left→right. Within a column the bottom cell leaves
// first, cascading up. No opacity fade; cells keep their symbol.
// Returns ms until the last cell has left the frame.
function spinOut(){
  var W=GAME.W, H=GAME.H, unit=unitPx();
  var COLG=turbo?70:155, ROWG=turbo?8:20, DUR=turbo?240:380;
  var maxd=0;
  for(var col=W-1; col>=0; col--){                    // columns leave right→left
    for(var row=H-1; row>=0; row--){                  // bottom cell of the column leaves first
      var idx=row*W+col, c=$('cell-'+idx); if(!c||!c.innerHTML.trim())continue;
      var d=(W-1-col)*COLG+(H-1-row)*ROWG; if(d>maxd)maxd=d;
      c.style.transition='none'; c.style.opacity='1'; c.style.transform='translateY(0)';
      void c.offsetWidth;
      c.style.transition='transform '+DUR+'ms cubic-bezier(.45,.05,.55,.4) '+d+'ms';
      c.style.transform='translateY('+((H-row+1.5)*unit)+'px)';  // fall clear of the board
    }
  }
  return maxd+DUR;
}
// spin entrance: new symbols fall in one COLUMN at a time, LEFT→RIGHT (mirrors the
// spin-out, which clears right→left). Within a column the cells cascade top→bottom.
// Cells start above the board (out of frame) and drop cleanly into place.
function dropGrid(cells){
  var W=GAME.W, COLG=turbo?70:155, ROWG=turbo?8:20, f=new Array(cells.length), del=new Array(cells.length);
  for(var i=0;i<cells.length;i++){ var row=(i/W)|0, col=i%W; f[i]=row+2; del[i]=col*COLG+row*ROWG; }
  return animateFall(cells, f, del, turbo?240:420);
}
// tumble: survivors fall into the holes, new symbols fall from above — only moved cells animate,
// rows settle bottom→top (vertical gravity)
function tumbleFall(nextCells, removed){
  var W=GAME.W,H=GAME.H, ROWS=turbo?22:54, f=new Array(W*H).fill(0), del=new Array(W*H).fill(0);
  for(var col=0; col<W; col++){
    var rc=0; for(var r=0;r<H;r++) if(removed.has(r*W+col)) rc++;
    if(!rc) continue;
    var surv=[]; for(var r2=0;r2<H;r2++) if(!removed.has(r2*W+col)) surv.push(r2);
    for(var i=0;i<surv.length;i++){ var nr=rc+i; f[nr*W+col]=nr-surv[i]; del[nr*W+col]=(H-1-nr)*ROWS; }
    for(var n=0;n<rc;n++){ f[n*W+col]=rc+2; del[n*W+col]=(H-1-n)*ROWS; }
  }
  return animateFall(nextCells, f, del, turbo?230:400);
}
function clearFx(){ for(var i=0;i<GAME.W*GAME.H;i++){ var c=$('cell-'+i); if(c)c.classList.remove('win','dim','pop','mhit'); } }
// Wild Bandit: paint Golden Square backgrounds on the given cell indices. Pass [] to clear.
function paintGold(indices){
  for(var i=0;i<GAME.W*GAME.H;i++){ var c=$('cell-'+i); if(c)c.classList.remove('gold'); }
  if(indices&&indices.length){ indices.forEach(function(i){ var c=$('cell-'+i); if(c)c.classList.add('gold'); }); }
}
// Wild Bandit: animate coin reveals flying from gold cells to the win meter.
// reveals: [{pos, tier, val}] — each pops a coin chip colored by tier, flies to #winMeter.
function revealCoins(reveals){
  return new Promise(function(resolve){
    if(!reveals||!reveals.length){ resolve(); return; }
    var meter=$('winMeter'); var mr=meter?meter.getBoundingClientRect():{left:innerWidth/2,top:innerHeight/2};
    var tierEmoji={bronze:'🥉',silver:'🥈',gold:'🥇'};
    reveals.forEach(function(r,i){
      var cell=$('cell-'+r.pos); var cr=cell?cell.getBoundingClientRect():mr;
      var chip=document.createElement('div'); chip.className='coin-fly '+r.tier;
      chip.innerHTML='<span class="cf-ic">'+(tierEmoji[r.tier]||'🪙')+'</span><span class="cf-v">'+r.val+'×</span>';
      chip.style.left=cr.left+cr.width/2+'px'; chip.style.top=cr.top+cr.height/2+'px';
      document.body.appendChild(chip);
      if(cell)cell.classList.add('activated');
      setTimeout(function(){
        chip.style.transform='translate('+(mr.left+mr.width/2-(cr.left+cr.width/2))+'px,'+(mr.top+mr.height/2-(cr.top+cr.height/2))+'px) scale(.4)';
        chip.style.opacity='0';
      }, 60 + i*(turbo?40:110));
      setTimeout(function(){ if(chip.parentNode)chip.parentNode.removeChild(chip); }, 700 + i*(turbo?40:110));
    });
    if(window.SG)SG.sfx('coin');
    setTimeout(resolve, 700 + reveals.length*(turbo?40:110));
  });
}

// ── Spin / round ─────────────────────────────────────────────────────────
function setWin(v){ $('winMeter').textContent=fmt(v); }
function stageMsg(t){ var m=$('stageMsg'); if(!t){m.classList.add('hidden');return;} m.innerHTML=t; m.classList.remove('hidden'); }
var toastT=null;
function toast(t){ var el=$('slotToast'); if(!el)return; el.textContent=t; el.classList.remove('hidden'); el.classList.add('show'); if(toastT)clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove('show'); el.classList.add('hidden'); },1800); }
function setControls(on){ $('spinBtn').disabled=!on; var br=$('buyReg'),bs=$('buySup'); if(br)br.disabled=!on; if(bs)bs.disabled=!on; document.querySelectorAll('.step-btn,.qbet,.buy-btn').forEach(function(b){b.disabled=!on;}); }

function doSpin(buy){
  if(busy||!GAME)return;
  var b=bet(); var cost;
  if(GAME.engine==='bandit'&&GAME.buys){
    var entry=GAME.buys.filter(function(x){return x.id===buy;})[0];
    cost = entry ? b*entry.mult : b;
  } else {
    cost = buy==='super'?b*(GAME.buy.super||0) : buy==='regular'?b*(GAME.buy.regular||0) : b;
  }
  if(cost>bal){ toast('Not enough balance'); return; }
  busy=true; setControls(false); setWin(0); $('fsBanner').classList.add('hidden'); $('gmult').classList.add('hidden'); stageMsg('');
  paintGold([]);   // clear any Golden Squares from the previous round
  if(window.SG)SG.sfx(buy?'coin':'spin');
  bal-=cost; $('balMeter').textContent=fmt(bal);
  fetch('/api/slots/spin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:GAME.id,bet:b,buy:buy||false})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.error){ toast(d.error); bal+=cost; $('balMeter').textContent=fmt(bal); busy=false; setControls(true); return; }
      animateRound(d);
    }).catch(function(){ toast('Network error'); bal+=cost; $('balMeter').textContent=fmt(bal); busy=false; setControls(true); });
}

function freeIntro(count, mode){
  return new Promise(function(resolve){
    var isBandit=GAME.engine==='bandit';
    if(isBandit){
      var titles={luck:'LUCK OF THE BANDIT!',gold:'ALL THAT GLITTERS IS GOLD!',rainbow:'TREASURE AT THE END OF THE RAINBOW!'};
      var subs={
        luck:'Winning cells become <b>Golden Squares</b>. A '+GAME.rainbow+' reveals their coin values — then they clear.',
        gold:'Golden Squares <b>stay active</b> for the whole feature — every '+GAME.rainbow+' reveals them again.',
        rainbow:'Every spin has a guaranteed '+GAME.rainbow+'. Golden Squares persist and reveal every spin!'
      };
      $('fsiBurst').textContent=GAME.rainbow||'🌈';
      $('fsiTitle').textContent=titles[mode]||'FREE SPINS!'; $('fsiTitle').className='fsi-title super';
      $('fsiCount').textContent=count; $('fsiSub').innerHTML=subs[mode]||'';
    } else {
      var hidden=mode==='hidden', sup=mode==='super'||hidden;
      $('fsiBurst').textContent=hidden?'🎁':GAME.scatter.emoji;
      $('fsiTitle').textContent=hidden?'HIDDEN BONUS!':sup?'SUPER FREE SPINS!':'FREE SPINS!';
      $('fsiTitle').className='fsi-title'+(hidden?' hidden':sup?' super':'');
      $('fsiCount').textContent=count;
      $('fsiSub').innerHTML = hidden
        ? 'Overpowered! Boosted '+GAME.mult.emoji+' build a <b>global multiplier</b> that boosts every win for the rest of the bonus.'
        : sup ? 'Every '+GAME.mult.emoji+' on a winning spin raises a <b>global multiplier</b> that boosts every win for the rest of the bonus.'
        : 'Every '+GAME.mult.emoji+' on a winning spin multiplies that win. Good luck!';
    }
    $('fsiOk').style.display='';
    $('fsIntro').classList.remove('hidden');
    if(window.SG)SG.sfx('scatter');
    var ok=$('fsiOk'); var done=function(){ ok.removeEventListener('click',done); $('fsIntro').classList.add('hidden'); resolve(); };
    ok.addEventListener('click',done);
  });
}
// mid-bonus retrigger — same card, auto-dismisses (no click needed)
function retriggerPopup(n){
  return new Promise(function(resolve){
    $('fsiBurst').textContent=GAME.scatter.emoji;
    $('fsiTitle').textContent='RE-TRIGGER!'; $('fsiTitle').className='fsi-title';
    $('fsiCount').textContent='+'+n;
    $('fsiSub').innerHTML='Additional spins awarded!';
    $('fsiOk').style.display='none';
    $('fsIntro').classList.remove('hidden');
    if(window.SG)SG.sfx('scatter');
    setTimeout(function(){ $('fsIntro').classList.add('hidden'); $('fsiOk').style.display=''; resolve(); }, turbo?900:1600);
  });
}

async function animateRound(d){
  var roundWin=0;
  var useGlobal = d.mode==='super' || d.mode==='hidden';   // global meter shown for Super/Hidden
  try {
    // base spins (before bonus)
    var bi=0;
    while(bi<d.spins.length && !d.spins[bi].free){ await animateSpin(d.spins[bi], roundWin, false); roundWin+=d.spins[bi].total; setWin(roundWin); bi++; await sleep(turbo?90:300); }
    // bonus
    if(d.freeTriggered){
      var spinsMap=(GAME.scatter&&GAME.scatter.spins)||{};
      var total=spinsMap[d.mode]||d.freeAwarded||d.spins.filter(function(s){return s.free;}).length;
      await freeIntro(total, d.mode);   // show the BASE award; retriggers reveal later
      if(window.SG&&SG.music)SG.music.play(GAME.id+'B');
      $('fsBanner').classList.remove('hidden');
      if(useGlobal){ $('gmult').classList.remove('hidden'); $('gmultVal').textContent='×1'; }
      var fdone=0;
      for(var i=bi;i<d.spins.length;i++){ var sp=d.spins[i]; fdone++;
        $('fsText').textContent='Free Spin '+fdone+' / '+total;
        await animateSpin(sp, roundWin, true);
        roundWin+=sp.total; setWin(roundWin);
        if(sp.retrigger>0){ total+=sp.retrigger; await retriggerPopup(sp.retrigger); } // grow total + popup
        await sleep(turbo?120:560);   // slower bonus pacing
      }
      // Super/Hidden: apply the collected global multiplier to the whole bonus win at the end
      if(useGlobal && d.superMult>1){ await sleep(turbo?200:400); await endMultiply(d.superPre!=null?d.superPre:roundWin, d.superMult, d.totalWin); roundWin=d.totalWin; }
    }
    if(d.totalWin>0) await bigWin(d.totalWin, d.bet);
    // balance here already has the bet deducted; the WIN is added on Collect.
    bal=d.balance; $('balMeter').textContent=fmt(bal); var sb=$('sbBal'); if(sb)sb.textContent=fmt(bal);
  } catch(e){ console.error('animateRound',e); }
  finally {
    $('fsBanner').classList.add('hidden'); $('gmult').classList.add('hidden');
    if(window.SG&&SG.music&&GAME)SG.music.play(GAME.id);
    if(d && d.totalWin>0){ collectWin(); }   // auto-collect the win once the animation ends
    else { busy=false; setControls(true); }
  }
}
// Credit the held win (server pays it now) and re-enable play. No button — automatic.
function collectWin(){
  if(window.SG)SG.sfx('coin');
  fetch('/api/slots/collect',{method:'POST',headers:{'Content-Type':'application/json'}})
    .then(function(r){return r.json()}).then(function(j){
      if(j&&j.balance!=null){ bal=Number(j.balance); $('balMeter').textContent=fmt(bal); var sb=$('sbBal'); if(sb)sb.textContent=fmt(bal); }
    }).catch(function(){})
    .finally(function(){ busy=false; setControls(true); });
}

async function animateSpin(sp, runningBefore, free){
  var STEP=turbo?230:700, POP=turbo?120:360;
  clearFx();
  // Spin-out the old board first (columns clear right→left, falling out of frame),
  // THEN drop the new grid in one row at a time left→right. The spin-out is skipped
  // when the board is empty (first spin / after a wipe) so we don't animate nothing.
  var hasContent=false; for(var i=0;i<GAME.W*GAME.H;i++){ if($('cell-'+i)&&$('cell-'+i).innerHTML.trim()){hasContent=true;break;} }
  if(hasContent){ var so=spinOut(); await sleep(so+ (turbo?40:90)); if(window.SG)SG.sfx('spin'); }
  var md=dropGrid(sp.steps[0].grid);
  await sleep(md+60);
  var spinWin=0, lastRendered=0;
  for(var st=0; st<sp.steps.length; st++){
    var step=sp.steps[st];
    if(!step.wins||!step.wins.length) break;   // final no-win step ends the tumble
    var winPos=[]; step.wins.forEach(function(w){ w.positions.forEach(function(p){winPos.push(p);}); });
    dimExcept(winPos); winPos.forEach(function(i){var c=$('cell-'+i);if(c)c.classList.add('win');});
    if(window.SG)SG.sfx('win');
    spinWin+=step.stepWin; setWin(runningBefore+spinWin);
    await sleep(STEP);
    if(window.SG)SG.sfx('pop');
    winPos.forEach(function(i){var c=$('cell-'+i);if(c)c.classList.add('pop');});
    await sleep(POP);
    clearFx();
    if(sp.steps[st+1]){ var removed=new Set(winPos); var md2=tumbleFall(sp.steps[st+1].grid, removed); await sleep(md2+60); lastRendered=st+1; }
  }
  // The tumble always ends on a no-win step whose grid holds any surviving multiplier
  // symbols. The loop above breaks BEFORE rendering it — so draw that final grid now,
  // otherwise the multiplier symbols are invisible when the reveal flies them to the meter.
  if(lastRendered < sp.steps.length-1){ renderGrid(sp.steps[sp.steps.length-1].grid); await sleep(turbo?120:260); }
  // Wild Bandit: paint persistent Golden Squares, then if a Rainbow landed this spin,
  // animate the coin reveals (fly each gold cell's coin to the win meter).
  if(GAME.engine==='bandit'){
    if(sp.gold&&sp.gold.length) paintGold(sp.gold);
    if(sp.reveal&&sp.reveal.length){ try{ await revealCoins(sp.reveal); }catch(e){ console.error('revealCoins',e); } }
    if(sp.total>0){ setWin(runningBefore + sp.total); var bwm=$('winMeter'); if(bwm){ bwm.classList.remove('mult-pop'); void bwm.offsetWidth; bwm.classList.add('mult-pop'); } }
  }
  // multiplier reveal
  if(sp.super){
    // Super/Hidden PROGRESSIVE global: a winning spin's multipliers raise the global meter,
    // then this spin's win is paid at the current global. Climb the meter (FIRST so it can't
    // silently skip), then pop the win meter to the multiplied per-spin total.
    if(sp.multAdded>0){
      var gm=$('gmult'); if(gm)gm.classList.remove('hidden');
      var gv=$('gmultVal'); if(gv)gv.textContent='×'+(sp.globalMult||1);
      if(gm){ gm.classList.remove('bump'); void gm.offsetWidth; gm.classList.add('bump'); }
      if(window.SG)SG.sfx('mult');
      var ml=(sp.mults&&sp.mults.length)?sp.mults:gridMults(sp.steps[sp.steps.length-1].grid);
      try{ await flyMults(ml, sp.globalMult); }catch(e){ console.error('flyMults',e); }
    }
    // every winning spin is multiplied by the running global → show the boosted total now
    if(sp.globalMult>1 && sp.total>0){
      setWin(runningBefore + sp.total);
      var swm=$('winMeter'); if(swm){ swm.classList.remove('mult-pop'); void swm.offsetWidth; swm.classList.add('mult-pop'); }
    }
  } else if(sp.multApplied>0){
    // Regular bonus (and any non-global spin): every multiplier on the board applies to
    // THIS win, regardless of placement. Show it landing, then pop the win to the total.
    var fin=sp.steps[sp.steps.length-1].grid, mpos=[];
    for(var i=0;i<fin.length;i++){ if(isMult(fin[i]))mpos.push(i); }
    mpos.forEach(function(i){var c=$('cell-'+i);if(c)c.classList.add('mhit');});
    if(window.SG)SG.sfx('mult');
    stageMsg('×'+sp.multApplied);
    await sleep(turbo?350:650);
    setWin(runningBefore + sp.total);   // meter jumps to the multiplied win now
    var wm=$('winMeter'); if(wm){ wm.classList.remove('mult-pop'); void wm.offsetWidth; wm.classList.add('mult-pop'); }
    await sleep(turbo?260:480); stageMsg(''); clearFx();
  }
}
function dimExcept(keep){ var set={}; keep.forEach(function(i){set[i]=1;}); for(var i=0;i<GAME.W*GAME.H;i++){ var c=$('cell-'+i); if(c)c.classList.toggle('dim',!set[i]); } }

// fly each x-value from its cell to the global-multiplier meter, then bump it
function flyMults(mults, newGlobal){
  var meter=$('gmult'); if(!meter) return Promise.resolve();
  var mr=meter.getBoundingClientRect(), tx=mr.left+mr.width/2, ty=mr.top+mr.height/2;
  var proms=[];
  mults.forEach(function(m,k){
    var c=$('cell-'+m.pos); if(c)c.classList.add('mhit');
    var cr=(c||meter).getBoundingClientRect(), sx=cr.left+cr.width/2, sy=cr.top+cr.height/2;
    var el=document.createElement('div'); el.className='mult-fly'; el.textContent='×'+m.val;
    el.style.left=sx+'px'; el.style.top=sy+'px'; el.style.transform='translate(-50%,-50%) scale(1)';
    document.body.appendChild(el);
    proms.push(new Promise(function(res){
      setTimeout(function(){
        el.style.transform='translate(calc(-50% + '+(tx-sx)+'px), calc(-50% + '+(ty-sy)+'px)) scale(.55)';
        el.style.opacity='0.25';
        setTimeout(function(){ if(el.parentNode)el.parentNode.removeChild(el); res(); },720);
      }, 40+k*130);
    }));
  });
  return Promise.all(proms).then(function(){
    var gv=$('gmultVal'); if(gv)gv.textContent='×'+newGlobal;
    meter.classList.remove('bump'); void meter.offsetWidth; meter.classList.add('bump');
  });
}

// end of super bonus: the global multiplier flies to the WIN meter and multiplies the total
function endMultiply(pre, mult, final){
  return new Promise(function(resolve){
    var g=$('gmult'), w=$('winMeter');
    if(!g||!w){ setWin(final); resolve(); return; }
    var gr=g.getBoundingClientRect(), wr=w.getBoundingClientRect();
    var sx=gr.left+gr.width/2, sy=gr.top+gr.height/2, tx=wr.left+wr.width/2, ty=wr.top+wr.height/2;
    var fly=document.createElement('div'); fly.className='mult-fly big'; fly.textContent='×'+mult;
    fly.style.left=sx+'px'; fly.style.top=sy+'px'; fly.style.transform='translate(-50%,-50%) scale(1)';
    document.body.appendChild(fly);
    if(window.SG)SG.sfx('mult');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      fly.style.transition='transform .85s cubic-bezier(.4,0,.2,1),opacity .85s';
      fly.style.transform='translate(calc(-50% + '+(tx-sx)+'px), calc(-50% + '+(ty-sy)+'px)) scale(1.5)';
      fly.style.opacity='0';
    });});
    setTimeout(function(){
      if(fly.parentNode)fly.parentNode.removeChild(fly);
      if(window.SG)SG.sfx('bigwin');
      w.classList.remove('mult-pop'); void w.offsetWidth; w.classList.add('mult-pop');
      var t0=performance.now(), dur=1100;
      (function tick(now){ var p=Math.min(1,(now-t0)/dur); var s=p*p*(3-2*p); setWin(Math.round(pre+(final-pre)*s)); if(p<1)requestAnimationFrame(tick); else { setWin(final); resolve(); } })(performance.now());
    },860);
  });
}

// ── Big win count-up ─────────────────────────────────────────────────────
async function bigWin(total, betAmt){
  var x=total/betAmt; if(x<10) return;
  var label = x>=500?'INSANE WIN':x>=150?'MEGA WIN':x>=50?'HUGE WIN':'BIG WIN';
  var lbl=$('bigwinLabel'), amt=$('bigwinAmt'), ov=$('winOverlay'); if(!lbl||!amt||!ov)return;
  lbl.textContent=label; lbl.setAttribute('data-tier', x>=150?'mega':x>=50?'huge':'big');
  if(window.SG)SG.sfx('bigwin');
  ov.classList.remove('hidden');
  var dur=Math.min(4000,1400+Math.log10(x)*900), t0=performance.now(), skipped=false;
  var col=$('bwCollect'); var onSkip=function(){ skipped=true; }; col.addEventListener('click',onSkip);
  await new Promise(function(resolve){
    (function tick(now){
      var p=Math.min(1,(now-t0)/dur); if(skipped)p=1;
      amt.textContent=fmt(total*(p*p*(3-2*p)))+' FC';   // smoothstep count-up
      if(window.SG && p<1 && Math.random()<0.25) SG.sfx('tick');
      if(p<1) requestAnimationFrame(tick); else { amt.textContent=fmt(total)+' FC'; resolve(); }
    })(performance.now());
  });
  col.removeEventListener('click',onSkip);
  await new Promise(function(res){ var f=function(){ $('bwCollect').removeEventListener('click',f); $('winOverlay').classList.add('hidden'); res(); }; $('bwCollect').addEventListener('click',f); setTimeout(f,2500); });
}

// ── Paytable ─────────────────────────────────────────────────────────────
function showInfo(){
  if(!GAME)return;
  $('infoTitle').textContent=GAME.name+' — Paytable';
  var note;
  if(GAME.engine==='bandit'){
    note='Win when <b>'+GAME.minCluster+'+ identical symbols connect</b> horizontally or vertically (no diagonals). Wins tumble — winners vanish, new symbols fall in.<br>'
      +'<b>Winning cells become Golden Squares.</b> A '+GAME.rainbow+' lands to reveal their coin values (Bronze / Silver / Gold).<br>'
      +'<b>'+GAME.scatter.emoji+' cameras:</b> 3 = <b>Luck of the Bandit</b> (8 spins), 4 = <b>All That Glitters Is Gold</b> (12 spins), 5 = <b>Treasure at the End of the Rainbow</b> (12 spins, guaranteed '+GAME.rainbow+' each spin).';
  } else {
    note='Win when <b>'+GAME.minCluster+'+ identical symbols connect</b> horizontally or vertically (no diagonals). Wins tumble — winners vanish, new symbols fall in.<br><b>'+GAME.scatter.emoji+' scatters:</b> 3 = Regular bonus (per-spin multipliers), 4 = Super bonus (global multiplier), 5 = <b>Hidden bonus</b> (overpowered, can\'t be bought). In Super/Hidden, every '+GAME.mult.emoji+' on a winning spin feeds the <b>global multiplier</b>, applied to the whole bonus at the end.';
  }
  var html='<div class="pt-note">'+note+'</div><div class="pt-grid">';
  Object.keys(GAME.pays).reverse().forEach(function(k){
    var rows=GAME.pays[k].map(function(t){return '<span>'+t[0]+'+ <b>'+t[1]+'×</b></span>';}).join('');
    html+='<div class="pt-row"><div class="pt-sym">'+GAME.sym[k]+'</div><div class="pt-tiers">'+rows+'</div></div>';
  });
  html+='</div>';
  $('infoBody').innerHTML=html; $('infoOverlay').classList.remove('hidden');
}
function hideInfo(){ $('infoOverlay').classList.add('hidden'); }
window.sgPaintTax && window.sgPaintTax(); // show the active server's tax cut
