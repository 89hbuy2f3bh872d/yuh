<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — SirGreen Casino</title>
<link rel="stylesheet" href="/assets/css/app.css">
<style>
/* admin runs in its own document (iframe) so its CSS never leaks into the app shell */
.admin-host{height:100vh;display:flex}
.admin-frame{flex:1;width:100%;height:100%;border:0;display:block;background:var(--bg)}
.main.admin-main{padding:0;max-width:none;margin:0}
</style>
</head>
<body>
<div class="app">
__SIDEBAR__
<main class="main admin-main">
  <div class="admin-host"><iframe class="admin-frame" src="/admin/panel" title="Admin Panel"></iframe></div>
</main>
</div>
</body>
</html>
