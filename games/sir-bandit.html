<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sir Bandit</title>
<style>
/* ============================================================
   SIR BANDIT — Cluster Pays, Cascades, Golden Squares
   Paris alleyway theme inspired by Le Bandit / Hacksaw Gaming
   ============================================================
   ASSET SWAP POINTS:
   Logo:       #logo-text  → replace with <img src="/assets/sir-bandit/logo.png">
   Background: body::before  → replace gradient with url('/assets/sir-bandit/bg.jpg')
   Raccoon:    #raccoon-art  → replace SVG with <img src="/assets/sir-bandit/raccoon.png">
   Symbols:    SYMBOLS[].emoji → add .img = '/assets/sir-bandit/crown.png'
   Music:      const BGM_SRC at top of script
   ============================================================ */

:root{
  --cream:  #f0e8c8;
  --cream2: #e8d8a0;
  --olive:  #8a9a4a;
  --olive2: #6a7a2a;
  --dark:   #1a1a0a;
  --panel:  #2a2a14;
  --panel2: #1e1e0c;
  --gold:   #f5c842;
  --gold2:  #ffd700;
  --bronze: #cd7f32;
  --silver: #c0c0c0;
  --green:  #44cc44;
  --red:    #cc4444;
  --border: #4a4a22;
  --cell-bg:#2e2e16;
  --cell-h: #3a3a1a;
  --glow-gold: 0 0 16px #f5c84299, 0 0 32px #f5c84244;
  --glow-green: 0 0 14px #44cc4466;
  --trans: 120ms cubic-bezier(0.22,1,0.36,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--dark)}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  color:var(--cream);
  -webkit-font-smoothing:antialiased;
  user-select:none;
  position:relative;
}

/* Paris alleyway background */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  /* REPLACE: background:url('/assets/sir-bandit/bg.jpg') center/cover no-repeat; */
  background:
    radial-gradient(ellipse 60% 40% at 15% 60%, #2a1a0a88 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 60%, #1a2a0a88 0%, transparent 60%),
    linear-gradient(180deg, #1a1a0a 0%, #2e2a14 40%, #1e1e0a 100%);
  pointer-events:none;
}
/* sepia vignette */
body::after{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, #0a0a0488 100%);
  pointer-events:none;
}

#app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;overflow:hidden}

/* ---- top bar ---- */
#topBar{
  flex-shrink:0;
  display:flex;align-items:center;gap:.5rem;
  padding:.3rem .7rem;
  background:rgba(10,10,4,.96);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  min-height:42px;
}
.tb-back{
  background:var(--panel);border:1px solid var(--border);
  color:var(--cream2);padding:.18rem .5rem;border-radius:5px;
  font-size:.68rem;font-weight:700;white-space:nowrap;
  transition:border-color var(--trans),color var(--trans);
}
.tb-back:hover{border-color:var(--gold);color:var(--gold)}

#logo-text{
  font-size:1.1rem;font-weight:900;letter-spacing:.04em;
  color:var(--olive);text-shadow:0 2px 0 #0008,0 0 18px #8a9a4a66;
  font-style:italic;white-space:nowrap;
  /* REPLACE: swap inner content with <img> */
}
.tb-spacer{flex:1}
.tb-chip{display:flex;align-items:center;gap:.22rem;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:.16rem .45rem;font-size:.72rem;font-weight:700;white-space:nowrap}
.tb-chip strong{color:var(--gold)}
.tb-user{font-size:.62rem;color:#8a8a44;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-logout{font-size:.6rem;color:#6a6a33}
.tb-logout:hover{color:var(--gold)}
a{color:inherit;text-decoration:none}
button{cursor:pointer;background:none;border:none;color:inherit;font:inherit}

/* ---- main area ---- */
#main{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  align-items:center;
  padding:.3rem .4rem .2rem;
  gap:.25rem;
  overflow:hidden;
}

/* ---- game cabinet ---- */
#cabinet{
  flex:1;min-height:0;
  width:100%;max-width:760px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}

/* raccoon character on the right */
#raccoon-art{
  position:absolute;right:-2px;bottom:0;z-index:5;
  width:min(120px,16vw);pointer-events:none;opacity:.92;
  /* REPLACE: <img src="/assets/sir-bandit/raccoon.png" style="width:100%"> */
}

/* golden ornate frame */
#frame{
  width:calc(100% - min(100px,14vw));
  height:100%;
  border:3px solid #6a5a1a;
  border-radius:10px;
  background:linear-gradient(180deg,#3a3210 0%,#1e1c0a 100%);
  box-shadow:inset 0 0 30px #0008, 0 0 0 1px #8a7a2a44;
  overflow:hidden;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
/* frame corner ornaments */
#frame::before{
  content:'';
  position:absolute;inset:4px;
  border:1px solid #6a5a1a44;
  border-radius:7px;
  pointer-events:none;z-index:20;
}

/* ---- grid ---- */
#grid{
  width:100%;height:100%;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  grid-template-rows:repeat(5,1fr);
  gap:3px;
  padding:6px;
}

.cell{
  border-radius:6px;
  background:var(--cell-bg);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(1.2rem,3.2vw,2rem);
  position:relative;
  overflow:hidden;
  transition:border-color .15s,box-shadow .15s,background .15s;
  cursor:default;
}
.cell img{width:72%;height:72%;object-fit:contain;pointer-events:none;display:block}

/* golden square highlight */
.cell.golden{
  border-color:#c8a800 !important;
  background:linear-gradient(135deg,#1e1800,#2e2400) !important;
  box-shadow:var(--glow-gold);
}
.cell.golden::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,#f5c84222 0%,transparent 60%);
  pointer-events:none;
}

/* win cluster flash */
.cell.win-flash{
  animation:winFlash .5s ease-in-out;
}
@keyframes winFlash{
  0%,100%{background:var(--cell-bg)}
  50%{background:#2a2000;border-color:var(--gold2);box-shadow:var(--glow-gold)}
}

/* cascade drop-in */
.cell.drop-in{
  animation:dropIn .3s cubic-bezier(0.22,1,0.36,1);
}
@keyframes dropIn{
  from{transform:translateY(-60%);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* coin value overlay */
.cell .coin-val{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(.5rem,1.8vw,.9rem);
  font-weight:900;
  border-radius:6px;
  opacity:0;
  transition:opacity .25s;
}
.cell.show-coin .coin-val{opacity:1}
.coin-bronze{background:rgba(100,50,0,.85);color:var(--bronze);text-shadow:0 1px 2px #0008}
.coin-silver{background:rgba(40,40,60,.85);color:var(--silver);text-shadow:0 1px 2px #0008}
.coin-gold{background:rgba(60,50,0,.85);color:var(--gold2);text-shadow:0 0 8px #f5c84288}
.coin-clover{background:rgba(0,60,0,.85);color:#44ff44;font-size:clamp(.55rem,1.5vw,.8rem)}
.coin-pot{background:rgba(50,30,0,.85);color:var(--gold);font-size:clamp(.55rem,1.5vw,.8rem)}

/* ---- spin column animation ---- */
.col-spinning .cell{
  animation:colSpin .1s linear infinite;
}
@keyframes colSpin{
  0%{transform:translateY(0);filter:blur(0)}
  40%{filter:blur(2px)}
  70%{transform:translateY(-20%);filter:blur(3px)}
  100%{transform:translateY(0);filter:blur(0)}
}
.col-land .cell{
  animation:colLand .3s cubic-bezier(0.22,1,0.36,1);
}
@keyframes colLand{
  0%{transform:translateY(-10%)}
  55%{transform:translateY(5%)}
  80%{transform:translateY(-2%)}
  100%{transform:translateY(0)}
}

/* ---- win banner ---- */
#winBanner{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  z-index:30;pointer-events:none;
  background:linear-gradient(135deg,#1e1400,#2e2000);
  border:2px solid var(--gold);
  border-radius:14px;
  padding:.6rem 1.4rem;
  text-align:center;
  box-shadow:0 0 40px #f5c84255,0 8px 32px #00000099;
  transition:transform .28s cubic-bezier(0.22,1,0.36,1),opacity .28s;
  opacity:0;
}
#winBanner.show{transform:translate(-50%,-50%) scale(1);opacity:1}
#winBanner .wlabel{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.7}
#winBanner .wamt{font-size:2rem;font-weight:900;color:var(--gold);text-shadow:0 0 18px #f5c84299;line-height:1}
#winBanner .wsub{font-size:.62rem;color:#c0a060;margin-top:.1rem}

/* bonus banner */
#bonusBanner{
  position:absolute;top:12%;left:50%;
  transform:translateX(-50%) scale(0);
  z-index:31;pointer-events:none;
  background:linear-gradient(135deg,#0a2000,#1a3800);
  border:2px solid var(--olive);
  border-radius:12px;
  padding:.5rem 1.2rem;
  text-align:center;
  box-shadow:0 0 30px #8a9a4a55;
  transition:transform .3s cubic-bezier(0.22,1,0.36,1),opacity .3s;
  opacity:0;white-space:nowrap;
}
#bonusBanner.show{transform:translateX(-50%) scale(1);opacity:1}
#bonusBanner .btitle{font-size:.75rem;font-weight:900;color:var(--olive);letter-spacing:.08em;text-transform:uppercase}
#bonusBanner .bsub{font-size:.62rem;color:var(--cream2);margin-top:.08rem}

/* rainbow overlay */
#rainbow{
  position:absolute;inset:0;z-index:25;
  pointer-events:none;opacity:0;
  background:linear-gradient(90deg,
    #ff000044,#ff7f0044,#ffff0044,#00ff0044,#0000ff44,#8b00ff44);
  border-radius:8px;
  transition:opacity .3s;
}
#rainbow.show{opacity:1}

/* ---- bottom controls ---- */
#controls{
  flex-shrink:0;
  width:100%;max-width:760px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:.4rem;
  padding:.1rem 0;
}

.cg{display:flex;flex-direction:column;align-items:center;gap:.12rem}
.clabel{font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;color:#8a8a44}

/* bet control */
#betWrap{display:flex;align-items:center;gap:.3rem}
.arrow-btn{
  width:26px;height:26px;border-radius:50%;
  background:var(--panel);border:1px solid var(--border);
  font-size:.8rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  transition:border-color var(--trans),color var(--trans);
}
.arrow-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.arrow-btn:disabled{opacity:.3;cursor:default}
#betNum{font-size:1rem;font-weight:900;color:var(--gold);min-width:60px;text-align:center}
#betInfo{font-size:.55rem;color:#8a8a44}

/* spin button */
#spinBtn{
  width:min(90px,15vw);height:min(90px,15vw);
  border-radius:50%;
  background:conic-gradient(from 0deg,#8a9a2a,#b8c840,#d8e860,#b8c840,#8a9a2a);
  border:3px solid #c8d84088;
  font-size:.82rem;font-weight:900;letter-spacing:.04em;
  color:#0a0a00;
  box-shadow:0 4px 20px #8a9a2a55,inset 0 2px 0 #fff4;
  transition:transform .12s,box-shadow .12s,opacity .12s;
  text-transform:uppercase;position:relative;overflow:hidden;
}
#spinBtn::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 28%,#fff5 0%,transparent 55%);pointer-events:none}
#spinBtn:hover:not(:disabled){transform:scale(1.07);box-shadow:0 6px 28px #8a9a2a77,inset 0 2px 0 #fff4}
#spinBtn:active:not(:disabled){transform:scale(.94)}
#spinBtn:disabled{opacity:.5;cursor:default;transform:none}
#spinBtn.bonus-active{
  background:conic-gradient(from 0deg,#c8a800,#f5c842,#ffe066,#f5c842,#c8a800);
  box-shadow:0 4px 24px #f5c84266,inset 0 2px 0 #fff4;
  border-color:#f5c84288;
}
#spinLabel{font-size:.7rem;font-weight:900;letter-spacing:.05em}
#freeSpinCount{display:none;font-size:.62rem;margin-top:.1rem;color:#c8d840}

/* win display */
#winRow{display:flex;gap:.6rem;font-size:.65rem;color:#8a8a44}
#winRow span{color:var(--green);font-weight:700}

/* bonus buttons row */
#bonusRow{
  display:flex;gap:.35rem;justify-content:center;flex-wrap:wrap;
}
.bonus-buy-btn{
  font-size:.6rem;font-weight:700;padding:.2rem .5rem;
  border-radius:5px;border:1px solid var(--border);
  background:var(--panel);color:var(--cream2);
  transition:border-color var(--trans),color var(--trans);
  white-space:nowrap;
}
.bonus-buy-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.bonus-buy-btn:disabled{opacity:.35;cursor:default}

/* music btn */
#musicBtn{
  position:fixed;bottom:.5rem;right:.6rem;z-index:200;
  width:32px;height:32px;border-radius:50%;
  background:var(--panel);border:1px solid var(--border);
  font-size:.9rem;display:flex;align-items:center;justify-content:center;
  transition:border-color var(--trans);
}
#musicBtn:hover{border-color:var(--gold)}

/* reel column wrappers for spin animation */
.reel-col{display:contents}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="topBar">
  <button class="tb-back" onclick="location.href='/lobby'">&#8592; Lobby</button>
  <!-- LOGO — replace inner HTML with <img src="/assets/sir-bandit/logo.png" style="height:28px"> -->
  <div id="logo-text">Le Bandit</div>
  <span class="tb-spacer"></span>
  <div class="tb-chip">💰&nbsp;<strong id="tbBal">0.00</strong>&nbsp;FC</div>
  <span class="tb-user" id="tbUser"></span>
  <a href="/logout" class="tb-logout">logout</a>
</div>

<!-- MAIN -->
<div id="main">

  <!-- CABINET -->
  <div id="cabinet">

    <!-- RACCOON (replace SVG with your asset) -->
    <div id="raccoon-art" aria-hidden="true">
      <svg viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- hat -->
        <ellipse cx="50" cy="42" rx="32" ry="8" fill="#222"/>
        <rect x="30" y="14" width="40" height="30" rx="8" fill="#333"/>
        <ellipse cx="50" cy="14" rx="20" ry="6" fill="#222"/>
        <!-- head -->
        <ellipse cx="50" cy="72" rx="28" ry="26" fill="#888"/>
        <!-- mask -->
        <path d="M26 68 Q30 56 50 58 Q70 56 74 68 Q68 80 50 80 Q32 80 26 68Z" fill="#333" opacity=".7"/>
        <!-- eyes -->
        <circle cx="40" cy="68" r="5" fill="white"/>
        <circle cx="60" cy="68" r="5" fill="white"/>
        <circle cx="41" cy="69" r="3" fill="#111"/>
        <circle cx="61" cy="69" r="3" fill="#111"/>
        <!-- nose / snout -->
        <ellipse cx="50" cy="78" rx="8" ry="5" fill="#aaa"/>
        <circle cx="50" cy="76" r="2.5" fill="#222"/>
        <!-- moustache -->
        <path d="M38 80 Q44 83 50 80 Q56 83 62 80" stroke="#222" stroke-width="1.5" fill="none"/>
        <!-- body -->
        <ellipse cx="50" cy="120" rx="26" ry="34" fill="#777"/>
        <!-- white belly -->
        <ellipse cx="50" cy="122" rx="16" ry="22" fill="#ccc"/>
        <!-- arms -->
        <path d="M24 100 Q10 110 12 128" stroke="#777" stroke-width="10" stroke-linecap="round" fill="none"/>
        <path d="M76 100 Q90 110 88 128" stroke="#777" stroke-width="10" stroke-linecap="round" fill="none"/>
        <!-- hands / gloves -->
        <circle cx="12" cy="130" r="7" fill="white"/>
        <!-- crowbar -->
        <rect x="82" y="118" width="5" height="36" rx="2" fill="#555" transform="rotate(-15,84,130)"/>
        <path d="M86 118 Q96 110 98 118" stroke="#555" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- leprechaun hat badge -->
        <rect x="34" y="16" width="10" height="3" rx="1" fill="#2a8a2a"/>
        <!-- tail -->
        <path d="M70 145 Q90 140 88 155 Q86 165 76 158" stroke="#777" stroke-width="8" stroke-linecap="round" fill="none"/>
        <path d="M70 145 Q90 140 88 155 Q86 165 76 158" stroke="#555" stroke-width="4" stroke-linecap="round" stroke-dasharray="4 4" fill="none"/>
      </svg>
    </div>

    <!-- FRAME -->
    <div id="frame">
      <div id="grid" role="grid" aria-label="Slot grid"></div>
      <div id="rainbow" aria-hidden="true"></div>
      <div id="winBanner" role="status" aria-live="polite">
        <div class="wlabel">Win</div>
        <div class="wamt" id="winAmt">0</div>
        <div class="wsub">FluxCoins</div>
      </div>
      <div id="bonusBanner">
        <div class="btitle" id="bonusTitle"></div>
        <div class="bsub" id="bonusSub"></div>
      </div>
    </div>

  </div>

  <!-- CONTROLS -->
  <div id="controls">

    <!-- LEFT: win info -->
    <div class="cg" style="align-items:flex-start;padding-left:.4rem">
      <div id="winRow">WIN <span id="lastWin">—</span></div>
      <div style="font-size:.55rem;color:#6a6a33">RTP 96.34% &bull; Cluster Pays</div>
      <div id="bonusRow">
        <button class="bonus-buy-btn" id="btnFeatureSpin" title="5x odds, costs 3x stake">FeatureSpins (3x)</button>
        <button class="bonus-buy-btn" id="btnBuyLuck" title="Buy Luck of the Bandit">Buy Luck (20x)</button>
        <button class="bonus-buy-btn" id="btnBuyGlitter" title="Buy All That Glitters">Buy Glitters (80x)</button>
      </div>
    </div>

    <!-- CENTER: spin -->
    <div class="cg">
      <button id="spinBtn"><div id="spinLabel">SPIN</div><div id="freeSpinCount"></div></button>
    </div>

    <!-- RIGHT: bet -->
    <div class="cg" style="align-items:flex-end;padding-right:.4rem">
      <div class="clabel">Bet</div>
      <div id="betWrap">
        <button class="arrow-btn" id="betDown">↓</button>
        <div id="betNum">1.00</div>
        <button class="arrow-btn" id="betUp">↑</button>
      </div>
      <div id="betInfo">min 0.1 &bull; max 100 FC</div>
    </div>

  </div>
</div><!-- /main -->
</div><!-- /app -->

<button id="musicBtn" title="Toggle music" aria-label="Toggle music">🔇</button>
<audio id="bgm" loop></audio>

<script>
/* ================================================================
   SIR BANDIT — Full Game Logic
   Cluster Pays + Cascades + Golden Squares + 3 Bonus Modes
   ================================================================ */

/* --- CONFIG --- */
const BGM_SRC = ''; /* '/assets/sir-bandit/theme.mp3' */

const COLS = 6, ROWS = 5;

/* Symbols: id, emoji/img, weight, min cluster size, pay table (clusterSize -> multiplier of BET) */
const SYMBOLS = [
  /* specials */
  { id:'rainbow', emoji:'🌈', weight:0,  cluster:0, pay:{} },        /* spawned by game logic */
  { id:'scatter', emoji:'🍀', weight:2,  cluster:0, pay:{} },        /* FS scatter */
  /* premiums */
  { id:'crown',   emoji:'👑', weight:4,  cluster:5, pay:{5:.8, 6:1.2, 7:1.8, 8:3,   9:5,   10:8,   12:15,  15:30  } },
  { id:'camera',  emoji:'📷', weight:5,  cluster:5, pay:{5:.5, 6:.8,  7:1.2, 8:2,   9:3.5, 10:6,   12:10,  15:20  } },
  { id:'cheese',  emoji:'🧀', weight:6,  cluster:5, pay:{5:.4, 6:.6,  7:.9,  8:1.5, 9:2.5, 10:4,   12:7,   15:12  } },
  { id:'hat',     emoji:'🎩', weight:7,  cluster:5, pay:{5:.3, 6:.5,  7:.7,  8:1.2, 9:2,   10:3,   12:5,   15:9   } },
  { id:'beer',    emoji:'🍺', weight:8,  cluster:5, pay:{5:.25,6:.4,  7:.6,  8:1,   9:1.5, 10:2.5, 12:4,   15:7   } },
  { id:'baguette',emoji:'🥖', weight:9,  cluster:5, pay:{5:.2, 6:.3,  7:.5,  8:.8,  9:1.2, 10:2,   12:3,   15:5   } },
  /* card suits — lowest */
  { id:'A',       emoji:'🇦', weight:12, cluster:5, pay:{5:.15,6:.25, 7:.4,  8:.6,  9:1,   10:1.5, 12:2.5, 15:4   } },
  { id:'K',       emoji:'🇰', weight:12, cluster:5, pay:{5:.12,6:.2,  7:.3,  8:.5,  9:.8,  10:1.2, 12:2,   15:3   } },
  { id:'Q',       emoji:'🇶', weight:12, cluster:5, pay:{5:.1, 6:.15, 7:.25, 8:.4,  9:.6,  10:1,   12:1.6, 15:2.5 } },
  { id:'J',       emoji:'🇯', weight:13, cluster:5, pay:{5:.08,6:.12, 7:.2,  8:.3,  9:.5,  10:.8,  12:1.2, 15:2   } },
  { id:'10',      emoji:'🔟', weight:13, cluster:5, pay:{5:.06,6:.1,  7:.15, 8:.25, 9:.4,  10:.6,  12:1,   15:1.5 } },
];
const SYM = {}; SYMBOLS.forEach(s => SYM[s.id] = s);

/* weighted pool for random picks */
const POOL = [];
for (const s of SYMBOLS) {
  if (s.weight > 0) for (let i = 0; i < s.weight * 10; i++) POOL.push(s.id);
}
function rng() { return POOL[Math.floor(Math.random() * POOL.length)]; }
function rngNoSpecial() {
  let s;
  do { s = rng(); } while (s === 'rainbow' || s === 'scatter');
  return s;
}

/* bet steps 0.1 – 100 FC */
const BET_STEPS = [0.1,0.2,0.5,1,2,5,10,20,50,100];
let betIdx = 3; /* default 1 FC */
function bet() { return BET_STEPS[betIdx]; }

/* ================================================================
   State
   ================================================================ */
let balance   = 0;
let spinning  = false;
let musicOn   = false;
let username  = '';

/* bonus state */
let bonusMode   = null;   /* null | 'luck' | 'glitter' | 'treasure' */
let freeSpins   = 0;
let fsGoldenSet = new Set();  /* cells that stay golden between spins */
let featureMode = false;  /* BonusHunt FeatureSpin active */

/* grid state: GRID[col][row] = symbolId */
let GRID = Array.from({length:COLS}, () => Array(ROWS).fill(null));
let GOLDEN = Array.from({length:COLS}, () => Array(ROWS).fill(false));

/* ================================================================
   DOM
   ================================================================ */
const $id = id => document.getElementById(id);
const tbBal    = $id('tbBal');
const tbUser   = $id('tbUser');
const betNum   = $id('betNum');
const betInfo  = $id('betInfo');
const spinBtn  = $id('spinBtn');
const spinLabel= $id('spinLabel');
const fsCount  = $id('freeSpinCount');
const lastWin  = $id('lastWin');
const winBanner= $id('winBanner');
const winAmt   = $id('winAmt');
const bonusBanner=$id('bonusBanner');
const bonusTitle =$id('bonusTitle');
const bonusSub   =$id('bonusSub');
const rainbowEl  =$id('rainbow');
const gridEl     =$id('grid');

function setBalance(n) {
  balance = Math.round(Math.max(0, Number(n) || 0) * 100) / 100;
  tbBal.textContent = balance.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function refreshBet() {
  const b = bet();
  betNum.textContent = b.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  $id('betDown').disabled = betIdx === 0 || spinning;
  $id('betUp').disabled   = betIdx === BET_STEPS.length - 1 || spinning;
}

/* ================================================================
   Build DOM grid
   ================================================================ */
function buildGrid() {
  gridEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = `c${c}r${r}`;
      cell.setAttribute('data-col', c);
      cell.setAttribute('data-row', r);
      /* coin value overlay */
      const cv = document.createElement('div');
      cv.className = 'coin-val';
      cell.appendChild(cv);
      gridEl.appendChild(cell);
    }
  }
}

function getCell(c, r) { return $id(`c${c}r${r}`); }

function renderCell(c, r, symId) {
  const cell = getCell(c, r);
  const sym  = SYM[symId];
  cell.setAttribute('data-sym', symId);
  GRID[c][r] = symId;
  /* clear coin overlay */
  const cv = cell.querySelector('.coin-val');
  cv.textContent = ''; cv.className = 'coin-val';
  cell.classList.remove('show-coin');
  /* symbol content */
  const existing = cell.querySelector('img, .sym-emoji');
  if (existing) existing.remove();
  if (sym.img) {
    const img = document.createElement('img');
    img.src = sym.img; img.alt = sym.id;
    cell.insertBefore(img, cv);
  } else {
    const span = document.createElement('span');
    span.className = 'sym-emoji';
    span.textContent = sym.emoji;
    cell.insertBefore(span, cv);
  }
}

function fillGrid() {
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS; r++) {
      renderCell(c, r, rngNoSpecial());
      getCell(c,r).classList.remove('golden','win-flash','drop-in','show-coin');
    }
  GOLDEN = Array.from({length:COLS}, () => Array(ROWS).fill(false));
}

/* ================================================================
   Spin animation — per-column sequential stop
   ================================================================ */
const SPIN_BASE  = 500;
const SPIN_STEP  = 100;

async function animateSpin(finalGrid) {
  /* start all columns blurring immediately */
  const colEls = [];
  for (let c = 0; c < COLS; c++) {
    const cells = [];
    for (let r = 0; r < ROWS; r++) cells.push(getCell(c,r));
    colEls.push(cells);
  }

  /* rapid ticker for each col */
  const tickers = colEls.map((cells) => {
    cells.forEach(cell => cell.classList.add('col-spinning'));
    return setInterval(() => {
      cells.forEach(cell => {
        const span = cell.querySelector('.sym-emoji');
        if (span) span.textContent = SYM[rngNoSpecial()].emoji;
      });
    }, 80);
  });

  /* stop each column in sequence */
  const stopPromises = colEls.map((cells, c) => new Promise(resolve => {
    setTimeout(() => {
      clearInterval(tickers[c]);
      cells.forEach(cell => cell.classList.remove('col-spinning'));

      /* plant final symbols */
      for (let r = 0; r < ROWS; r++) {
        renderCell(c, r, finalGrid[c][r]);
        /* preserve golden state from bonus modes */
        if (GOLDEN[c][r]) getCell(c,r).classList.add('golden');
      }

      /* landing bounce on whole column */
      cells.forEach(cell => {
        cell.classList.add('col-land');
        cell.addEventListener('animationend', () => cell.classList.remove('col-land'), {once:true});
      });
      resolve();
    }, SPIN_BASE + c * SPIN_STEP);
  }));

  await Promise.all(stopPromises);
}

/* ================================================================
   Cluster detection
   flood-fill to find connected same-symbol clusters
   ================================================================ */
function findClusters() {
  const visited = Array.from({length:COLS}, () => Array(ROWS).fill(false));
  const clusters = [];

  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      const sym = GRID[c][r];
      if (visited[c][r] || !SYM[sym] || SYM[sym].cluster === 0) continue;
      /* BFS */
      const group = [];
      const queue = [[c,r]];
      visited[c][r] = true;
      while (queue.length) {
        const [cc,rr] = queue.shift();
        if (GRID[cc][rr] !== sym) continue;
        group.push([cc,rr]);
        const neighbors = [[cc-1,rr],[cc+1,rr],[cc,rr-1],[cc,rr+1]];
        for (const [nc,nr] of neighbors) {
          if (nc<0||nc>=COLS||nr<0||nr>=ROWS||visited[nc][nr]) continue;
          if (GRID[nc][nr] === sym) {
            visited[nc][nr] = true;
            queue.push([nc,nr]);
          }
        }
      }
      if (group.length >= SYM[sym].cluster) {
        clusters.push({ sym, cells: group });
      }
    }
  }
  return clusters;
}

/* pay a cluster */
function clusterPayout(cluster) {
  const sym  = SYM[cluster.sym];
  const size = cluster.cells.length;
  const pay  = sym.pay;
  /* find the highest pay bracket ≤ size */
  const brackets = Object.keys(pay).map(Number).sort((a,b) => b-a);
  for (const b of brackets) {
    if (size >= b) return pay[b] * bet();
  }
  return 0;
}

/* ================================================================
   Golden Squares mechanic
   ================================================================ */
function markGoldenCells(cells) {
  for (const [c,r] of cells) {
    GOLDEN[c][r] = true;
    getCell(c,r).classList.add('golden');
  }
}

function clearGoldenIfNotPersist() {
  /* in luck/glitter/treasure mode, golden cells persist */
  if (bonusMode) return;
  GOLDEN = Array.from({length:COLS}, () => Array(ROWS).fill(false));
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
    getCell(c,r).classList.remove('golden');
}

/* Check if a rainbow is on the grid */
function findRainbow() {
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
    if (GRID[c][r]==='rainbow') return true;
  return false;
}

/* Activate all golden squares when rainbow is present */
async function activateGoldenSquares() {
  const goldenCells = [];
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
    if (GOLDEN[c][r]) goldenCells.push([c,r]);
  if (!goldenCells.length) return 0;

  /* rainbow flash */
  rainbowEl.classList.add('show');
  await sleep(600);
  rainbowEl.classList.remove('show');

  let total = 0;
  /* assign coin values */
  for (const [c,r] of goldenCells) {
    const roll = Math.random();
    const cell = getCell(c,r);
    const cv   = cell.querySelector('.coin-val');

    let val, coinClass;
    if (Math.random() < 0.03) {
      /* Pot of Gold */
      coinClass = 'coin-pot'; cv.textContent = '🏺'; val = 0; /* collected later */
    } else if (Math.random() < 0.06) {
      /* Four-Leaf Clover */
      coinClass = 'coin-clover'; cv.textContent = '🍀×' + (Math.floor(Math.random()*9)+2); val = 0;
    } else if (roll < 0.5) {
      /* Bronze: 0.2x–4x */
      const v = Math.round((0.2 + Math.random()*3.8)*10)/10;
      coinClass='coin-bronze'; cv.textContent = v+'x'; val = v*bet();
    } else if (roll < 0.82) {
      /* Silver: 5x–20x */
      const v = Math.round((5 + Math.random()*15)*10)/10;
      coinClass='coin-silver'; cv.textContent = v+'x'; val = v*bet();
    } else {
      /* Gold: up to 500x */
      const v = Math.round((20 + Math.random()*480)*10)/10;
      coinClass='coin-gold'; cv.textContent = v+'x'; val = v*bet();
    }

    cv.className = 'coin-val ' + coinClass;
    cell.classList.add('show-coin');
    total += val;
  }

  /* clover multipliers */
  for (const [c,r] of goldenCells) {
    const cv = getCell(c,r).querySelector('.coin-val');
    if (!cv.className.includes('coin-clover')) continue;
    const mult = parseInt(cv.textContent.replace(/×|🍀/g,'')) || 2;
    const neighbors = [[c-1,r],[c+1,r],[c,r-1],[c,r+1],[c-1,r-1],[c+1,r-1],[c-1,r+1],[c+1,r+1]];
    for (const [nc,nr] of neighbors) {
      if (nc<0||nc>=COLS||nr<0||nr>=ROWS||!GOLDEN[nc][nr]) continue;
      const ncv = getCell(nc,nr).querySelector('.coin-val');
      if (ncv.className.includes('coin-bronze')||ncv.className.includes('coin-silver')||ncv.className.includes('coin-gold')||ncv.className.includes('coin-pot')) {
        const cur = parseFloat(ncv.textContent) || 0;
        const newv = Math.round(cur*mult*10)/10;
        ncv.textContent = newv+'x';
        total += newv*bet() - (cur*bet());
      }
    }
  }

  /* pot of gold collection */
  let potTotal = 0;
  for (const [c,r] of goldenCells) {
    const cv = getCell(c,r).querySelector('.coin-val');
    if (!cv.className.includes('coin-pot')) continue;
    /* collect all visible coin values */
    let potVal = 0;
    for (const [c2,r2] of goldenCells) {
      const cv2 = getCell(c2,r2).querySelector('.coin-val');
      if (cv2.className.includes('coin-bronze')||cv2.className.includes('coin-silver')||cv2.className.includes('coin-gold')) {
        potVal += (parseFloat(cv2.textContent)||0)*bet();
      }
    }
    cv.textContent = '🏺 ' + Math.round(potVal);
    potTotal += potVal;
  }
  if (potTotal > total) total = potTotal;

  await sleep(1200);

  /* clear coin overlays but keep golden borders in bonus mode */
  for (const [c,r] of goldenCells) {
    const cell = getCell(c,r);
    cell.classList.remove('show-coin');
    if (!bonusMode) {
      cell.classList.remove('golden');
      GOLDEN[c][r] = false;
    }
  }

  return Math.round(total*100)/100;
}

/* ================================================================
   Cascade: remove winning cells, drop remaining down, fill top
   ================================================================ */
async function cascade(winningCells) {
  /* flash winning cells */
  for (const [c,r] of winningCells) getCell(c,r).classList.add('win-flash');
  await sleep(400);
  for (const [c,r] of winningCells) getCell(c,r).classList.remove('win-flash');

  /* mark golden squares */
  markGoldenCells(winningCells);

  /* remove winning symbols */
  for (const [c,r] of winningCells) {
    GRID[c][r] = null;
    const cell = getCell(c,r);
    cell.querySelector('.sym-emoji')?.remove();
    cell.querySelector('img')?.remove();
    cell.setAttribute('data-sym','');
  }

  /* drop existing symbols down */
  for (let c=0;c<COLS;c++) {
    /* collect non-null from bottom to top */
    const remaining = [];
    for (let r=ROWS-1;r>=0;r--) if (GRID[c][r]!==null) remaining.push(GRID[c][r]);
    /* fill from bottom */
    for (let r=ROWS-1;r>=0;r--) {
      const sym = remaining[ROWS-1-r] ?? null;
      GRID[c][r] = sym;
      const cell = getCell(c,r);
      if (sym) {
        renderCell(c,r,sym);
        if (GOLDEN[c][r]) cell.classList.add('golden');
      } else {
        cell.querySelector('.sym-emoji')?.remove();
        cell.querySelector('img')?.remove();
      }
    }
    /* fill nulls from top with new symbols */
    for (let r=0;r<ROWS;r++) {
      if (GRID[c][r]===null) {
        const newSym = rngNoSpecial();
        renderCell(c,r,newSym);
        const cell = getCell(c,r);
        cell.classList.add('drop-in');
        cell.addEventListener('animationend',()=>cell.classList.remove('drop-in'),{once:true});
      }
    }
  }

  await sleep(350);
}

/* ================================================================
   Scatter / FS detection
   ================================================================ */
function countScatters() {
  let n = 0;
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
    if (GRID[c][r]==='scatter') n++;
  return n;
}

/* ================================================================
   Rainbow injection
   ================================================================ */
function maybeInjectRainbow() {
  if (bonusMode === 'treasure') {
    /* guaranteed rainbow — place in random empty cell */
    const empties = [];
    for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
      if (GRID[c][r]!=='rainbow'&&GRID[c][r]!=='scatter') empties.push([c,r]);
    if (empties.length) {
      const [rc,rr] = empties[Math.floor(Math.random()*empties.length)];
      renderCell(rc,rr,'rainbow');
    }
    return;
  }
  if (bonusMode === 'glitter' || featureMode) {
    /* higher chance */
    if (Math.random() < 0.35) injectRainbow();
    return;
  }
  if (Math.random() < 0.08) injectRainbow();
}
function injectRainbow() {
  const empties = [];
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
    if (GRID[c][r]!=='rainbow'&&GRID[c][r]!=='scatter') empties.push([c,r]);
  if (!empties.length) return;
  const [rc,rr] = empties[Math.floor(Math.random()*empties.length)];
  renderCell(rc,rr,'rainbow');
}

/* ================================================================
   Scatter injection for feature spins
   ================================================================ */
function maybeInjectScatters() {
  if (featureMode) {
    /* FeatureSpins: 5x odds of 3 scatters */
    if (Math.random() < 0.25) injectScatters(3);
    return;
  }
  if (Math.random() < 0.05) injectScatters(3);
}
function injectScatters(n) {
  const empties = [];
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
    if (GRID[c][r]!=='rainbow'&&GRID[c][r]!=='scatter') empties.push([c,r]);
  shuffle(empties);
  for (let i=0;i<Math.min(n,empties.length);i++) {
    const [c,r] = empties[i];
    renderCell(c,r,'scatter');
  }
}

function shuffle(arr) {
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

/* ================================================================
   Main spin flow
   ================================================================ */
async function doSpin() {
  if (spinning) return;

  const isFreeSpin = bonusMode && freeSpins > 0;
  if (!isFreeSpin) {
    const cost = featureMode ? bet()*3 : bet();
    if (balance < cost) { flashNoBalance(); return; }
    setBalance(balance - cost);
  }

  spinning = true;
  spinBtn.disabled = true;
  $id('betDown').disabled = true;
  $id('betUp').disabled   = true;
  hideBanner();

  if (isFreeSpin) {
    freeSpins--;
    updateFSDisplay();
  }

  /* generate full grid */
  const newGrid = Array.from({length:COLS},()=>Array(ROWS).fill(null));
  for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++) newGrid[c][r] = rngNoSpecial();

  /* run spin animation */
  await animateSpin(newGrid);

  /* inject specials after landing */
  maybeInjectRainbow();
  maybeInjectScatters();

  /* --- cascade loop --- */
  let roundWin = 0;
  let cascadeCount = 0;

  while (true) {
    const clusters = findClusters();
    if (!clusters.length) break;

    /* pay all clusters */
    let spinWin = 0;
    const allWinCells = [];
    for (const cl of clusters) {
      spinWin += clusterPayout(cl);
      allWinCells.push(...cl.cells);
    }
    roundWin += spinWin;

    /* cascade: flash, mark golden, drop */
    await cascade(allWinCells);
    cascadeCount++;

    /* after cascade, check rainbow activation */
    if (findRainbow()) {
      const gsWin = await activateGoldenSquares();
      roundWin += gsWin;
      /* remove rainbow */
      for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
        if (GRID[c][r]==='rainbow') { renderCell(c,r,rngNoSpecial()); }
    }
  }

  /* final rainbow check (even if no cascade won) */
  if (!cascadeCount && findRainbow()) {
    const gsWin = await activateGoldenSquares();
    roundWin += gsWin;
    for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++)
      if (GRID[c][r]==='rainbow') renderCell(c,r,rngNoSpecial());
  }

  /* scatter check */
  const sc = countScatters();
  if (sc >= 3 && !bonusMode) {
    await triggerBonus(sc);
  } else if (bonusMode && sc >= 2) {
    /* retrigger */
    const extra = sc >= 3 ? 3 : 2;
    freeSpins += extra;
    updateFSDisplay();
    showBonusBanner(bonusMode, `+${extra} free spins!`);
    await sleep(1200);
  }

  /* clear golden if not in bonus */
  if (!bonusMode) clearGoldenIfNotPersist();

  /* display round win */
  if (roundWin > 0) {
    setBalance(balance + roundWin);
    lastWin.textContent = `+${roundWin.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})} FC`;
    showWinBanner(roundWin);
  } else {
    lastWin.textContent = '0';
  }

  /* persist to server: net = roundWin - cost (cost already deducted) */
  const costPaid = isFreeSpin ? 0 : (featureMode ? bet()*3 : bet());
  const netDelta = roundWin - 0; /* balance already adjusted above */
  const serverDelta = roundWin - costPaid;

  // In non-free spin we already deducted cost and added wins to balance.
  // Server just needs the net delta to reconcile.
  // But we already set balance optimistically. Send roundWin and -costPaid separately
  // for clarity: server takes (roundWin - costPaid) as net.
  try {
    const r = await fetch('/api/sirbandit/settle', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ won: Math.round(serverDelta*100)/100 }),
    });
    const d = await r.json();
    if (r.ok && d.newBal !== undefined) setBalance(d.newBal);
  } catch(_) {
    fetch('/api/balance').then(r=>r.json()).then(d=>{ if(d.bal!==undefined) setBalance(d.bal); }).catch(()=>{});
  }

  featureMode = false;

  /* continue free spins */
  if (bonusMode && freeSpins > 0) {
    spinning = false;
    spinBtn.disabled = false;
    $id('betDown').disabled = true;
    $id('betUp').disabled   = true;
    await sleep(400);
    doSpin();
    return;
  }

  /* bonus over */
  if (bonusMode && freeSpins <= 0) {
    bonusMode = null;
    GOLDEN = Array.from({length:COLS},()=>Array(ROWS).fill(false));
    for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++) getCell(c,r).classList.remove('golden');
    fsCount.style.display='none';
    spinBtn.classList.remove('bonus-active');
    spinLabel.textContent='SPIN';
    updateBonusBtns();
  }

  spinning = false;
  spinBtn.disabled = false;
  $id('betDown').disabled = betIdx===0;
  $id('betUp').disabled   = betIdx===BET_STEPS.length-1;
}

/* ================================================================
   Bonus triggering
   ================================================================ */
async function triggerBonus(scCount, purchasedMode) {
  let mode, spins;
  if (purchasedMode) {
    mode = purchasedMode;
    spins = mode==='treasure' ? 12 : mode==='glitter' ? 12 : 10;
  } else if (scCount >= 5) {
    mode='treasure'; spins=12;
  } else if (scCount >= 4) {
    mode='glitter'; spins=12;
  } else {
    mode='luck'; spins=10;
  }

  bonusMode = mode;
  freeSpins = spins;

  const names = {
    luck:     'Luck of the Bandit',
    glitter:  'All That Glitters is Gold',
    treasure: 'Treasure at the End of the Rainbow',
  };
  const subs = {
    luck:     `${spins} Free Spins — Golden Squares persist!`,
    glitter:  `${spins} Free Spins — All Squares persist, Rainbow more likely!`,
    treasure: `${spins} Free Spins — Rainbow on EVERY spin!`,
  };

  showBonusBanner(mode, subs[mode]);
  spinBtn.classList.add('bonus-active');
  spinLabel.textContent='FREE';
  fsCount.style.display='block';
  updateFSDisplay();
  updateBonusBtns();
  await sleep(2000);
}

function updateFSDisplay() {
  fsCount.textContent = freeSpins > 0 ? `${freeSpins} left` : '';
}

/* ================================================================
   Buy Bonus
   ================================================================ */
function buyBonus(mode, costMult) {
  if (spinning) return;
  const cost = bet() * costMult;
  if (balance < cost) { flashNoBalance(); return; }
  setBalance(balance - cost);
  /* persist cost */
  fetch('/api/sirbandit/settle',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({won:-(cost)}),
  }).catch(()=>{});
  triggerBonus(0, mode).then(() => {
    spinning = false;
    spinBtn.disabled = false;
    doSpin();
  });
}

/* ================================================================
   UI helpers
   ================================================================ */
function showWinBanner(amt) {
  winAmt.textContent = `+${amt.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  winBanner.classList.add('show');
  setTimeout(hideBanner, 2600);
}
function hideBanner() { winBanner.classList.remove('show'); }

function showBonusBanner(mode, sub) {
  const names = { luck:'Luck of the Bandit', glitter:'All That Glitters is Gold', treasure:'Treasure at the End of the Rainbow' };
  bonusTitle.textContent = names[mode] ?? mode;
  bonusSub.textContent   = sub;
  bonusBanner.classList.add('show');
  setTimeout(() => bonusBanner.classList.remove('show'), 3500);
}

function flashNoBalance() {
  spinBtn.style.background='conic-gradient(from 0deg,#4a0000,#cc4444,#ff8888,#cc4444,#4a0000)';
  setTimeout(() => { spinBtn.style.background=''; }, 500);
}

function updateBonusBtns() {
  const disabled = spinning || !!bonusMode;
  $id('btnFeatureSpin').disabled  = disabled;
  $id('btnBuyLuck').disabled      = disabled;
  $id('btnBuyGlitter').disabled   = disabled;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ================================================================
   Balance / Auth bootstrap
   ================================================================ */
window.addEventListener('message', ev => {
  if (!ev.data) return;
  if (ev.data.type==='fluxer:init'||ev.data.type==='fluxer:sync') {
    setBalance(ev.data.balance ?? 0);
    if (ev.data.username) { username=ev.data.username; tbUser.textContent=username; }
  }
});
/* direct page load */
if (window.parent === window) {
  fetch('/api/balance').then(r=>r.json()).then(d=>{ if(d.bal!==undefined) setBalance(d.bal); }).catch(()=>{});
}
setInterval(() => {
  if (spinning) return;
  fetch('/api/balance').then(r=>r.json()).then(d=>{
    if(d.bal!==undefined && Math.abs(d.bal-balance)>0.01) setBalance(d.bal);
  }).catch(()=>{});
}, 10000);
/* username from cookie */
try { const m=document.cookie.match(/(?:^|;\s*)dtag=([^;]*)/); if(m){username=decodeURIComponent(m[1]);tbUser.textContent=username;} } catch(_){}

/* ================================================================
   Controls wiring
   ================================================================ */
$id('betDown').addEventListener('click', () => { if(betIdx>0){betIdx--;refreshBet();} });
$id('betUp').addEventListener('click',   () => { if(betIdx<BET_STEPS.length-1){betIdx++;refreshBet();} });
$id('spinBtn').addEventListener('click', doSpin);
document.addEventListener('keydown', e => { if(e.code==='Space'){e.preventDefault();doSpin();} });

$id('btnFeatureSpin').addEventListener('click', () => {
  if (spinning||bonusMode) return;
  featureMode = true;
  showBonusBanner('luck', 'FeatureSpins™ active — 5x odds!');
  doSpin();
});
$id('btnBuyLuck').addEventListener('click',    () => buyBonus('luck', 20));
$id('btnBuyGlitter').addEventListener('click', () => buyBonus('glitter', 80));

const bgm = $id('bgm');
if (BGM_SRC) bgm.src = BGM_SRC;
$id('musicBtn').addEventListener('click', () => {
  if (!BGM_SRC) return;
  musicOn = !musicOn;
  if (musicOn){bgm.volume=0.4;bgm.play().catch(()=>{});$id('musicBtn').textContent='🔊';}
  else{bgm.pause();$id('musicBtn').textContent='🔇';}
});

/* ================================================================
   Init
   ================================================================ */
buildGrid();
fillGrid();
refreshBet();
updateBonusBtns();
</script>
</body>
</html>
