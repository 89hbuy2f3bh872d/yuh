<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
        />
        <title>Sir Bandit</title>
        <style>
            /* =============================================================
   SIR BANDIT — 6×5 Cluster Pays · Super Cascades · Golden Squares
   Faithful recreation of Hacksaw Gaming's "Le Bandit" mechanics.
   -------------------------------------------------------------
   ASSET / AUDIO SWAP GUIDE  (search for "SWAP:")
     LOGO      → replace <h1 id="gameTitle"> with <img id="gameTitle" src="...">
     BACKGROUND→ set --bg-url below to url('/assets/sir-bandit/bg.jpg')
     SYMBOLS   → give any SYMBOLS[] entry an `img:'/path.png'` field
     AUDIO     → fill in the SFX{} / MUSIC_SRC paths in the <script>
   ============================================================= */

            :root {
                --gold: #f2c84b;
                --gold2: #ffe27a;
                --gold-dim: #9c821f;
                --bronze: #c8772e;
                --silver: #b9c6d6;
                --ink: #1c1206;
                --panel: #241a0c;
                --panel2: #2e2210;
                --frame: #7a5e1e;
                --frame2: #3a2c0c;
                --cell: #221908;
                --cell-bdr: #43340f;
                --cream: #efe3b8;
                --muted: #a08f5e;
                --green: #7ad03a;
                --green2: #5aa81f;
                --green-ink: #214a0a;
                --red: #cc3a26;
                --bg-url: ""; /* SWAP: url('/assets/sir-bandit/bg.jpg') */
                --hud-h: 90px;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: #0c0a06;
                color: var(--cream);
                font-family: "Trebuchet MS", "Segoe UI", sans-serif;
                -webkit-font-smoothing: antialiased;
                user-select: none;
            }
            button {
                cursor: pointer;
                background: none;
                border: none;
                color: inherit;
                font: inherit;
            }
            a {
                color: inherit;
                text-decoration: none;
            }
            @media (prefers-reduced-motion: reduce) {
                * {
                    animation-duration: 0.001ms !important;
                    transition-duration: 0.001ms !important;
                }
            }

            /* ---- Scene ---- */
            #scene {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                background:
                    radial-gradient(
                        ellipse 120% 90% at 50% 38%,
                        transparent 42%,
                        #00000088 100%
                    ),
                    linear-gradient(
                        180deg,
                        #6b6147 0%,
                        #534a34 30%,
                        #3a3324 60%,
                        #241f15 100%
                    );
            }
            /* SWAP background image: uncomment + set --bg-url
#scene{background-image:var(--bg-url);background-size:cover;background-position:center} */
            #scene::before {
                /* faint brick / alley texture */
                content: "";
                position: absolute;
                inset: 0;
                opacity: 0.1;
                pointer-events: none;
                background-image:
                    repeating-linear-gradient(
                        90deg,
                        #000 0 2px,
                        transparent 2px 64px
                    ),
                    repeating-linear-gradient(
                        0deg,
                        #000 0 2px,
                        transparent 2px 40px
                    );
                mask-image: radial-gradient(
                    ellipse at center,
                    #000 30%,
                    transparent 75%
                );
            }

            /* ---- Top bar ---- */
            #topBar {
                position: relative;
                z-index: 50;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                padding: 0.35rem 0.8rem;
                min-height: 42px;
                background: linear-gradient(180deg, #0a0800, #140f04);
                border-bottom: 2px solid var(--frame);
            }
            .tb-back {
                background: #241a0c;
                border: 1px solid var(--frame);
                color: var(--muted);
                padding: 0.28rem 0.6rem;
                border-radius: 6px;
                font-size: 0.7rem;
                font-weight: 700;
                transition: 0.15s;
            }
            .tb-back:hover {
                border-color: var(--gold);
                color: var(--gold);
            }
            #topBar .spacer {
                flex: 1;
            }
            .tb-tag {
                font-size: 0.68rem;
                color: #8a774a;
            }
            .tb-logout {
                font-size: 0.66rem;
                color: #6a5836;
            }

            /* ---- Main ---- */
            #main {
                flex: 1;
                min-height: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0.4rem 1rem;
                position: relative;
            }

            /* ---- Title ---- */
            #gameTitle {
                position: relative;
                transform: rotate(-2deg);
                margin: 0 0 0.35rem;
                font-family: "Arial Black", "Trebuchet MS", sans-serif;
                font-weight: 900;
                font-size: clamp(1.4rem, 4vw, 2.7rem);
                color: var(--green);
                letter-spacing: 0.02em;
                white-space: nowrap;
                text-shadow:
                    0 0 14px #7ad03a55,
                    3px 3px 0 var(--green-ink),
                    -2px -2px 0 var(--green-ink),
                    2px -2px 0 var(--green-ink),
                    -2px 2px 0 var(--green-ink),
                    4px 6px 8px #000a;
                pointer-events: none;
                z-index: 12;
                /* SWAP: replace whole element with <img id="gameTitle" src="/assets/sir-bandit/logo.png"> */
            }

            /* ---- Cabinet (centered, sized to fit height) ---- */
            #cabinet {
                position: relative;
                z-index: 10;
                display: flex;
                flex-direction: column;
                align-items: center;
                width: min(94vw, calc((100vh - 215px) * 1.2));
                max-width: 700px;
            }

            #reelFrame {
                position: relative;
                width: 100%;
                border-radius: 14px;
                padding: 14px;
                overflow: hidden;
                background: linear-gradient(180deg, #241a0a, #151005);
                border: 3px solid var(--frame);
                box-shadow:
                    inset 0 0 36px #000a,
                    0 0 0 2px var(--frame2),
                    0 10px 40px #000b;
            }
            /* ornate corners */
            .corner {
                position: absolute;
                width: 26px;
                height: 26px;
                color: var(--gold);
                opacity: 0.7;
                z-index: 6;
                pointer-events: none;
                font-size: 24px;
                line-height: 1;
            }
            .corner.tl {
                top: 4px;
                left: 8px;
            }
            .corner.tr {
                top: 4px;
                right: 8px;
            }
            .corner.bl {
                bottom: 4px;
                left: 8px;
            }
            .corner.br {
                bottom: 4px;
                right: 8px;
            }

            #grid {
                display: flex;
                gap: 5px;
                width: 100%;
                aspect-ratio: 6/5;
            }
            .reel {
                flex: 1;
                min-width: 0;
                overflow: hidden;
                border-radius: 8px;
                position: relative;
                background: linear-gradient(180deg, #1c1407, #120d05);
            }
            .reel-track {
                display: flex;
                flex-direction: column;
                will-change: transform;
            }
            .reel-track.spinning {
                filter: blur(1.2px);
            }

            .cell {
                position: relative;
                aspect-ratio: 1/1;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--cell);
                border: 1px solid var(--cell-bdr);
                border-radius: 7px;
                margin: 2.5px;
                font-size: clamp(1.1rem, 3vw, 1.9rem);
            }
            .cell img {
                width: 74%;
                height: 74%;
                object-fit: contain;
                pointer-events: none;
            }
            .cell.golden {
                background: linear-gradient(135deg, #3a2a00, #5a4400);
                border-color: var(--gold) !important;
                box-shadow:
                    inset 0 0 10px #ffd76644,
                    0 0 12px #ffd76633;
            }
            .cell.golden::after {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 7px;
                background: repeating-linear-gradient(
                    45deg,
                    #ffe27a22 0 6px,
                    transparent 6px 12px
                );
                pointer-events: none;
            }
            .cell.win-flash {
                animation: winFlash 0.42s ease-in-out;
            }
            @keyframes winFlash {
                0%,
                100% {
                    transform: scale(1);
                }
                30% {
                    transform: scale(1.12);
                    box-shadow: 0 0 18px var(--gold2);
                    border-color: var(--gold2);
                    z-index: 3;
                }
            }
            .cell.vanish {
                animation: vanish 0.26s ease-in forwards;
            }
            @keyframes vanish {
                to {
                    transform: scale(0.1) rotate(20deg);
                    opacity: 0;
                }
            }
            .cell.drop-in {
                animation: dropIn 0.34s cubic-bezier(0.22, 1.4, 0.4, 1);
            }
            @keyframes dropIn {
                0% {
                    transform: translateY(-60%);
                    opacity: 0;
                }
                60% {
                    transform: translateY(6%);
                }
                100% {
                    transform: translateY(0);
                    opacity: 1;
                }
            }
            .cell.pop {
                animation: pop 0.3s cubic-bezier(0.22, 1.6, 0.4, 1);
            }
            @keyframes pop {
                0% {
                    transform: scale(0);
                }
                100% {
                    transform: scale(1);
                }
            }

            /* ---- Card royals & symbol glyphs (styled, not just emoji) ---- */
            .glyph {
                font-family: "Arial Black", sans-serif;
                font-weight: 900;
                line-height: 1;
            }
            .royal {
                font-size: 1.5em;
                color: #8c7a52;
                text-shadow: 2px 2px 0 #00000066;
                -webkit-text-stroke: 1px #00000044;
            }
            .royal.K {
                color: #8c7a52;
            }
            .royal.Q {
                color: #8c7a52;
            }
            .royal.J {
                color: #7e8c52;
            }
            .royal.A {
                color: #8c7a52;
            }
            .royal.T {
                color: #7e8c52;
                font-size: 1.2em;
            }

            /* ---- Coins (revealed in golden squares) ---- */
            .coin {
                width: 84%;
                height: 84%;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Arial Black", sans-serif;
                font-weight: 900;
                color: #3a2a00;
                position: relative;
                box-shadow:
                    inset 0 -4px 8px #0006,
                    inset 0 3px 6px #fff7,
                    0 2px 6px #0008;
                font-size: 0.95em;
            }
            .coin .v {
                position: relative;
                z-index: 2;
                text-shadow: 0 1px 0 #fff5;
            }
            .coin.bronze {
                background: radial-gradient(
                    circle at 38% 32%,
                    #f0a85a,
                    #b5651d 70%
                );
                color: #4a2a00;
            }
            .coin.silver {
                background: radial-gradient(
                    circle at 38% 32%,
                    #f2f6fb,
                    #9fb1c4 70%
                );
                color: #2a3645;
            }
            .coin.gold {
                background: radial-gradient(
                    circle at 38% 32%,
                    #fff0a0,
                    #e0a81e 70%
                );
                color: #5a3e00;
            }
            .coin.shine {
                animation: coinShine 0.5s ease;
            }
            @keyframes coinShine {
                0% {
                    transform: scale(0.3) rotate(-30deg);
                    opacity: 0;
                }
                100% {
                    transform: scale(1) rotate(0);
                    opacity: 1;
                }
            }
            .coin::before {
                content: "";
                position: absolute;
                inset: 0;
                border-radius: 50%;
                pointer-events: none;
                background: linear-gradient(
                    115deg,
                    transparent 38%,
                    #ffffffaa 48%,
                    transparent 58%
                );
                background-size: 250% 250%;
                animation: coinGleam 3.2s ease-in-out infinite;
            }
            @keyframes coinGleam {
                0%,
                70% {
                    background-position: 130% 0;
                }
                85%,
                100% {
                    background-position: -30% 0;
                }
            }
            .coin.boost {
                animation: coinBoost 0.55s cubic-bezier(0.3, 1.7, 0.4, 1);
            }
            @keyframes coinBoost {
                0% {
                    transform: scale(1);
                }
                45% {
                    transform: scale(1.35);
                    filter: drop-shadow(0 0 10px #7ad03a);
                }
                100% {
                    transform: scale(1);
                }
            }

            /* clover */
            .clover {
                font-size: 1.5em;
                position: relative;
                filter: drop-shadow(0 2px 3px #0007);
                transform-origin: center;
                animation: cloverIdle 1.9s ease-in-out infinite;
            }
            @keyframes cloverIdle {
                0%,
                100% {
                    transform: rotate(-7deg);
                }
                50% {
                    transform: rotate(7deg);
                }
            }
            .clover.burst {
                animation: cloverBurst 0.65s cubic-bezier(0.3, 1.6, 0.4, 1);
            }
            @keyframes cloverBurst {
                0% {
                    transform: scale(1) rotate(0);
                    filter: drop-shadow(0 0 0 #7ad03a);
                }
                45% {
                    transform: scale(1.6) rotate(200deg);
                    filter: drop-shadow(0 0 14px #7ad03a);
                }
                100% {
                    transform: scale(1) rotate(360deg);
                    filter: drop-shadow(0 2px 3px #0007);
                }
            }

            /* pot / collector */
            .pot {
                font-size: 1.55em;
                position: relative;
                filter: drop-shadow(0 2px 4px #0008);
                transform-origin: 50% 80%;
                animation: potIdle 2.1s ease-in-out infinite;
            }
            @keyframes potIdle {
                0%,
                100% {
                    transform: translateY(0) rotate(0);
                }
                50% {
                    transform: translateY(-2px) rotate(0);
                }
            }
            .pot.collect {
                animation: potCollect 0.6s ease;
            }
            @keyframes potCollect {
                0%,
                100% {
                    transform: scale(1) rotate(0);
                }
                18% {
                    transform: scale(1.22) rotate(-7deg);
                }
                38% {
                    transform: scale(1.14) rotate(7deg);
                }
                58% {
                    transform: scale(1.2) rotate(-5deg);
                }
                78% {
                    transform: scale(1.12) rotate(3deg);
                }
            }
            .pot.collect::after {
                content: "";
                position: absolute;
                inset: -30%;
                border-radius: 50%;
                pointer-events: none;
                background: radial-gradient(circle, #ffe27a88, transparent 65%);
                animation: potGlow 0.6s ease;
            }
            @keyframes potGlow {
                0% {
                    opacity: 0;
                    transform: scale(0.4);
                }
                40% {
                    opacity: 1;
                }
                100% {
                    opacity: 0;
                    transform: scale(1.3);
                }
            }
            .pot .ptag {
                position: absolute;
                bottom: 6%;
                left: 50%;
                transform: translateX(-50%);
                font-family: "Arial Black";
                font-size: 0.42em;
                color: var(--gold);
                background: #1c1206cc;
                padding: 0 4px;
                border-radius: 5px;
                white-space: nowrap;
            }

            /* sparkle particles */
            .spark {
                position: absolute;
                width: 7px;
                height: 7px;
                border-radius: 50%;
                pointer-events: none;
                z-index: 5;
                background: radial-gradient(
                    circle,
                    #fff,
                    #ffe27a 60%,
                    transparent 70%
                );
                animation: sparkFly 0.6s ease-out forwards;
            }
            @keyframes sparkFly {
                0% {
                    transform: translate(0, 0) scale(1);
                    opacity: 1;
                }
                100% {
                    transform: translate(var(--dx), var(--dy)) scale(0);
                    opacity: 0;
                }
            }

            .fly {
                position: fixed;
                z-index: 90;
                font-family: "Arial Black";
                font-weight: 900;
                color: var(--gold2);
                text-shadow: 0 2px 6px #000;
                pointer-events: none;
                transition:
                    transform 0.55s cubic-bezier(0.5, 0, 0.4, 1),
                    opacity 0.55s;
            }

            /* ---- Win banner ---- */
            #winBanner {
                position: absolute;
                top: 46%;
                left: 50%;
                z-index: 60;
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.4);
                transition:
                    transform 0.3s cubic-bezier(0.22, 1.5, 0.4, 1),
                    opacity 0.3s;
                background: linear-gradient(135deg, #241400, #3a2700);
                border: 2px solid var(--gold);
                border-radius: 16px;
                padding: 0.7rem 1.8rem;
                text-align: center;
                box-shadow:
                    0 0 50px #f2c84b66,
                    0 10px 36px #000b;
                pointer-events: none;
            }
            #winBanner.show {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            .wb-label {
                font-size: 0.62rem;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: var(--gold);
                opacity: 0.8;
            }
            .wb-amt {
                font-family: "Arial Black";
                font-size: 2.2rem;
                color: var(--gold);
                text-shadow: 0 0 22px #f2c84b99;
                line-height: 1.05;
            }
            .wb-amt.big {
                color: var(--gold2);
                animation: bigPulse 1s ease infinite;
            }
            @keyframes bigPulse {
                50% {
                    transform: scale(1.08);
                    text-shadow: 0 0 34px #ffe27a;
                }
            }
            .wb-sub {
                font-size: 0.62rem;
                color: #c8a85e;
            }

            /* ---- Cascade & rainbow indicators ---- */
            #cascadeTag {
                position: absolute;
                top: 10px;
                right: 12px;
                z-index: 30;
                opacity: 0;
                transition: opacity 0.25s;
                background: #1c1206cc;
                border: 1px solid var(--frame);
                border-radius: 9px;
                padding: 0.3rem 0.55rem;
                text-align: center;
            }
            #cascadeTag.show {
                opacity: 1;
            }
            .ct-l {
                font-size: 0.5rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--muted);
            }
            .ct-n {
                font-family: "Arial Black";
                font-size: 1.3rem;
                color: var(--gold);
                line-height: 1;
            }

            /* ---- Bonus ribbon ---- */
            #bonusRibbon {
                position: absolute;
                top: 50%;
                left: 50%;
                z-index: 70;
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
                transition:
                    transform 0.4s cubic-bezier(0.22, 1.5, 0.4, 1),
                    opacity 0.35s;
                background: linear-gradient(135deg, #1a0a00, #3a1600);
                border: 3px solid #e8842a;
                border-radius: 18px;
                padding: 1rem 2.4rem;
                text-align: center;
                box-shadow: 0 0 60px #e8842a66;
                pointer-events: none;
            }
            #bonusRibbon.show {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            .br-title {
                font-family: "Arial Black";
                font-size: 1.3rem;
                color: #f2a83a;
                text-shadow: 0 0 16px #e8842a;
                line-height: 1.1;
            }
            .br-sub {
                font-size: 0.74rem;
                color: #d8a060;
                margin-top: 0.3rem;
            }

            /* ---- Free-spins HUD chip ---- */
            #fsHud {
                position: absolute;
                top: 10px;
                left: 12px;
                z-index: 30;
                display: none;
                background: #1c1206e0;
                border: 1px solid #e8842a99;
                border-radius: 9px;
                padding: 0.3rem 0.6rem;
                font-size: 0.74rem;
                color: #f2a83a;
                font-weight: 700;
            }
            #fsHud.show {
                display: block;
            }
            #fsHud .mode {
                font-size: 0.56rem;
                color: #c8884a;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                display: block;
            }

            @media (max-width: 560px) {
                #hud {
                    gap: 0.5rem;
                    padding: 0 0.6rem;
                }
                .hud-group {
                    min-width: 0;
                }
                .hud-value {
                    font-size: 0.92rem;
                }
                #winGroup {
                    display: none;
                } /* hide live Win; banner still shows it */
                #buyBonusBtn {
                    width: 54px;
                    height: 54px;
                    font-size: 0.5rem;
                }
                #spinBtn {
                    width: 56px;
                    height: 56px;
                    border-width: 3px;
                }
                #spinBtn svg {
                    width: 26px;
                    height: 26px;
                }
                .hud-icon {
                    width: 36px;
                    height: 36px;
                }
                .hud-icon svg {
                    width: 18px;
                    height: 18px;
                }
                #betBox {
                    min-width: 80px;
                    height: 46px;
                    padding: 0.2rem 0.55rem;
                }
                #betDisplay {
                    font-size: 1rem;
                }
                .bet-arr {
                    width: 26px;
                    height: 20px;
                }
                #menuPop {
                    left: 62px;
                }
                #infoBadge {
                    display: none;
                }
            }

            /* ---- HUD (control bar) ---- */
            #hud {
                position: relative;
                z-index: 20;
                display: flex;
                align-items: center;
                gap: 1rem;
                height: var(--hud-h);
                padding: 0 1.4rem;
                background: linear-gradient(
                    180deg,
                    rgba(28, 20, 8, 0.86),
                    rgba(14, 10, 4, 0.96)
                );
                border-top: 2px solid var(--frame);
                box-shadow: 0 -6px 24px #0007;
                backdrop-filter: blur(2px);
            }

            .hud-group {
                display: flex;
                flex-direction: column;
                gap: 0.12rem;
                min-width: 90px;
            }
            .hud-label {
                font-size: 0.6rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: #9a8657;
            }
            .hud-value {
                font-size: 1.15rem;
                font-weight: 700;
                color: var(--cream);
                font-variant-numeric: tabular-nums;
            }
            .hud-value.accent {
                color: var(--gold);
            }
            .hud-spacer {
                flex: 1;
            }

            /* BUY BONUS coin — overlaps the top edge of the bar */
            #buyBonusBtn {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 70px;
                height: 70px;
                border-radius: 50%;
                flex-shrink: 0;
                transform: translateY(-10px);
                background: radial-gradient(
                    circle at 40% 32%,
                    #fff0a8,
                    #f2c233 55%,
                    #caa017
                );
                color: #3a2700;
                font-family: "Arial Black";
                font-size: 0.6rem;
                line-height: 1.05;
                text-align: center;
                letter-spacing: 0.02em;

    <body>

        <!-- AUDIO: src filled from script. SWAP the file paths in SFX{}/MUSIC_SRC below. -->
