<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sir Bandit</title>
<style>
/* =============================================================
   SIR BANDIT — 6×5 Cluster Pays | Cascades | Golden Squares
   =============================================================

   ASSET SWAP GUIDE
   ----------------
   LOGO:       Replace the <h1 id="gameTitle"> content with <img src="...">
   BACKGROUND: Replace --bg-url var (CSS :root) with your image path
   RACCOON:    Replace #raccoon SVG with <img id="raccoon" src="...">
   MUSIC:      Set MUSIC_SRC constant near top of <script>
   SYMBOLS:    Each entry in SYMBOLS[] can have .img = '/assets/...' instead of .emoji
   ============================================================= */

:root {
  --gold:     #e8c84a;
  --gold2:    #ffd700;
  --gold-dim: #a08820;
  --dark:     #1a1208;
  --panel:    #231a0a;
  --panel2:   #2d2210;
  --cell-bg:  #2a2008;
  --cell-bdr: #4a3a10;
  --cream:    #e8ddb0;
  --green:    #4aaa30;
  --green2:   #2ecc71;
  --red:      #cc3020;
  --bg-url:   '';   /* set to url('/assets/sir-bandit/bg.jpg') to add background art */
  --hud-h:    64px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  font-family: 'Georgia', serif;
  background: #12100a;
  color: var(--cream);
  -webkit-font-smoothing: antialiased;
  user-select: none;
}

/* ---- Scene ---- */
#scene {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background:
    /* vignette */
    radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, #00000099 100%),
    /* Paris alley feel */
    linear-gradient(180deg, #1a1a0a 0%, #0e0e06 60%, #080808 100%);
  /* BACKGROUND IMAGE: uncomment and set your path:
     background-image: url('/assets/sir-bandit/bg.jpg');
     background-size: cover; background-position: center; */
}

/* ---- Top bar ---- */
#topBar {
  position: relative; z-index: 50;
  display: flex; align-items: center; gap: .5rem;
  padding: .3rem .7rem;
  background: linear-gradient(180deg, #0a0800 0%, #110d04 100%);
  border-bottom: 2px solid #5a4010;
  min-height: 40px;
}
.tb-back {
  background: #231a0a; border: 1px solid #5a4010;
  color: #a09060; padding: .2rem .5rem; border-radius: 5px;
  font-size: .68rem; font-weight: 700; font-family: sans-serif;
  transition: border-color .15s, color .15s; cursor: pointer;
}
.tb-back:hover { border-color: var(--gold); color: var(--gold); }
#topBar .spacer { flex: 1; }
.tb-tag { font-size: .65rem; color: #7a6840; font-family: sans-serif; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; background: none; border: none; color: inherit; font: inherit; }

/* ---- Main area ---- */
#main {
  flex: 1; min-height: 0;
  display: flex; align-items: center; justify-content: center;
  padding: .3rem 1rem;
  gap: 1rem;
  position: relative;
}

/* ---- Title ---- */
#gameTitle {
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  font-family: 'Georgia', serif;
  font-size: clamp(1.4rem, 4vw, 2.8rem);
  font-weight: 900;
  color: #5ad020;
  text-shadow:
    0 0 12px #4aaa2088,
    2px 2px 0 #1a4a08,
    -1px -1px 0 #1a4a08,
    3px 3px 6px #00000099;
  letter-spacing: .04em;
  white-space: nowrap;
  pointer-events: none;
  z-index: 10;
  /* LOGO SWAP: replace this entire element with <img id="gameTitle" src="/assets/sir-bandit/logo.png"> */
}

/* ---- Raccoon character ---- */
#raccoon {
  width: clamp(80px, 12vw, 160px);
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 8px;
  /* SPRITE SWAP: replace with <img id="raccoon" src="/assets/sir-bandit/raccoon.png"> */
  filter: drop-shadow(0 4px 16px #00000088);
}

/* ---- Cabinet ---- */
#cabinet {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  align-items: center;
  max-width: 700px;
}

#reelFrame {
  width: 100%;
  background: linear-gradient(180deg, #1a1408 0%, #110e04 100%);
  border: 3px solid #6a5018;
  border-radius: 8px;
  padding: 6px;
  box-shadow:
    inset 0 0 30px #00000088,
    0 0 0 1px #3a2808,
    0 6px 24px #00000099;
  position: relative;
  overflow: hidden;
}
/* corner ornaments */
#reelFrame::before, #reelFrame::after {
  content: '♦';
  position: absolute; z-index: 5;
  font-size: 1.2rem; color: var(--gold);
  opacity: .6; pointer-events: none;
}
#reelFrame::before { top: 4px; left: 6px; }
#reelFrame::after  { top: 4px; right: 6px; }

#grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 4px;
  width: 100%;
  aspect-ratio: 6/5;
}

.cell {
  background: var(--cell-bg);
  border: 1px solid var(--cell-bdr);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(1.2rem, 2.8vw, 2rem);
  position: relative;
  overflow: hidden;
  transition: border-color .2s, background .2s;
  will-change: transform, opacity;
}
.cell img {
  width: 72%; height: 72%; object-fit: contain; pointer-events: none;
}
/* golden square state */
.cell.golden {
  background: linear-gradient(135deg, #2a1f00, #3a2a00);
  border-color: var(--gold) !important;
  box-shadow: inset 0 0 8px #f5c84233, 0 0 10px #f5c84244;
}
/* win flash */
.cell.win-flash {
  animation: winFlash .45s ease-in-out;
}
@keyframes winFlash {
  0%   { background: var(--cell-bg); }
  30%  { background: #3a2800; border-color: var(--gold2); box-shadow: 0 0 16px #f5c84266; }
  100% { background: var(--cell-bg); }
}
/* drop-in animation */
.cell.drop-in {
  animation: dropIn .38s cubic-bezier(0.22,1,0.36,1);
}
@keyframes dropIn {
  0%   { transform: translateY(-120%); opacity: 0; }
  70%  { transform: translateY(8%); }
  100% { transform: translateY(0); opacity: 1; }
}
/* vanish */
.cell.vanish {
  animation: vanish .25s ease-in forwards;
}
@keyframes vanish {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* coin value overlay */
.coin-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 900;
  font-family: sans-serif;
  pointer-events: none;
  border-radius: 6px;
  z-index: 3;
}
.coin-bronze { background: #6a3a0088; color: #e8a060; }
.coin-silver { background: #30304888; color: #c0d0e8; }
.coin-gold   { background: #40300088; color: var(--gold); }

/* ---- Golden Square count badge ---- */
#gsCounter {
  display: flex; align-items: center; gap: .4rem;
  background: #1a1408; border: 1px solid var(--gold-dim);
  border-radius: 6px; padding: .2rem .6rem;
  font-size: .72rem; font-family: sans-serif;
  margin-top: 4px;
  align-self: flex-end;
}
#gsCounter span { color: var(--gold); font-weight: 700; }

/* ---- Win banner ---- */
#winBanner {
  position: absolute; top: 50%; left: 50%; z-index: 60;
  transform: translate(-50%, -50%) scale(0);
  background: linear-gradient(135deg, #1a1000, #2d2000);
  border: 2px solid var(--gold);
  border-radius: 14px;
  padding: .6rem 1.4rem;
  text-align: center;
  box-shadow: 0 0 40px #e8c84a55, 0 8px 32px #00000099;
  pointer-events: none;
  transition: transform .28s cubic-bezier(0.22,1,0.36,1), opacity .28s;
  opacity: 0;
}
#winBanner.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.wb-label { font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--gold); opacity: .75; font-family: sans-serif; }
.wb-amt   { font-size: 2rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px #e8c84a99; line-height: 1.1; font-family: sans-serif; }
.wb-sub   { font-size: .62rem; color: #c0a060; font-family: sans-serif; }

/* ---- HUD ---- */
#hud {
  display: flex; align-items: center;
  background: linear-gradient(180deg, #110d04, #0a0800);
  border-top: 2px solid #5a4010;
  height: var(--hud-h);
  padding: 0 1rem;
  gap: 1rem;
  position: relative; z-index: 20;
}

.hud-group {
  display: flex; flex-direction: column; justify-content: center;
  gap: .1rem;
}
.hud-label {
  font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
  color: #7a6030; font-family: sans-serif;
}
.hud-value {
  font-size: .95rem; font-weight: 700; color: var(--cream);
  font-family: sans-serif; min-width: 80px;
}
.hud-value.accent { color: var(--gold); }

.hud-spacer { flex: 1; }

/* bet controls */
#betBlock {
  display: flex; flex-direction: column; align-items: center; gap: .1rem;
}
.bet-arrows {
  display: flex; flex-direction: column; gap: 1px;
}
.bet-arr {
  width: 22px; height: 18px;
  background: #2a1f08; border: 1px solid #5a4010;
  border-radius: 3px; font-size: .75rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
  color: var(--cream);
}
.bet-arr:hover:not(:disabled) { background: #3a2f10; border-color: var(--gold); }
.bet-arr:disabled { opacity: .3; }
#betDisplay {
  font-size: .9rem; font-weight: 700; color: var(--gold); font-family: sans-serif;
  min-width: 55px; text-align: center;
}

/* spin button */
#spinBtn {
  width: min(58px, 11vw); height: min(58px, 11vw);
  border-radius: 50%;
  background: conic-gradient(from 0deg, #8a7010, #e8c84a, #fff5a0, #e8c84a, #8a7010);
  border: 3px solid #e8c84a88;
  box-shadow: 0 2px 18px #e8c84a44, inset 0 2px 0 #fff6;
  transition: transform .12s, box-shadow .12s, opacity .12s;
  display: flex; align-items: center; justify-content: center;
  color: #1a0a00; font-size: 1.3rem;
  position: relative; overflow: hidden;
}
#spinBtn::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fff4 0%, transparent 60%);
  pointer-events: none;
}
#spinBtn:hover:not(:disabled) {
  transform: scale(1.08);
  box-shadow: 0 4px 24px #e8c84a66, inset 0 2px 0 #fff6;
}
#spinBtn:active:not(:disabled) {
  transform: scale(.93);
  box-shadow: 0 1px 8px #e8c84a22, inset 0 2px 0 #fff3;
}
#spinBtn:disabled { opacity: .45; cursor: default; transform: none; }

/* auto-spin btn */
#autoBtn {
  width: 32px; height: 32px; border-radius: 50%;
  background: #1a1408; border: 1px solid #5a4010;
  font-size: .7rem; display: flex; align-items: center; justify-content: center;
  transition: border-color .15s; color: #a09060;
}
#autoBtn:hover { border-color: var(--gold); color: var(--gold); }

/* music btn */
#musicBtn {
  width: 28px; height: 28px; border-radius: 50%;
  background: #1a1408; border: 1px solid #5a4010;
  font-size: .75rem; display: flex; align-items: center; justify-content: center;
  transition: border-color .15s; color: #a09060;
}
#musicBtn:hover { border-color: var(--gold); color: var(--gold); }

/* info badge */
#infoBadge {
  position: absolute; bottom: calc(var(--hud-h) + 6px); left: 10px;
  background: #1a1408cc; border: 1px solid #4a3810;
  border-radius: 8px; padding: .28rem .55rem;
  font-size: .62rem; font-family: sans-serif; color: #a09060;
  pointer-events: none; z-index: 30;
  display: flex; gap: .8rem;
}
.ib-item strong { color: var(--gold); }

/* cascade counter */
#cascadeCounter {
  position: absolute; top: 50%; right: 8px; transform: translateY(-50%);
  background: #1a140888; border: 1px solid #4a3810;
  border-radius: 8px; padding: .3rem .5rem;
  font-family: sans-serif; text-align: center;
  pointer-events: none; z-index: 30;
  opacity: 0; transition: opacity .3s;
}
#cascadeCounter.show { opacity: 1; }
.cc-label { font-size: .55rem; letter-spacing: .15em; text-transform: uppercase; color: #7a6030; }
.cc-num   { font-size: 1.4rem; font-weight: 900; color: var(--gold); line-height: 1; }

/* bonus ribbon */
#bonusRibbon {
  position: absolute; top: 50%; left: 50%; z-index: 70;
  transform: translate(-50%,-50%) scale(0);
  background: linear-gradient(135deg, #1a0800, #3a1400);
  border: 2px solid #e87020;
  border-radius: 16px; padding: .8rem 2rem;
  text-align: center;
  box-shadow: 0 0 40px #e8702055;
  pointer-events: none;
  transition: transform .35s cubic-bezier(0.22,1,0.36,1), opacity .3s;
  opacity: 0;
}
#bonusRibbon.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
.br-title { font-size: 1.1rem; font-weight: 900; color: #e8a030; text-shadow: 0 0 12px #e8702099; }
.br-sub   { font-size: .7rem; color: #c08050; font-family: sans-serif; margin-top: .15rem; }

/* feature spins hud */
#fsHud {
  position: absolute; top: 6px; right: 8px;
  background: #1a1408cc; border: 1px solid #e8702088;
  border-radius: 8px; padding: .25rem .55rem;
  font-family: sans-serif; font-size: .7rem;
  color: #e8a030; display: none; z-index: 30;
}
#fsHud.show { display: block; }

@media (max-width: 520px) {
  #raccoon { display: none; }
  #hud { gap: .5rem; padding: 0 .5rem; }
  .hud-value { font-size: .8rem; min-width: 60px; }
  #spinBtn { width: 48px; height: 48px; font-size: 1.1rem; }
}
</style>
</head>
<body>
<div id="scene">

  <!-- TOP BAR -->
  <div id="topBar">
    <button class="tb-back" onclick="location.href='/lobby'">&#8592; Lobby</button>
    <span class="spacer"></span>
    <span class="tb-tag" id="tbTag"></span>
    <a href="/logout" style="font-size:.62rem;color:#5a4030;font-family:sans-serif">logout</a>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- TITLE / LOGO -->
    <h1 id="gameTitle">Sir Bandit</h1>

    <!-- RACCOON -->
    <!-- SPRITE SWAP: replace SVG with <img id="raccoon" src="/assets/sir-bandit/raccoon.png"> -->
    <svg id="raccoon" viewBox="0 0 120 180" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Raccoon character">
      <!-- simple placeholder raccoon silhouette -->
      <ellipse cx="60" cy="90" rx="38" ry="52" fill="#666" />
      <ellipse cx="60" cy="90" rx="34" ry="48" fill="#888" />
      <!-- belly -->
      <ellipse cx="60" cy="105" rx="20" ry="28" fill="#bbb" />
      <!-- head -->
      <ellipse cx="60" cy="46" rx="32" ry="28" fill="#888" />
      <!-- mask -->
      <ellipse cx="48" cy="44" rx="10" ry="8" fill="#333" />
      <ellipse cx="72" cy="44" rx="10" ry="8" fill="#333" />
      <!-- ears -->
      <ellipse cx="36" cy="24" rx="10" ry="13" fill="#777" />
      <ellipse cx="84" cy="24" rx="10" ry="13" fill="#777" />
      <!-- inner ears -->
      <ellipse cx="36" cy="24" rx="6" ry="8" fill="#aaa" />
      <ellipse cx="84" cy="24" rx="6" ry="8" fill="#aaa" />
      <!-- hat -->
      <rect x="30" y="14" width="60" height="8" rx="3" fill="#3a3a20" />
      <rect x="38" y="2" width="44" height="16" rx="4" fill="#2a2a18" />
      <!-- eyes -->
      <circle cx="49" cy="44" r="5" fill="white" />
      <circle cx="71" cy="44" r="5" fill="white" />
      <circle cx="50" cy="44" r="3" fill="#111" />
      <circle cx="72" cy="44" r="3" fill="#111" />
      <!-- nose -->
      <ellipse cx="60" cy="54" rx="5" ry="3.5" fill="#333" />
      <!-- moustache -->
      <path d="M44 58 Q52 54 60 58 Q68 54 76 58" stroke="#111" stroke-width="2" fill="none"/>
      <!-- crowbar -->
      <rect x="90" y="80" width="8" height="90" rx="4" fill="#555" transform="rotate(-15 90 80)"/>
      <path d="M96 78 Q110 68 112 80 Q108 92 96 86" fill="#444"/>
    </svg>

    <!-- CABINET -->
    <div id="cabinet">
      <div id="reelFrame">
        <div id="grid"></div>
        <div id="winBanner">
          <div class="wb-label">Win</div>
          <div class="wb-amt" id="wbAmt">0</div>
          <div class="wb-sub">FluxCoins</div>
        </div>
        <div id="cascadeCounter">
          <div class="cc-label">Cascade</div>
          <div class="cc-num" id="ccNum">0</div>
        </div>
        <div id="fsHud">Free Spins: <strong id="fsLeft">0</strong></div>
        <div id="bonusRibbon">
          <div class="br-title" id="brTitle">BONUS!</div>
          <div class="br-sub" id="brSub">Free Spins Triggered</div>
        </div>
      </div>
      <div id="gsCounter">
        <span style="color:#a09060;font-family:sans-serif;font-size:.65rem">Golden Squares:</span>
        <span id="gsNum">0</span>
      </div>
    </div>

    <!-- info badge -->
    <div id="infoBadge">
      <span class="ib-item">RTP <strong>96.34%</strong></span>
      <span class="ib-item">Max <strong>10,000x</strong></span>
      <span class="ib-item">Cluster Pays</span>
    </div>

  </div><!-- /main -->

  <!-- HUD -->
  <div id="hud">
    <div class="hud-group">
      <div class="hud-label">Balance</div>
      <div class="hud-value accent" id="hudBal">0.00</div>
    </div>
    <div class="hud-group">
      <div class="hud-label">Win</div>
      <div class="hud-value" id="hudWin">—</div>
    </div>

    <div class="hud-spacer"></div>

    <!-- bet -->
    <div id="betBlock">
      <div class="hud-label" style="text-align:center">Bet</div>
      <div style="display:flex;align-items:center;gap:.35rem">
        <div class="bet-arrows">
          <button class="bet-arr" id="betUp">▲</button>
          <button class="bet-arr" id="betDown">▼</button>
        </div>
        <div id="betDisplay">2.00</div>
      </div>
    </div>

    <!-- spin -->
    <button id="spinBtn" aria-label="Spin">
      <!-- spin icon -->
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6"/>
        <path d="M2.5 12a10 10 0 0 1 17.8-6.3L21.5 8"/>
        <path d="M2.5 22v-6h6"/>
        <path d="M21.5 12a10 10 0 0 1-17.8 6.3L2.5 16"/>
      </svg>
    </button>

    <!-- auto -->
    <button id="autoBtn" title="Auto spin">A</button>
    <button id="musicBtn" title="Music">🔇</button>
  </div>

</div><!-- /scene -->

<audio id="bgm" loop></audio>

<script>
/* =============================================================
   SIR BANDIT — GAME LOGIC
   =============================================================

   KEY NUMBERS (matching Hacksaw Gaming's Le Bandit)
   RTP:        96.34%  (house edge ~3.66%)
   Volatility: Medium  (3/5)
   Mechanic:   Cluster Pays (5+ touching same symbol, up to 6 reel adjacency)
   Grid:       6 columns × 5 rows
   Max win:    10,000× stake
   Bet range:  0.10 – 100.00 FC
   Bonus:      3 FS symbols = Luck of the Bandit (8 spins)
               4 FS symbols = All That Glitters Is Gold (12 spins)
               5 FS symbols = Treasure at the End of the Rainbow (12 spins, guaranteed rainbow)
   ============================================================= */

const MUSIC_SRC = ''; /* set to '/assets/sir-bandit/theme.mp3' */

const COLS = 6, ROWS = 5;
const HOUSE_EDGE = 0.0366; /* ~96.34% RTP */

/* --- Bet steps --- */
const BET_STEPS = [0.10,0.20,0.50,1,2,5,10,20,50,100];
let betIdx = 4; /* default 2.00 */

/* --- Symbols ---
   To use image sprites, add: img: '/assets/sir-bandit/sym-crown.png'
   The renderer will automatically switch from emoji to <img>.
   clusterMin: minimum cluster size to win
   pay: { 5: mult, 8: mult, 12: mult, 15+: mult } multipliers of BET
*/
const SYMBOLS = [
  /* high pays */
  { id:'camera',  emoji:'📷', label:'Camera',    weight:4,  clusterMin:5, pay:{ 5:3,  8:8,   12:20,  15:50  } },
  { id:'cheese',  emoji:'🧀', label:'Cheese',    weight:5,  clusterMin:5, pay:{ 5:2,  8:6,   12:15,  15:35  } },
  { id:'hat',     emoji:'🎩', label:'Top Hat',   weight:5,  clusterMin:5, pay:{ 5:2,  8:5,   12:12,  15:28  } },
  { id:'beer',    emoji:'🍺', label:'Beer',      weight:6,  clusterMin:5, pay:{ 5:1.5,8:4,   12:10,  15:22  } },
  { id:'baguette',emoji:'🥖', label:'Baguette',  weight:6,  clusterMin:5, pay:{ 5:1.2,8:3,   12:7,   15:16  } },
  { id:'crowbar', emoji:'🔧', label:'Crowbar',   weight:7,  clusterMin:5, pay:{ 5:1,  8:2.5, 12:5,   15:12  } },
  /* low pays (card suits style) */
  { id:'ace',     emoji:'🃏', label:'A',         weight:10, clusterMin:5, pay:{ 5:0.5,8:1.5, 12:3,   15:7   } },
  { id:'king',    emoji:'👑', label:'K',         weight:10, clusterMin:5, pay:{ 5:0.4,8:1.2, 12:2.5, 15:6   } },
  { id:'queen',   emoji:'👸', label:'Q',         weight:10, clusterMin:5, pay:{ 5:0.3,8:1,   12:2,   15:5   } },
  { id:'jack',    emoji:'🤹', label:'J',         weight:10, clusterMin:5, pay:{ 5:0.2,8:0.8, 12:1.5, 15:4   } },
  { id:'ten',     emoji:'🔟', label:'10',        weight:12, clusterMin:5, pay:{ 5:0.2,8:0.6, 12:1.2, 15:3   } },
  /* special */
  { id:'rainbow', emoji:'🌈', label:'Rainbow',   weight:1,  clusterMin:1, pay:{ 1:0 }, special:'rainbow' },
  { id:'fs',      emoji:'⭐',     label:'Bonus',     weight:1,  clusterMin:3, pay:{ 3:0, 4:0, 5:0 }, special:'fs' },
];

const SYM_MAP = {};
for (const s of SYMBOLS) SYM_MAP[s.id] = s;

/* weighted RNG pool */
const POOL = [];
for (const s of SYMBOLS) {
  if (s.special) { /* spawn special symbols less often */
    for (let i = 0; i < s.weight; i++) POOL.push(s.id);
  } else {
    for (let i = 0; i < s.weight * 8; i++) POOL.push(s.id);
  }
}
function rng() { return POOL[Math.floor(Math.random() * POOL.length)]; }

/* =============================================================
   State
   ============================================================= */
let balance     = 0;
let spinning    = false;
let musicOn     = false;
let gsSet       = new Set(); /* golden square positions 'c-r' */
let totalWinThisSpin = 0;
let cascadeCount = 0;
let autoMode    = false;
let autoTimer   = null;
let fsMode      = false;  /* in free spins */
let fsSpins     = 0;
let fsType      = 0;  /* 1=luck, 2=allgold, 3=rainbow */
let guaranteedRainbow = false;

/* grid[c][r] = symbolId */
const grid = [];
for (let c = 0; c < COLS; c++) {
  grid[c] = [];
  for (let r = 0; r < ROWS; r++) grid[c][r] = rng();
}

/* =============================================================
   DOM
   ============================================================= */
const $ = id => document.getElementById(id);
const gridEl    = $('grid');
const hudBal    = $('hudBal');
const hudWin    = $('hudWin');
const betDisp   = $('betDisplay');
const gsNum     = $('gsNum');
const wbAmt     = $('wbAmt');
const winBanner = $('winBanner');
const ccNum     = $('ccNum');
const ccBox     = $('cascadeCounter');
const fsHud     = $('fsHud');
const fsLeft    = $('fsLeft');
const brTitle   = $('brTitle');
const brSub     = $('brSub');
const bonusRib  = $('bonusRibbon');

/* cell DOM refs: cells[c][r] */
const cells = [];

function buildGrid() {
  gridEl.innerHTML = '';
  cells.length = 0;
  for (let c = 0; c < COLS; c++) {
    cells[c] = [];
    for (let r = 0; r < ROWS; r++) {
      const d = document.createElement('div');
      d.className = 'cell';
      d.dataset.c = c; d.dataset.r = r;
      gridEl.appendChild(d);
      cells[c][r] = d;
    }
  }
  renderAll();
}

function renderCell(c, r) {
  const d = cells[c][r];
  const sym = SYM_MAP[grid[c][r]];
  d.innerHTML = '';
  if (sym.img) {
    const img = document.createElement('img');
    img.src = sym.img; img.alt = sym.label;
    d.appendChild(img);
  } else {
    d.textContent = sym.emoji;
  }
  /* golden state */
  if (gsSet.has(`${c}-${r}`)) d.classList.add('golden');
  else d.classList.remove('golden');
}

function renderAll() {
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS; r++) renderCell(c, r);
}

function setBalance(n) {
  balance = Math.max(0, parseFloat(n) || 0);
  hudBal.textContent = balance.toFixed(2);
}

function refreshBet() {
  const b = BET_STEPS[betIdx];
  betDisp.textContent = b.toFixed(2);
  $('betDown').disabled = betIdx === 0;
  $('betUp').disabled   = betIdx === BET_STEPS.length - 1;
}

function updateGsDisplay() {
  gsNum.textContent = gsSet.size;
}

/* =============================================================
   CLUSTER DETECTION
   Find all connected groups of same symbol (4-directional flood)
   ============================================================= */
function findClusters() {
  const visited = Array.from({length: COLS}, () => Array(ROWS).fill(false));
  const clusters = [];

  function flood(c, r, id) {
    if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return [];
    if (visited[c][r]) return [];
    if (grid[c][r] !== id) return [];
    visited[c][r] = true;
    const group = [[c, r]];
    for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      group.push(...flood(c+dc, r+dr, id));
    }
    return group;
  }

  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS; r++) {
      if (!visited[c][r]) {
        const sym = SYM_MAP[grid[c][r]];
        if (sym.special) continue; /* specials don't cluster-pay */
        const group = flood(c, r, grid[c][r]);
        if (group.length >= (sym.clusterMin ?? 5)) {
          clusters.push({ symId: grid[c][r], cells: group });
        }
      }
    }
  }
  return clusters;
}

/* =============================================================
   EVALUATE WIN
   ============================================================= */
function calcWin(clusters, bet) {
  let total = 0;
  for (const cl of clusters) {
    const sym  = SYM_MAP[cl.symId];
    const size = cl.cells.length;
    /* find highest pay bracket */
    let mult = 0;
    const brackets = Object.keys(sym.pay).map(Number).sort((a,b) => b-a);
    for (const thresh of brackets) {
      if (size >= thresh) { mult = sym.pay[thresh]; break; }
    }
    /* house edge: small chance of reduced payout */
    if (Math.random() < HOUSE_EDGE * 0.5) mult = Math.max(0, mult * 0.7);
    total += mult * bet;
  }
  return Math.round(total * 100) / 100;
}

/* =============================================================
   COUNT SPECIAL SYMBOLS
   ============================================================= */
function countSpecial(specialType) {
  let n = 0;
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r < ROWS; r++)
      if (SYM_MAP[grid[c][r]].special === specialType) n++;
  return n;
}

/* =============================================================
   ANIMATION HELPERS
   ============================================================= */
const delay = ms => new Promise(r => setTimeout(r, ms));

async function flashWinCells(cellList) {
  for (const [c, r] of cellList) cells[c][r].classList.add('win-flash');
  await delay(460);
  for (const [c, r] of cellList) cells[c][r].classList.remove('win-flash');
}

async function vanishCells(positions) {
  const ps = [];
  for (const [c, r] of positions) {
    cells[c][r].classList.add('vanish');
    ps.push(new Promise(res => cells[c][r].addEventListener('animationend', res, {once:true})));
  }
  await Promise.all(ps);
}

async function dropIn(c) {
  /* mark golden squares for positions that were part of win */
  for (let r = 0; r < ROWS; r++) {
    renderCell(c, r);
    if (cells[c][r].innerHTML !== '') {
      cells[c][r].classList.add('drop-in');
      cells[c][r].addEventListener('animationend', () => cells[c][r].classList.remove('drop-in'), {once:true});
    }
  }
}

/* =============================================================
   GOLDEN SQUARES ACTIVATION (triggered by rainbow symbol)
   ============================================================= */
function activateGoldenSquares(bet) {
  if (gsSet.size === 0) return 0;
  let totalCoinVal = 0;
  /* assign coin values to golden positions */
  const coinValues = [];
  for (const key of gsSet) {
    const [c, r] = key.split('-').map(Number);
    const roll = Math.random();
    let tier, val;
    if (roll < 0.55)      { tier = 'bronze'; val = (0.2 + Math.random() * 3.8) * bet; }
    else if (roll < 0.85) { tier = 'silver'; val = (5   + Math.random() * 15)  * bet; }
    else                  { tier = 'gold';   val = (50  + Math.random() * 450) * bet; }
    coinValues.push({ c, r, tier, val });
    totalCoinVal += val;
    /* show overlay briefly */
    const ov = document.createElement('div');
    ov.className = `coin-overlay coin-${tier}`;
    ov.textContent = `${val.toFixed(0)}x`;
    cells[c][r].appendChild(ov);
  }
  gsSet.clear();
  updateGsDisplay();
  return Math.round(totalCoinVal * 100) / 100;
}

/* =============================================================
   CASCADE STEP
   Remove winning cells, mark golden squares, drop new symbols
   ============================================================= */
async function cascadeStep(clusters) {
  const toRemove = new Set();
  for (const cl of clusters) for (const pos of cl.cells) toRemove.add(`${pos[0]}-${pos[1]}`);

  /* mark golden squares on positions being removed */
  for (const key of toRemove) gsSet.add(key);
  updateGsDisplay();

  /* flash then vanish */
  await flashWinCells([...toRemove].map(k => k.split('-').map(Number)));
  await vanishCells([...toRemove].map(k => k.split('-').map(Number)));

  /* gravity: for each column, collapse symbols down */
  for (let c = 0; c < COLS; c++) {
    let writeRow = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (!toRemove.has(`${c}-${r}`)) {
        grid[c][writeRow] = grid[c][r];
        writeRow--;
      }
    }
    /* fill top with new symbols */
    for (let r = writeRow; r >= 0; r--) grid[c][r] = rng();
  }

  /* drop-in animation */
  for (let c = 0; c < COLS; c++) await dropIn(c);
  await delay(80);
}

/* =============================================================
   MAIN SPIN SEQUENCE
   ============================================================= */
async function doSpin() {
  if (spinning) return;
  const bet = BET_STEPS[betIdx];

  /* free spin mode doesn't deduct */
  if (!fsMode) {
    if (balance < bet) { flashRed(); return; }
    setBalance(balance - bet);
  }

  spinning      = true;
  $('spinBtn').disabled = true;
  $('betDown').disabled = true;
  $('betUp').disabled   = true;
  hideBanner();
  totalWinThisSpin = 0;
  cascadeCount = 0;
  ccBox.classList.remove('show');
  hudWin.textContent = '—';

  /* ---- spin animation: shuffle grid quickly ---- */
  const spinFrames = 14;
  for (let f = 0; f < spinFrames; f++) {
    for (let c = 0; c < COLS; c++)
      for (let r = 0; r < ROWS; r++) {
        /* staggered stop: cols stop left-to-right */
        if (f < spinFrames - 1 - c * 1.2) grid[c][r] = rng();
      }
    renderAll();
    await delay(70 + f * 4);
  }

  /* land final grid (optionally guarantee rainbow in TREASURE mode) */
  if (fsMode && fsType === 3 && guaranteedRainbow) {
    /* place a rainbow on a random position */
    const rc = Math.floor(Math.random() * COLS);
    const rr = Math.floor(Math.random() * ROWS);
    grid[rc][rr] = 'rainbow';
  }
  renderAll();
  await delay(120);

  /* ---- check free spin triggers ---- */
  if (!fsMode) {
    const fsCount = countSpecial('fs');
    if (fsCount >= 3) {
      await triggerFreeSpins(fsCount, bet);
      spinning = false;
      $('spinBtn').disabled = false;
      refreshBet();
      return;
    }
  } else {
    fsSpins--;
    fsLeft.textContent = fsSpins;
    if (fsSpins <= 0) await endFreeSpins();
  }

  /* ---- cascade loop ---- */
  let cascadeWin = 0;
  for (let pass = 0; pass < 30; pass++) {
    const clusters = findClusters();

    /* check for rainbow activation */
    const rainbowCount = countSpecial('rainbow');
    if (rainbowCount > 0 && gsSet.size > 0) {
      /* activate golden squares */
      const gsWin = activateGoldenSquares(bet);
      if (gsWin > 0) {
        cascadeWin += gsWin;
        totalWinThisSpin += gsWin;
        hudWin.textContent = `+${cascadeWin.toFixed(2)}`;
        await delay(700);
        /* clear coin overlays */
        document.querySelectorAll('.coin-overlay').forEach(e => e.remove());
      }
      /* remove rainbow(s) */
      for (let c = 0; c < COLS; c++)
        for (let r = 0; r < ROWS; r++)
          if (grid[c][r] === 'rainbow') grid[c][r] = rng();
      renderAll();
    }

    if (clusters.length === 0) break;

    cascadeCount++;
    if (cascadeCount > 1) {
      ccNum.textContent = cascadeCount;
      ccBox.classList.add('show');
    }

    const win = calcWin(clusters, bet);
    cascadeWin += win;
    totalWinThisSpin += win;
    hudWin.textContent = `+${cascadeWin.toFixed(2)}`;

    await cascadeStep(clusters);
    await delay(120);
  }

  ccBox.classList.remove('show');

  /* persist to server */
  if (!fsMode) {
    const netDelta = totalWinThisSpin - bet; /* bet already deducted above */
    /* actually: we deducted bet, server needs full win to add back */
    await settle(totalWinThisSpin - bet);
  } else {
    /* in fs mode, no initial deduction — just add winnings */
    if (totalWinThisSpin > 0) {
      setBalance(balance + totalWinThisSpin);
      await settle(totalWinThisSpin);
    }
  }

  if (totalWinThisSpin > 0) {
    setBalance(balance + (fsMode ? 0 : totalWinThisSpin)); /* already added above in non-fs */
    showBanner(totalWinThisSpin);
    hudWin.textContent = `+${totalWinThisSpin.toFixed(2)}`;
  }

  /* re-sync from server */
  fetchBalance();

  spinning = false;
  $('spinBtn').disabled = false;
  refreshBet();

  if (autoMode && !fsMode) {
    autoTimer = setTimeout(doSpin, 600);
  }
}

/* =============================================================
   FREE SPINS FLOW
   ============================================================= */
async function triggerFreeSpins(fsCount, bet) {
  let title, sub, spins, type;
  if (fsCount >= 5)      { type=3; spins=12; title='TREASURE AT THE END OF THE RAINBOW'; sub='12 Free Spins — Rainbow Guaranteed Every Spin!'; guaranteedRainbow=true; }
  else if (fsCount >= 4) { type=2; spins=12; title='ALL THAT GLITTERS IS GOLD';          sub='12 Free Spins — Golden Squares persist every spin!'; guaranteedRainbow=false; }
  else                   { type=1; spins=8;  title='LUCK OF THE BANDIT';                 sub='8 Free Spins — Golden Squares persist!'; guaranteedRainbow=false; }

  fsMode = true; fsType = type; fsSpins = spins;
  brTitle.textContent = title;
  brSub.textContent   = sub;
  bonusRib.classList.add('show');
  await delay(2800);
  bonusRib.classList.remove('show');

  fsHud.classList.add('show');
  fsLeft.textContent = fsSpins;

  /* run free spins */
  for (let i = 0; i < spins; i++) {
    if (fsSpins <= 0) break;
    await doSpin();
    await delay(400);
  }
  await endFreeSpins();
}

async function endFreeSpins() {
  fsMode = false; fsType = 0; fsSpins = 0; guaranteedRainbow = false;
  fsHud.classList.remove('show');
  gsSet.clear(); updateGsDisplay();
  if (totalWinThisSpin > 0) showBanner(totalWinThisSpin);
}

/* =============================================================
   SERVER PERSIST
   ============================================================= */
async function settle(delta) {
  if (delta === 0) return;
  try {
    const r = await fetch('/api/sirbandit/settle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ won: Math.round(delta * 100) / 100 }),
    });
    const d = await r.json();
    if (r.ok && d.newBal !== undefined) setBalance(d.newBal);
  } catch (_) { fetchBalance(); }
}

function fetchBalance() {
  fetch('/api/balance').then(r=>r.json()).then(d=>{ if(d.bal!==undefined) setBalance(d.bal); }).catch(()=>{});
}

/* balance from parent postMessage (if ever iframed) */
window.addEventListener('message', ev => {
  if (!ev.data) return;
  if (ev.data.type === 'fluxer:init' || ev.data.type === 'fluxer:sync')
    setBalance(ev.data.balance ?? 0);
});

/* =============================================================
   UI HELPERS
   ============================================================= */
function showBanner(amt) {
  wbAmt.textContent = `+${amt.toFixed(2)}`;
  winBanner.classList.add('show');
  setTimeout(() => winBanner.classList.remove('show'), 2800);
}
function hideBanner() { winBanner.classList.remove('show'); }

function flashRed() {
  $('spinBtn').style.background = 'conic-gradient(from 0deg,#600,#c00,#f66,#c00,#600)';
  setTimeout(() => { $('spinBtn').style.background = ''; }, 500);
}

/* =============================================================
   CONTROLS
   ============================================================= */
$('betDown').addEventListener('click', () => { if (betIdx > 0) { betIdx--; refreshBet(); } });
$('betUp').addEventListener('click',   () => { if (betIdx < BET_STEPS.length-1) { betIdx++; refreshBet(); } });
$('spinBtn').addEventListener('click', doSpin);
document.addEventListener('keydown', e => { if (e.code === 'Space' && !spinning) { e.preventDefault(); doSpin(); } });

$('autoBtn').addEventListener('click', () => {
  autoMode = !autoMode;
  $('autoBtn').style.color = autoMode ? 'var(--gold)' : '';
  $('autoBtn').style.borderColor = autoMode ? 'var(--gold)' : '';
  if (!autoMode && autoTimer) { clearTimeout(autoTimer); autoTimer = null; }
  else if (autoMode && !spinning) doSpin();
});

const bgm = $('bgm');
if (MUSIC_SRC) bgm.src = MUSIC_SRC;
$('musicBtn').addEventListener('click', () => {
  if (!MUSIC_SRC) return;
  musicOn = !musicOn;
  if (musicOn) { bgm.volume = 0.35; bgm.play().catch(()=>{}); $('musicBtn').textContent = '🔊'; }
  else          { bgm.pause(); $('musicBtn').textContent = '🔇'; }
});

/* =============================================================
   INIT
   ============================================================= */
buildGrid();
refreshBet();
fetchBalance();

/* read username from cookie */
try {
  const m = document.cookie.match(/(?:^|;\s*)dtag=([^;]*)/);
  if (m) $('tbTag').textContent = decodeURIComponent(m[1]);
} catch(_){}

/* passive balance poll */
setInterval(() => {
  if (!spinning) fetchBalance();
}, 12000);
</script>
