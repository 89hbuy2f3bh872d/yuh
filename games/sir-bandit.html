        <script>
            /* =============================================================
   SIR BANDIT — GAME LOGIC
   Mechanics modelled on Hacksaw Gaming "Le Bandit":
   · 6×5 cluster pays (5+ orthogonally-connected matching symbols)
   · Wild substitutes for paytable symbols
   · Super Cascades: winning symbols clear, new ones drop
   · Golden Squares form behind winning positions, persist until a Rainbow lands
   · Rainbow activation reveals Coins (bronze/silver/gold), Four-Leaf Clovers
     (×2–×10 to adjacent coins/pots) and Pots of Gold (collector that sweeps the
     board then re-reveals → chain). Clovers apply first, pots collect after.
   · Free Spins: 3 FS = Luck of the Bandit (8), 4 FS = All That Glitters (12),
     5 FS = Treasure at the End of the Rainbow (12, rainbow guaranteed).
   · Bonus Buy: BonusHunt 3×, Rainbow FeatureSpins 50×, Luck 100×, Glitters 250×.
   ============================================================= */

            /* ============ AUDIO PLACEHOLDERS — fill these in ============
   Drop your files in /assets/sir-bandit/sfx/ and set the paths.
   Each plays via playSfx('key'). Leaving a path '' simply no-ops. */
            const MUSIC_SRC = "/assets/sir-bandit/theme.webm"; // SWAP: '/assets/sir-bandit/theme.mp3'
            const SFX = {
                click: "/assets/sir-bandit/sfx/click.mp3", // SWAP: '/assets/sir-bandit/sfx/click.mp3'
                spin: "", // reels start
                reelStop: "", // each reel lands
                win: "", // cluster win
                cascade: "", // symbols drop after a clear
                goldenForm: "", // a golden square is created
                rainbow: "", // rainbow lands / activation begins
                coinReveal: "", // a coin is revealed
                clover: "", // clover multiplier pops
                potCollect: "", // pot of gold sweeps the board
                bonusTrigger: "", // free spins triggered
                bigWin: "", // big win banner
                noFunds: "", // not enough balance
            };
            /* ============================================================ */

            const COLS = 6,
                ROWS = 5;
            const HOUSE_EDGE = 0.0366;

            const BET_STEPS = [0.1, 0.2, 0.5, 1, 2, 5, 10, 20, 50, 100];
            let betIdx = 4;

            /* ---- Symbols ----
   Paytable symbols cluster (5+). To use art: add  img:'/assets/...'  to any entry.
   pay = cluster-size → multiplier-of-bet brackets. */
            const SYMBOLS = [
                {
                    id: "reward",
                    emoji: "📷",
                    label: "Camera",
                    weight: 4,
                    pay: { 5: 3, 8: 8, 12: 20, 15: 50 },
                }, // top pay
                {
                    id: "cheese",
                    emoji: "🧀",
                    label: "Cheese",
                    weight: 5,
                    pay: { 5: 2, 8: 6, 12: 15, 15: 35 },
                },
                {
                    id: "hat",
                    emoji: "🎩",
                    label: "Top Hat",
                    weight: 5,
                    pay: { 5: 2, 8: 5, 12: 12, 15: 28 },
                },
                {
                    id: "trap",
                    emoji: "🪤",
                    label: "Trap",
                    weight: 6,
                    pay: { 5: 1.5, 8: 4, 12: 10, 15: 22 },
                },
                {
                    id: "ace",
                    glyph: "A",
                    cls: "royal A",
                    weight: 9,
                    pay: { 5: 0.5, 8: 1.5, 12: 3, 15: 7 },
                },
                {
                    id: "king",
                    glyph: "K",
                    cls: "royal K",
                    weight: 9,
                    pay: { 5: 0.4, 8: 1.2, 12: 2.5, 15: 6 },
                },
                {
                    id: "queen",
                    glyph: "Q",
                    cls: "royal Q",
                    weight: 9,
                    pay: { 5: 0.3, 8: 1, 12: 2, 15: 5 },
                },
                {
                    id: "jack",
                    glyph: "J",
                    cls: "royal J",
                    weight: 10,
                    pay: { 5: 0.25, 8: 0.8, 12: 1.6, 15: 4 },
                },
                {
                    id: "ten",
                    glyph: "10",
                    cls: "royal T",
                    weight: 11,
                    pay: { 5: 0.2, 8: 0.6, 12: 1.2, 15: 3 },
                },
                /* specials (no cluster pay) */
                {
                    id: "wild",
                    emoji: "🦝",
                    label: "Wild",
                    weight: 2,
                    special: "wild",
                },
                {
                    id: "rainbow",
                    emoji: "🌈",
                    label: "Rainbow",
                    weight: 2,
                    special: "rainbow",
                },
                {
                    id: "fs",
                    emoji: "⭐",
                    label: "Bonus",
                    weight: 1,
                    special: "fs",
                },
            ];
            const SYM = Object.fromEntries(SYMBOLS.map((s) => [s.id, s]));
            const PAYTABLE = SYMBOLS.filter((s) => !s.special).map((s) => s.id);

            /* weighted draw pool (specials kept rare) */
            function buildPool(opts = {}) {
                const pool = [];
                for (const s of SYMBOLS) {
                    let w = s.weight;
                    if (s.special === "fs")
                        w = opts.fsBoost ? s.weight * 5 : s.weight; // BonusHunt boost
                    if (s.special === "rainbow")
                        w = opts.noRainbow ? 0 : s.weight;
                    if (!s.special) w = s.weight * 9;
                    for (let i = 0; i < w; i++) pool.push(s.id);
                }
                return pool;
            }
            function draw(pool) {
                return pool[Math.floor(Math.random() * pool.length)];
            }

            /* ---- Coin / clover / pot reveal pools (golden square activation) ---- */
            const COIN_TIERS = {
                bronze: [0.2, 0.5, 1, 2, 3, 4],
                silver: [5, 10, 15, 20],
                gold: [25, 50, 100, 250, 500],
            };
            const CLOVER_MULTS = [2, 3, 4, 5, 10];
            function revealSymbol(opts = {}) {
                const r = Math.random();
                // probabilities; Treasure mode forbids bronze
                if (!opts.noBronze && r < 0.5) return coinReveal("bronze");
                if (r < 0.78) return coinReveal("silver");
                if (r < 0.9) return coinReveal("gold");
                if (r < 0.965)
                    return {
                        type: "clover",
                        mult: CLOVER_MULTS[
                            Math.floor(Math.random() * CLOVER_MULTS.length)
                        ],
                    };
                return { type: "pot" }; // ~3.5% collector
            }
            function coinReveal(tier) {
                const arr = COIN_TIERS[tier];
                return {
                    type: "coin",
                    tier,
                    base: arr[Math.floor(Math.random() * arr.length)],
                };
            }

            /* =============================================================
   STATE
   ============================================================= */
            let balance = 1000; // demo default; overwritten by /api/balance if available
            let spinning = false,
                autoMode = false,
                autoTimer = null;
            let musicOn = false,
                sfxOn = true;
            let fsMode = false,
                fsSpins = 0,
                fsType = 0; // 1 Luck, 2 Glitters, 3 Treasure
            let guaranteedRainbow = false,
                keepGoldenAfterActivate = false;
            let pendingRainbow = false,
                pendingFsBoost = false; // bonus-buy "activate" flags

            const grid = []; // grid[c][r] = symbol id
            const golden = new Set(); // fixed positions 'c-r' that are golden
            const reveal = {}; // 'c-r' -> reveal object (during coin feature)
            for (let c = 0; c < COLS; c++) {
                grid[c] = [];
                for (let r = 0; r < ROWS; r++) grid[c][r] = draw(buildPool());
            }

            /* =============================================================
   DOM
   ============================================================= */
            const $ = (id) => document.getElementById(id);
            const gridEl = $("grid"),
                hudBal = $("hudBal"),
                hudWin = $("hudWin"),
                betDisp = $("betDisplay");
            const winBanner = $("winBanner"),
                wbAmt = $("wbAmt"),
                wbLabel = $("wbLabel");
            const ctTag = $("cascadeTag"),
                ctNum = $("ctNum"),
                fsHud = $("fsHud"),
                fsLeftEl = $("fsLeft"),
                fsModeEl = $("fsMode");
            const bonusRib = $("bonusRibbon"),
                brTitle = $("brTitle"),
                brSub = $("brSub");

            const reels = []; // reels[c] = {el, track}
            const cellEls = []; // cellEls[c][r]

            function buildBoard() {
                gridEl.innerHTML = "";
                reels.length = 0;
                cellEls.length = 0;
                for (let c = 0; c < COLS; c++) {
                    const reel = document.createElement("div");
                    reel.className = "reel";
                    const track = document.createElement("div");
                    track.className = "reel-track";
                    reel.appendChild(track);
                    gridEl.appendChild(reel);
                    reels[c] = { el: reel, track };
                    cellEls[c] = [];
                    for (let r = 0; r < ROWS; r++) {
                        const cell = makeCell(c, r);
                        track.appendChild(cell);
                        cellEls[c][r] = cell;
                    }
                }
            }
            function makeCell(c, r) {
                const d = document.createElement("div");
                d.className = "cell";
                d.dataset.c = c;
                d.dataset.r = r;
                paintCell(d, c, r);
                return d;
            }
            function paintCell(d, c, r) {
                const key = `${c}-${r}`;
                d.classList.toggle("golden", golden.has(key));
                // reveal state (coin feature) takes precedence
                if (reveal[key]) {
                    d.innerHTML = "";
                    d.appendChild(renderReveal(reveal[key]));
                    return;
                }
                const s = SYM[grid[c][r]];
                d.innerHTML = "";
                if (s.img) {
                    const img = new Image();
                    img.src = s.img;
                    img.alt = s.label || s.id;
                    d.appendChild(img);
                } else if (s.glyph) {
                    const g = document.createElement("span");
                    g.className = "glyph " + (s.cls || "");
                    g.textContent = s.glyph;
                    d.appendChild(g);
                } else d.textContent = s.emoji;
            }
            function renderReveal(rv) {
                if (rv.type === "coin") {
                    const c = document.createElement("div");
                    c.className = `coin ${rv.tier} shine`;
                    const v = document.createElement("span");
                    v.className = "v";
                    v.textContent = rv.value ?? rv.base;
                    c.appendChild(v);
                    return c;
                }
                if (rv.type === "clover") {
                    const e = document.createElement("div");
                    e.className = "clover pop";
                    e.textContent = "🍀";
                    const t = document.createElement("span");
                    t.style.cssText =
                        "position:absolute;bottom:2px;right:4px;font-family:Arial Black;font-size:.5em;color:#7ad03a";
                    t.textContent = "×" + rv.mult;
                    e.appendChild(t);
                    return e;
                }
                // pot
                const e = document.createElement("div");
                e.className = "pot pop";
                e.textContent = "💰";
                const t = document.createElement("span");
                t.className = "ptag";
                t.textContent =
                    rv.collected != null
                        ? rv.collected.toFixed(0) + "×"
                        : "COLLECT";
                e.appendChild(t);
                return e;
            }
            function repaintAll() {
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        paintCell(cellEls[c][r], c, r);
            }

            /* =============================================================
   HELPERS
   ============================================================= */
            const delay = (ms) => new Promise((r) => setTimeout(r, ms));
            const bet = () => BET_STEPS[betIdx];
            function setBalance(n) {
                balance = Math.max(0, Math.round((+n || 0) * 100) / 100);
                hudBal.textContent = balance.toFixed(2);
            }
            function refreshBet() {
                betDisp.textContent = bet().toFixed(2);
                $("bbBet").textContent = bet().toFixed(2);
                $("betDown").disabled = betIdx === 0;
                $("betUp").disabled = betIdx === BET_STEPS.length - 1;
            }
            function toast(msg) {
                const t = $("toast");
                t.textContent = msg;
                t.classList.add("show");
                clearTimeout(t._t);
                t._t = setTimeout(() => t.classList.remove("show"), 2200);
            }

            let audioCtx = null;
            function playSfx(key) {
                if (!sfxOn) return;
                const src = SFX[key];
                if (src) {
                    const a = new Audio(src);
                    a.volume = 0.6;
                    a.play().catch(() => {});
                    return;
                }
                // graceful fallback beep so the game feels alive before you add files
                try {
                    audioCtx =
                        audioCtx ||
                        new (
                            window.AudioContext || window.webkitAudioContext
                        )();
                    const map = {
                        click: 520,
                        spin: 300,
                        reelStop: 380,
                        win: 660,
                        cascade: 440,
                        goldenForm: 720,
                        rainbow: 880,
                        coinReveal: 780,
                        clover: 990,
                        potCollect: 560,
                        bonusTrigger: 840,
                        bigWin: 1040,
                        noFunds: 160,
                    };
                    const o = audioCtx.createOscillator(),
                        g = audioCtx.createGain();
                    o.frequency.value = map[key] || 500;
                    o.type = "triangle";
                    g.gain.value = 0.04;
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start();
                    g.gain.exponentialRampToValueAtTime(
                        0.0001,
                        audioCtx.currentTime + 0.18,
                    );
                    o.stop(audioCtx.currentTime + 0.2);
                } catch (_) {}
            }

            /* =============================================================
   CLUSTER DETECTION (flood fill, wild substitutes)
   ============================================================= */
            function findClusters() {
                const seen = Array.from({ length: COLS }, () =>
                    Array(ROWS).fill(false),
                );
                const clusters = [];
                const matches = (c, r, id) =>
                    grid[c][r] === id || grid[c][r] === "wild";
                function flood(c, r, id, group) {
                    if (
                        c < 0 ||
                        c >= COLS ||
                        r < 0 ||
                        r >= ROWS ||
                        seen[c][r] ||
                        !matches(c, r, id)
                    )
                        return;
                    seen[c][r] = true;
                    group.push([c, r]);
                    flood(c + 1, r, id, group);
                    flood(c - 1, r, id, group);
                    flood(c, r + 1, id, group);
                    flood(c, r - 1, id, group);
                }
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) {
                        if (seen[c][r]) continue;
                        const id = grid[c][r];
                        if (SYM[id].special) continue; // seeds only from paytable symbols
                        const group = [];
                        flood(c, r, id, group);
                        if (group.length >= 5)
                            clusters.push({ id, cells: group });
                        else
                            group.forEach(([gc, gr]) => (seen[gc][gr] = false)); // release wilds for other seeds
                    }
                return clusters;
            }
            function payCluster(cl) {
                const s = SYM[cl.id],
                    n = cl.cells.length;
                const brk = Object.keys(s.pay)
                    .map(Number)
                    .sort((a, b) => b - a);
                let mult = 0;
                for (const t of brk) {
                    if (n >= t) {
                        mult = s.pay[t];
                        break;
                    }
                }
                if (Math.random() < HOUSE_EDGE * 0.5) mult *= 0.7; // RTP shave
                return Math.round(mult * bet() * 100) / 100;
            }
            const countSpecial = (type) => {
                let n = 0;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++)
                        if (SYM[grid[c][r]].special === type) n++;
                return n;
            };
            const hasRainbow = () => countSpecial("rainbow") > 0;

            /* =============================================================
   SPIN ANIMATION — real scrolling reels, staggered stop
   ============================================================= */
            function genGrid(opts) {
                const pool = buildPool(opts);
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) grid[c][r] = draw(pool);
                if (opts.forceRainbow && !hasRainbow()) {
                    grid[Math.floor(Math.random() * COLS)][
                        Math.floor(Math.random() * ROWS)
                    ] = "rainbow";
                }
            }
            async function animateSpin() {
                playSfx("spin");
                const SPIN_CELLS = 18;
                const pool = buildPool();
                const promises = [];
                for (let c = 0; c < COLS; c++) {
                    const { track } = reels[c];
                    track.classList.add("spinning");
                    // build padded track: random cells on top + final 5
                    track.innerHTML = "";
                    const pads = [];
                    for (let i = 0; i < SPIN_CELLS; i++) {
                        const d = document.createElement("div");
                        d.className = "cell";
                        d.textContent = SYM[draw(pool)].emoji || "?";
                        const sid = draw(pool),
                            s = SYM[sid];
                        d.innerHTML = "";
                        if (s.glyph) {
                            const g = document.createElement("span");
                            g.className = "glyph " + (s.cls || "");
                            g.textContent = s.glyph;
                            d.appendChild(g);
                        } else d.textContent = s.emoji;
                        track.appendChild(d);
                        pads.push(d);
                    }
                    cellEls[c] = [];
                    for (let r = 0; r < ROWS; r++) {
                        const cell = makeCell(c, r);
                        track.appendChild(cell);
                        cellEls[c][r] = cell;
                    }
                    // start scrolled so pads are visible, then slide down to reveal final 5
                    const cellH =
                        track.children[0].getBoundingClientRect().height || 60;
                    const shift = SPIN_CELLS * cellH; // distance to scroll pads out, finals in
                    track.style.transition = "none";
                    track.style.transform = "translateY(0)"; // start: pad symbols visible
                    track.getBoundingClientRect(); // reflow
                    const dur = 650 + c * 130;
                    track.style.transition = `transform ${dur}ms cubic-bezier(.18,.7,.2,1.08)`;
                    track.style.transform = `translateY(${-shift}px)`; // end: final symbols visible
                    promises.push(
                        new Promise((res) => {
                            setTimeout(() => {
                                track.classList.remove("spinning");
                                // strip pads, keep only final cells
                                pads.forEach((p) => p.remove());
                                track.style.transition = "none";
                                track.style.transform = "translateY(0)";
                                playSfx("reelStop");
                                res();
                            }, dur + 20);
                        }),
                    );
                }
                await Promise.all(promises);
            }

            /* =============================================================
   CASCADE STEP — clear winners → golden squares → gravity drop
   (per-column arrays = no index corruption / infinite vanish)
   ============================================================= */
            async function cascadeStep(clusters) {
                const removed = new Set();
                for (const cl of clusters)
                    for (const [c, r] of cl.cells) removed.add(`${c}-${r}`);

                // golden squares form behind winning positions (persist)
                let formed = false;
                for (const key of removed) {
                    if (!golden.has(key)) {
                        golden.add(key);
                        formed = true;
                    }
                }
                if (formed) playSfx("goldenForm");

                // flash + vanish
                for (const key of removed) {
                    const [c, r] = key.split("-").map(Number);
                    cellEls[c][r].classList.add("win-flash");
                }
                await delay(420);
                const vps = [];
                for (const key of removed) {
                    const [c, r] = key.split("-").map(Number);
                    const el = cellEls[c][r];
                    el.classList.remove("win-flash");
                    el.classList.add("vanish");
                    vps.push(
                        new Promise((res) =>
                            el.addEventListener("animationend", res, {
                                once: true,
                            }),
                        ),
                    );
                }
                await Promise.all(vps);

                // gravity per column (clean rebuild) — track how far each cell falls
                const pool = buildPool();
                const dist = []; // dist[c][r] = rows fallen (0 = didn't move)
                for (let c = 0; c < COLS; c++) {
                    const survivors = []; // {sym, oldR}
                    for (let r = 0; r < ROWS; r++)
                        if (!removed.has(`${c}-${r}`))
                            survivors.push({ sym: grid[c][r], oldR: r });
                    const newCount = ROWS - survivors.length;
                    const fresh = [];
                    for (let i = 0; i < newCount; i++) fresh.push(draw(pool));
                    grid[c] = fresh.concat(survivors.map((s) => s.sym));
                    dist[c] = [];
                    for (let r = 0; r < newCount; r++)
                        dist[c][r] = newCount - r + 0.5; // new symbols fall in from above the board
                    for (let j = 0; j < survivors.length; j++) {
                        const nr = newCount + j;
                        dist[c][nr] = nr - survivors[j].oldR;
                    } // survivors sink
                }
                // re-render columns
                for (let c = 0; c < COLS; c++) {
                    const track = reels[c].track;
                    track.innerHTML = "";
                    cellEls[c] = [];
                    for (let r = 0; r < ROWS; r++) {
                        const cell = makeCell(c, r);
                        track.appendChild(cell);
                        cellEls[c][r] = cell;
                    }
                }
                // measure a cell's height, then animate the real fall (bouncy landing)
                const cellH =
                    cellEls[0][0].getBoundingClientRect().height || 60;
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) {
                        const d = dist[c][r] || 0;
                        if (d <= 0) continue; // static survivors stay put
                        const cell = cellEls[c][r];
                        cell.style.transition = "none";
                        cell.style.transform = `translateY(${-(d * cellH).toFixed(1)}px)`;
                    }
                gridEl.getBoundingClientRect(); // reflow so the start offset sticks
                for (let c = 0; c < COLS; c++)
                    for (let r = 0; r < ROWS; r++) {
                        const d = dist[c][r] || 0;
                        if (d <= 0) continue;
                        const cell = cellEls[c][r];
                        const dur = 240 + Math.min(d, 5) * 60;
                        cell.style.transition = `transform ${dur}ms cubic-bezier(.34,1.5,.5,1)`;
                        cell.style.transform = "translateY(0)";
                    }
                playSfx("cascade");
                await delay(430);
            }

            /* =============================================================
   COIN FEATURE — rainbow activates golden squares
   reveal → clovers multiply → pots collect → re-reveal chain
   ============================================================= */
            async function runCoinFeature() {
                playSfx("rainbow");
                flashRainbow();
                await delay(450);
                let collectedTotal = 0; // value banked by pots
                let potCarry = 0;
                const noBronze = fsType === 3;
                const tStart = performance.now();
                const fdelay = (ms) =>
                    delay(performance.now() - tStart > 9000 ? 0 : ms); // cap total feature length

                for (let pass = 0; pass < 8; pass++) {
                    // reveal every golden square that isn't already revealed
                    const keys = [...golden].filter((k) => !reveal[k]);
                    if (keys.length === 0 && pass > 0) break;
                    for (const k of keys) {
                        reveal[k] = revealSymbol({ noBronze });
                        const [c, r] = k.split("-").map(Number);
                        paintCell(cellEls[c][r], c, r);
                        playSfx(
                            reveal[k].type === "coin"
                                ? "coinReveal"
                                : reveal[k].type === "clover"
                                  ? "clover"
                                  : "potCollect",
                        );
                        await fdelay(keys.length > 14 ? 40 : 65);
                    }
                    await fdelay(180);

                    // clovers multiply adjacent coins & pots (8-neighbour)
                    const coins = [],
                        pots = [],
                        clovers = [];
                    for (const k of golden) {
                        const rv = reveal[k];
                        if (!rv) continue;
                        const [c, r] = k.split("-").map(Number);
                        if (rv.type === "coin") {
                            rv.value = rv.base;
                            coins.push({ k, c, r, rv });
                        } else if (rv.type === "pot")
                            pots.push({ k, c, r, rv });
                        else if (rv.type === "clover")
                            clovers.push({ k, c, r, rv });
                    }
                    if (clovers.length) {
                        for (const cv of clovers) {
                            const cvEl = cellEls[cv.c][cv.r].firstElementChild;
                            if (cvEl) {
                                cvEl.classList.remove("burst");
                                void cvEl.offsetWidth;
                                cvEl.classList.add("burst");
                            }
                            spawnSparkles(cellEls[cv.c][cv.r], 10, "#7ad03a");
                            playSfx("clover");
                            await fdelay(120);
                            for (const t of [...coins, ...pots]) {
                                if (
                                    Math.abs(t.c - cv.c) <= 1 &&
                                    Math.abs(t.r - cv.r) <= 1 &&
                                    !(t.c === cv.c && t.r === cv.r)
                                ) {
                                    if (t.rv.type === "coin") {
                                        t.rv.value =
                                            Math.round(
                                                t.rv.value * cv.rv.mult * 100,
                                            ) / 100;
                                        paintCell(cellEls[t.c][t.r], t.c, t.r);
                                        const coinEl =
                                            cellEls[t.c][t.r].firstElementChild;
                                        if (coinEl) {
                                            coinEl.classList.add("boost");
                                        }
                                        spawnSparkles(
                                            cellEls[t.c][t.r],
                                            6,
                                            "#7ad03a",
                                        );
                                    } else
                                        t.rv._mult =
                                            (t.rv._mult || 1) * cv.rv.mult;
                                }
                            }
                            await fdelay(clovers.length > 4 ? 180 : 300);
                        }
                    }

                    const coinSum = coins.reduce((a, x) => a + x.rv.value, 0);

                    if (pots.length) {
                        // pots sweep all coins + carried pot value
                        const grab = coinSum + potCarry;
                        potCarry = grab;
                        for (const p of pots) {
                            p.rv.collected =
                                Math.round(grab * (p.rv._mult || 1) * 100) /
                                100;
                            paintCell(cellEls[p.c][p.r], p.c, p.r);
                            const potEl = cellEls[p.c][p.r].firstElementChild;
                            if (potEl) {
                                potEl.classList.remove("collect");
                                void potEl.offsetWidth;
                                potEl.classList.add("collect");
                            }
                        }
                        playSfx("potCollect");
                        await flyToPots(coins, pots);
                        for (const p of pots)
                            spawnSparkles(cellEls[p.c][p.r], 14, "#ffe27a");
                        await fdelay(550);
                        // clear coin reveals (collected), keep golden squares → re-reveal next pass
                        for (const cn of coins) {
                            delete reveal[cn.k];
                        }
                        for (const p of pots) {
                            delete reveal[p.k];
                        } // pots re-roll too
                        collectedTotal = Math.max(collectedTotal, potCarry);
                        // continue loop to re-reveal
                    } else {
                        // no collector: coins simply pay their summed value (+ any banked pot)
                        collectedTotal = coinSum + potCarry;
                        await sumCoinsToWin(coins);
                        break;
                    }
                }
                // clear reveals & (usually) golden squares
                for (const k of Object.keys(reveal)) delete reveal[k];
                if (!keepGoldenAfterActivate) golden.clear();
                repaintAll();
                return Math.round(collectedTotal * 100) / 100;
            }

            /* fly animations */
            function spawnSparkles(cell, n = 8, color) {
                for (let i = 0; i < n; i++) {
                    const s = document.createElement("div");
                    s.className = "spark";
                    const ang = Math.random() * Math.PI * 2,
                        dist = 16 + Math.random() * 24;
                    s.style.left = "50%";
                    s.style.top = "50%";
                    s.style.setProperty(
                        "--dx",
                        (Math.cos(ang) * dist).toFixed(1) + "px",
                    );
                    s.style.setProperty(
                        "--dy",
                        (Math.sin(ang) * dist).toFixed(1) + "px",
                    );
                    if (color)
                        s.style.background = `radial-gradient(circle,#fff,${color} 60%,transparent 70%)`;
                    cell.appendChild(s);
                    setTimeout(() => s.remove(), 660);
                }
            }
            function cellCenter(c, r) {
                const b = cellEls[c][r].getBoundingClientRect();
                return { x: b.left + b.width / 2, y: b.top + b.height / 2 };
            }
            async function flyToPots(coins, pots) {
                if (!pots.length) return;
                const target = cellCenter(pots[0].c, pots[0].r);
                const ps = [];
                for (const cn of coins) {
                    const from = cellCenter(cn.c, cn.r);
                    const f = document.createElement("div");
                    f.className = "fly";
                    f.textContent = "🪙";
                    f.style.fontSize = "22px";
                    f.style.left = from.x + "px";
                    f.style.top = from.y + "px";
                    f.style.transform = "translate(-50%,-50%)";
                    document.body.appendChild(f);
                    f.getBoundingClientRect();
                    f.style.transform = `translate(${target.x - from.x - 0}px,${target.y - from.y}px) translate(-50%,-50%) scale(.4)`;
                    f.style.opacity = "0";
                    ps.push(
                        new Promise((res) =>
                            setTimeout(() => {
                                f.remove();
                                res();
                            }, 560),
                        ),
                    );
                }
                await Promise.all(ps);
            }
            async function sumCoinsToWin(coins) {
                // little fly-to-banner flourish
                for (const cn of coins) {
                    const from = cellCenter(cn.c, cn.r);
                    const f = document.createElement("div");
                    f.className = "fly";
                    f.textContent = "+" + cn.rv.value;
                    f.style.fontSize = "16px";
                    f.style.left = from.x + "px";
                    f.style.top = from.y + "px";
                    f.style.transform = "translate(-50%,-50%)";
                    document.body.appendChild(f);
                    f.getBoundingClientRect();
                    f.style.transform = "translate(-50%,-90px)";
                    f.style.opacity = "0";
                    setTimeout(() => f.remove(), 560);
                }
                await delay(560);
            }
            function flashRainbow() {
                for (const k of golden) {
                    const [c, r] = k.split("-").map(Number);
                    cellEls[c][r].animate(
                        [
                            { filter: "brightness(1)" },
                            { filter: "brightness(2.2)" },
                            { filter: "brightness(1)" },
                        ],
                        { duration: 500 },
                    );
                }
            }

            /* =============================================================
   MAIN SPIN
   ============================================================= */
            async function doSpin(opts = {}) {
                if (spinning) return;
                const cost = bet();
                if (!fsMode && !opts.free) {
                    if (balance < cost) {
                        playSfx("noFunds");
                        flashSpinRed();
                        toast("Not enough balance for this bet.");
                        return;
                    }
                    setBalance(balance - cost);
                }
                spinning = true;
                lockUI(true);
                hideBanner();
                ctTag.classList.remove("show");
                hudWin.textContent = "—";

                // fresh paid spin clears last round's golden squares; free spins keep them
                if (!fsMode && !opts.free) golden.clear();

                // consume bonus-buy "activate" flags
                const spinOpts = {};
                if (pendingFsBoost) {
                    spinOpts.fsBoost = true;
                }
                if (pendingRainbow || guaranteedRainbow) {
                    spinOpts.forceRainbow = true;
                }

                genGrid(spinOpts);
                await animateSpin();
                // ensure final reveal matches state
                repaintAll();
                await delay(120);

                // base-game free-spin trigger
                if (!fsMode && !opts.free) {
                    pendingFsBoost = false;
                    pendingRainbow = false;
                    const fsCount = countSpecial("fs");
                    if (fsCount >= 3) {
                        await startFreeSpins(fsCount);
                        spinning = false;
                        lockUI(false);
                        maybeAuto();
                        return;
                    }
                }

                let win = 0,
                    cascade = 0;
                while (true) {
                    const clusters = findClusters();
                    if (clusters.length === 0) break;
                    cascade++;
                    if (cascade > 1) {
                        ctNum.textContent = cascade;
                        ctTag.classList.add("show");
                    }
                    let stepWin = 0;
                    for (const cl of clusters) stepWin += payCluster(cl);
                    win += stepWin;
                    if (stepWin > 0) {
                        playSfx("win");
                        hudWin.textContent = "+" + win.toFixed(2);
                    }
                    await cascadeStep(clusters);
                    await delay(80);
                }
                ctTag.classList.remove("show");

                // rainbow activation (coin feature)
                if (hasRainbow() && golden.size > 0) {
                    const coinWin = await runCoinFeature();
                    win += coinWin;
                    if (coinWin > 0) hudWin.textContent = "+" + win.toFixed(2);
                } else if (hasRainbow()) {
                    // rainbow but no golden squares — just clear it
                    for (let c = 0; c < COLS; c++)
                        for (let r = 0; r < ROWS; r++)
                            if (grid[c][r] === "rainbow")
                                grid[c][r] = draw(buildPool());
                    repaintAll();
                }

                // settle
                if (win > 0) {
                    setBalance(balance + win);
                    showBanner(win, win >= cost * 20);
                    hudWin.textContent = "+" + win.toFixed(2);
                }
                settle(opts.free || fsMode ? win : win - cost);

                spinning = false;
                lockUI(false);
                return win;
            }

            /* =============================================================
   FREE SPINS
   ============================================================= */
            async function startFreeSpins(fsCount) {
                let type, spins, title, sub;
                if (fsCount >= 5) {
                    type = 3;
                    spins = 12;
                    title = "TREASURE AT THE END OF THE RAINBOW";
                    sub =
                        "12 Free Spins · Rainbow guaranteed every spin · no bronze coins";
                } else if (fsCount >= 4) {
                    type = 2;
                    spins = 12;
                    title = "ALL THAT GLITTERS IS GOLD";
                    sub =
                        "12 Free Spins · Golden Squares stay lit even after they activate";
                } else {
                    type = 1;
                    spins = 8;
                    title = "LUCK OF THE BANDIT";
                    sub = "8 Free Spins · Golden Squares persist between spins";
                }
                await runFreeSpins(type, spins, title, sub);
            }
            async function runFreeSpins(type, spins, title, sub) {
                fsMode = true;
                fsType = type;
                fsSpins = spins;
                guaranteedRainbow = type === 3;
                keepGoldenAfterActivate = type === 2;
                golden.clear();
                for (const k of Object.keys(reveal)) delete reveal[k];

                playSfx("bonusTrigger");
                brTitle.textContent = title;
                brSub.textContent = sub;
                bonusRib.classList.add("show");
                await delay(2600);
                bonusRib.classList.remove("show");

                fsModeEl.textContent = title;
                fsHud.classList.add("show");
                fsLeftEl.textContent = fsSpins;

                let total = 0;
                while (fsSpins > 0) {
                    fsLeftEl.textContent = fsSpins;
                    const w = (await doSpin({ free: true })) || 0;
                    total += w;
                    // retrigger: more FS symbols add spins
                    const extra = countSpecial("fs");
                    if (extra >= 2) {
                        fsSpins += extra >= 3 ? 4 : 2;
                        toast("+" + (extra >= 3 ? 4 : 2) + " free spins!");
                    }
                    fsSpins--;
                    await delay(450);
                }
                // end
                fsMode = false;
                fsType = 0;
                guaranteedRainbow = false;
                keepGoldenAfterActivate = false;
                fsHud.classList.remove("show");
                golden.clear();
                repaintAll();
                if (total > 0) {
                    showBanner(total, true, "Total Feature Win");
                    playSfx("bigWin");
                }
            }

            /* =============================================================
   BONUS BUY
   ============================================================= */
            const BONUS_BUYS = [
                {
                    key: "hunt",
                    title: "BONUSHUNT FEATURESPINS",
                    desc: "Each spin is 5× more likely to trigger a bonus game.",
                    icon: "📷",
                    vol: "High",
                    mult: 3,
                    action: "activate",
                },
                {
                    key: "rain",
                    title: "RAINBOW FEATURESPINS",
                    desc: "Each spin guarantees that a Rainbow symbol lands.",
                    icon: "🌈",
                    vol: "Medium",
                    mult: 50,
                    action: "activate",
                },
                {
                    key: "luck",
                    title: "LUCK OF THE BANDIT",
                    desc: "Bonus with 8 free spins where Golden Squares stay lit until activated.",
                    icon: "📷📷",
                    vol: "Medium",
                    mult: 100,
                    action: "buy",
                },
                {
                    key: "glit",
                    title: "ALL THAT GLITTERS IS GOLD",
                    desc: "Bonus with 12 free spins where Golden Squares stay lit even after activating.",
                    icon: "📷📷📷📷",
                    vol: "Medium",
                    mult: 250,
                    action: "buy",
                },
            ];
            function buildBonusBuy() {
                const g = $("bbGrid");
                g.innerHTML = "";
                for (const b of BONUS_BUYS) {
                    const price = Math.round(b.mult * bet() * 100) / 100;
                    const card = document.createElement("div");
                    card.className = "bb-card";
                    card.innerHTML = `<div class="body">
        <h3>${b.title}</h3><div class="bb-icon">${b.icon}</div>
        <p>${b.desc}</p><div class="bb-vol">Volatility: ${b.vol}</div>
        <div class="bb-price">${price.toFixed(2)} FC</div></div>`;
                    const btn = document.createElement("button");
                    btn.className =
                        "bb-buy " +
                        (b.action === "activate" ? "activate" : "buy");
                    btn.textContent =
                        b.action === "activate" ? "ACTIVATE" : "BUY";
                    btn.disabled = balance < price;
                    btn.onclick = () => purchaseBonus(b, price);
                    card.appendChild(btn);
                    g.appendChild(card);
                }
            }
            async function purchaseBonus(b, price) {
                if (spinning) return;
                if (balance < price) {
                    toast("Not enough balance.");
                    return;
                }
                playSfx("click");
                setBalance(balance - price);
                settle(-price);
                closeBonusBuy();
                if (b.key === "hunt") {
                    pendingFsBoost = true;
                    toast(
                        "BonusHunt active — next spin is 5× more likely to trigger.",
                    );
                } else if (b.key === "rain") {
                    pendingRainbow = true;
                    toast("Rainbow guaranteed on your next spin.");
                } else if (b.key === "luck") {
                    await runFreeSpins(
                        1,
                        8,
                        "LUCK OF THE BANDIT",
                        "8 Free Spins · Golden Squares persist between spins",
                    );
                } else if (b.key === "glit") {
                    await runFreeSpins(
                        2,
                        12,
                        "ALL THAT GLITTERS IS GOLD",
                        "12 Free Spins · Golden Squares stay lit even after activating",
                    );
                }
            }
            function openBonusBuy() {
                if (spinning || fsMode) return;
                buildBonusBuy();
                $("bbOverlay").classList.add("show");
                playSfx("click");
            }
            function closeBonusBuy() {
                $("bbOverlay").classList.remove("show");
            }

            /* =============================================================
   UI BANNERS / LOCKS
   ============================================================= */
            function showBanner(amt, big = false, label = "Win") {
                wbLabel.textContent = label;
                wbAmt.textContent = "+" + amt.toFixed(2);
                wbAmt.classList.toggle("big", big);
                winBanner.classList.add("show");
                if (big) playSfx("bigWin");
                clearTimeout(winBanner._t);
                winBanner._t = setTimeout(
                    () => winBanner.classList.remove("show"),
                    big ? 3200 : 2400,
                );
            }
            function hideBanner() {
                winBanner.classList.remove("show");
            }
            function flashSpinRed() {
                const b = $("spinBtn");
                b.style.background =
                    "conic-gradient(from 0deg,#600,#c22,#f66,#c22,#600)";
                setTimeout(() => (b.style.background = ""), 500);
            }
            function lockUI(on) {
                spinning = on;
                $("spinBtn").disabled = on;
                $("spinBtn").classList.toggle("spinning", on);
                $("betUp").disabled = on || betIdx === BET_STEPS.length - 1;
                $("betDown").disabled = on || betIdx === 0;
                $("buyBonusBtn").disabled = on;
            }
            function maybeAuto() {
                if (autoMode && !fsMode && !spinning)
                    autoTimer = setTimeout(() => doSpin(), 650);
            }

            /* =============================================================
   SERVER HOOKS (no-op friendly for standalone testing)
   ============================================================= */
            async function settle(delta) {
                if (!delta) return;
                try {
                    const r = await fetch("/api/sirbandit/settle", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            won: Math.round(delta * 100) / 100,
                        }),
                    });
                    if (r.ok) {
                        const d = await r.json();
                        if (d && d.newBal != null) setBalance(d.newBal);
                    }
                } catch (_) {
                    /* offline / demo: keep local balance */
                }
            }
            function fetchBalance() {
                fetch("/api/balance")
                    .then((r) => (r.ok ? r.json() : null))
                    .then((d) => {
                        if (d && d.bal != null) setBalance(d.bal);
                    })
                    .catch(() => {});
            }
            window.addEventListener("message", (ev) => {
                if (!ev.data) return;
                if (
                    ev.data.type === "fluxer:init" ||
                    ev.data.type === "fluxer:sync"
                )
                    setBalance(ev.data.balance ?? balance);
            });

            /* =============================================================
   CONTROLS
   ============================================================= */
            $("betDown").onclick = () => {
                if (betIdx > 0) {
                    betIdx--;
                    refreshBet();
                    playSfx("click");
                }
            };
            $("betUp").onclick = () => {
                if (betIdx < BET_STEPS.length - 1) {
                    betIdx++;
                    refreshBet();
                    playSfx("click");
                }
            };
            $("spinBtn").onclick = () => doSpin();
            $("buyBonusBtn").onclick = openBonusBuy;
            $("bbClose").onclick = closeBonusBuy;
            $("bbOverlay").onclick = (e) => {
                if (e.target === $("bbOverlay")) closeBonusBuy();
            };
            document.addEventListener("keydown", (e) => {
                if (
                    e.code === "Space" &&
                    !spinning &&
                    !$("bbOverlay").classList.contains("show")
                ) {
                    e.preventDefault();
                    doSpin();
                }
            });
            $("autoBtn").onclick = () => {
                autoMode = !autoMode;
                $("autoBtn").classList.toggle("on", autoMode);
                if (!autoMode && autoTimer) {
                    clearTimeout(autoTimer);
                    autoTimer = null;
                } else if (autoMode && !spinning) doSpin();
            };

            /* menu popover */
            const menuPop = $("menuPop");
            $("menuBtn").onclick = (e) => {
                e.stopPropagation();
                const open = menuPop.classList.toggle("show");
                $("menuBtn").classList.toggle("on", open);
                playSfx("click");
            };
            document.addEventListener("click", (e) => {
                if (!menuPop.contains(e.target) && e.target !== $("menuBtn")) {
                    menuPop.classList.remove("show");
                    $("menuBtn").classList.remove("on");
                }
            });

            const bgm = $("bgm");
            if (MUSIC_SRC) bgm.src = MUSIC_SRC;
            $("musicRow").onclick = () => {
                if (!MUSIC_SRC) {
                    toast("Add MUSIC_SRC in the script to enable music.");
                    return;
                }
                musicOn = !musicOn;
                $("musicRow").classList.toggle("on", musicOn);
                $("musicState").textContent = musicOn ? "On" : "Off";
                if (musicOn) {
                    bgm.volume = 0.35;
                    bgm.play().catch(() => {});
                } else bgm.pause();
            };
            $("sfxRow").onclick = () => {
                sfxOn = !sfxOn;
                $("sfxRow").classList.toggle("on", sfxOn);
                $("sfxState").textContent = sfxOn ? "On" : "Off";
                if (sfxOn) playSfx("click");
            };
            /* init menu states */
            $("musicRow").classList.toggle("on", musicOn);
            $("musicState").textContent = musicOn ? "On" : "Off";
            $("sfxRow").classList.toggle("on", sfxOn);
            $("sfxState").textContent = sfxOn ? "On" : "Off";

            /* =============================================================
   INIT
   ============================================================= */
            buildBoard();
            refreshBet();
            setBalance(balance);
            fetchBalance();
            try {
                const m = document.cookie.match(/(?:^|;\s*)dtag=([^;]*)/);
                if (m) $("tbTag").textContent = decodeURIComponent(m[1]);
            } catch (_) {}
            setInterval(() => {
                if (!spinning) fetchBalance();
            }, 15000);
        </script>
    </body>
</html>
