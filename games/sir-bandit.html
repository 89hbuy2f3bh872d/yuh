<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Sir Bandit</title>
<style>
/* =============================================================
   SIR BANDIT — 6×5 Cluster Pays · Super Cascades · Golden Squares
   Faithful recreation of Hacksaw Gaming's "Le Bandit" mechanics.
   -------------------------------------------------------------
   ASSET / AUDIO SWAP GUIDE  (search for "SWAP:")
     LOGO      → replace <h1 id="gameTitle"> with <img id="gameTitle" src="...">
     BACKGROUND→ set --bg-url below to url('/assets/sir-bandit/bg.jpg')
     SYMBOLS   → give any SYMBOLS[] entry an `img:'/path.png'` field
     AUDIO     → webm files live in assets/sir-bandit/ (see MUSIC{} / SFX{} maps in the script)
   ============================================================= */

:root{
  --gold:#f2c84b; --gold2:#ffe27a; --gold-dim:#9c821f;
  --bronze:#c8772e; --silver:#b9c6d6;
  --ink:#1c1206; --panel:#241a0c; --panel2:#2e2210;
  --frame:#7a5e1e; --frame2:#3a2c0c;
  --cell:#221908; --cell-bdr:#43340f;
  --cream:#efe3b8; --muted:#a08f5e;
  --green:#7ad03a; --green2:#5aa81f; --green-ink:#214a0a;
  --red:#cc3a26;
  --bg-url:'';            /* SWAP: url('/assets/sir-bandit/bg.jpg') */
  --hud-h:90px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0c0a06;color:var(--cream);
  font-family:'Trebuchet MS','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;user-select:none}
button{cursor:pointer;background:none;border:none;color:inherit;font:inherit}
a{color:inherit;text-decoration:none}

/* ---- Scene ---- */
#scene{position:fixed;inset:0;display:flex;flex-direction:column;
  background:
    radial-gradient(ellipse 120% 90% at 50% 38%, transparent 42%, #00000088 100%),
    linear-gradient(180deg,#6b6147 0%,#534a34 30%,#3a3324 60%,#241f15 100%);
}
/* SWAP background image: uncomment + set --bg-url
#scene{background-image:var(--bg-url);background-size:cover;background-position:center} */
#scene::before{ /* faint brick / alley texture */
  content:'';position:absolute;inset:0;opacity:.10;pointer-events:none;
  background-image:repeating-linear-gradient(90deg,#000 0 2px,transparent 2px 64px),
                   repeating-linear-gradient(0deg,#000 0 2px,transparent 2px 40px);
  mask-image:radial-gradient(ellipse at center,#000 30%,transparent 75%);
}

/* ---- Top bar ---- */
#topBar{position:relative;z-index:50;display:flex;align-items:center;gap:.5rem;
  padding:.35rem .8rem;min-height:42px;
  background:linear-gradient(180deg,#0a0800,#140f04);border-bottom:2px solid var(--frame)}
.tb-back{background:#241a0c;border:1px solid var(--frame);color:var(--muted);
  padding:.28rem .6rem;border-radius:6px;font-size:.7rem;font-weight:700;transition:.15s}
.tb-back:hover{border-color:var(--gold);color:var(--gold)}
#topBar .spacer{flex:1}
.tb-tag{font-size:.68rem;color:#8a774a}
.tb-logout{font-size:.66rem;color:#6a5836}

/* ---- Main ---- */
#main{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;
  padding:.4rem 1rem;position:relative}

/* ---- Title ---- */
#gameTitle{position:relative;transform:rotate(-2deg);margin:0 0 .35rem;
  font-family:'Arial Black','Trebuchet MS',sans-serif;font-weight:900;
  font-size:clamp(1.4rem,4vw,2.7rem);color:var(--green);letter-spacing:.02em;white-space:nowrap;
  text-shadow:0 0 14px #7ad03a55, 3px 3px 0 var(--green-ink), -2px -2px 0 var(--green-ink),
              2px -2px 0 var(--green-ink), -2px 2px 0 var(--green-ink), 4px 6px 8px #000a;
  pointer-events:none;z-index:12;
  /* SWAP: replace whole element with <img id="gameTitle" src="/assets/sir-bandit/logo.png"> */}

/* ---- Cabinet (centered, sized to fit height) ---- */
#cabinet{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
  width:min(96vw, calc((100vh - 250px) * 1.2 + 44px));max-width:900px}

#reelFrame{position:relative;width:100%;border-radius:18px;padding:18px;overflow:hidden;
  background:
    linear-gradient(180deg,#2a1e0c,#160f06);
  border:4px solid var(--frame);
  box-shadow:inset 0 0 40px #000b, 0 0 0 2px #c8a24a55, 0 0 0 6px var(--frame2),
             0 14px 48px #000c, inset 0 2px 0 #ffe9a022;}
#reelFrame::before{ /* gold inner bevel */
  content:'';position:absolute;inset:8px;border-radius:12px;pointer-events:none;z-index:5;
  border:1px solid #d9b35577;box-shadow:inset 0 0 22px #00000088}
/* ornate corners */
.corner{position:absolute;width:26px;height:26px;color:var(--gold);opacity:.8;z-index:6;pointer-events:none;font-size:22px;line-height:1;
  text-shadow:0 0 8px #f2c84b88}
.corner.tl{top:7px;left:11px}.corner.tr{top:7px;right:11px}
.corner.bl{bottom:7px;left:11px}.corner.br{bottom:7px;right:11px}

/* fixed slot layer — tiles + golden markers live here and NEVER move.
   Symbols (the #grid layer) drop on top of these. */
#slots{position:absolute;inset:18px;display:flex;gap:6px;z-index:1;pointer-events:none}
.slot-col{flex:1;min-width:0;display:flex;flex-direction:column}
.slot{aspect-ratio:1/1;margin:2px;border-radius:6px;position:relative;
  background:rgba(28,20,10,.45);border:1px solid #ffffff10;
  transition:background .18s,border-color .18s,box-shadow .18s}
.slot.golden{background:linear-gradient(135deg,#3a2a00,#5a4400);border-color:var(--gold);
  box-shadow:inset 0 0 12px #ffd76655,0 0 16px #ffd76640}
.slot.golden::after{content:'';position:absolute;inset:0;border-radius:6px;pointer-events:none;
  background:repeating-linear-gradient(45deg,#ffe27a22 0 6px,transparent 6px 12px)}
.slot.gold-pop{animation:goldPop .42s cubic-bezier(.22,1.7,.4,1)}
@keyframes goldPop{0%{transform:scale(.55)}55%{transform:scale(1.1)}100%{transform:scale(1)}}

#grid{display:flex;gap:6px;width:100%;aspect-ratio:6/5;position:relative;z-index:2}
.reel{flex:1;min-width:0;overflow:hidden;border-radius:6px;position:relative;background:transparent}
.reel-track{display:flex;flex-direction:column;will-change:transform}
.reel-track.spinning{filter:blur(1.2px)}

.cell{position:relative;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid transparent;border-radius:6px;margin:2px;
  font-size:clamp(1.3rem,3.7vw,2.6rem)}
.cell img{width:82%;height:82%;object-fit:contain;pointer-events:none}
.cell.win-flash{animation:winFlash .45s ease-out;z-index:3}
@keyframes winFlash{0%{transform:scale(1)}40%{transform:scale(1.14);
  filter:drop-shadow(0 0 12px var(--gold2))}100%{transform:scale(1)}}
.cell.vanish{animation:vanish .26s cubic-bezier(.5,0,.7,0) forwards}
@keyframes vanish{60%{opacity:.5}to{transform:scale(.05) rotate(35deg);opacity:0}}
/* real falling drop — distance set per-cell via --fall (in % of cell height).
   Single smooth decelerating motion (no multi-step overshoot = no jitter). */
.cell.falling{animation:dropFall var(--dropdur,.5s) cubic-bezier(.16,.7,.28,1) both;animation-delay:var(--dropdel,0s)}
@keyframes dropFall{
  0%{transform:translateY(var(--fall,-300%));opacity:0}
  18%{opacity:1}
  100%{transform:translateY(0);opacity:1}}
.cell.pop{animation:pop .34s cubic-bezier(.22,1.7,.4,1)}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.12)}100%{transform:scale(1)}}

/* ---- Card royals & symbol glyphs (styled, not just emoji) ---- */
.glyph{font-family:'Arial Black',sans-serif;font-weight:900;line-height:1}
.royal{font-size:1.5em;color:#8c7a52;text-shadow:2px 2px 0 #00000066;
  -webkit-text-stroke:1px #00000044}
.royal.K{color:#8c7a52}.royal.Q{color:#8c7a52}.royal.J{color:#7e8c52}
.royal.A{color:#8c7a52}.royal.T{color:#7e8c52;font-size:1.2em}

/* ---- Coins (revealed in golden squares) ---- */
.coin{width:84%;height:84%;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:'Arial Black',sans-serif;font-weight:900;color:#3a2a00;position:relative;
  box-shadow:inset 0 -4px 8px #0006, inset 0 3px 6px #fff7, 0 2px 6px #0008;
  font-size:.95em}
.coin .v{position:relative;z-index:2;text-shadow:0 1px 0 #fff5}
.coin.bronze{background:radial-gradient(circle at 38% 32%,#f0a85a,#b5651d 70%);color:#4a2a00}
.coin.silver{background:radial-gradient(circle at 38% 32%,#f2f6fb,#9fb1c4 70%);color:#2a3645}
.coin.gold{background:radial-gradient(circle at 38% 32%,#fff0a0,#e0a81e 70%);color:#5a3e00}
.coin.shine{animation:coinShine .5s ease}
@keyframes coinShine{0%{transform:scale(.3) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
.coin::before{content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;
  background:linear-gradient(115deg,transparent 38%,#ffffffaa 48%,transparent 58%);
  background-size:250% 250%;animation:coinGleam 3.2s ease-in-out infinite}
@keyframes coinGleam{0%,70%{background-position:130% 0}85%,100%{background-position:-30% 0}}
.coin.boost{animation:coinBoost .55s cubic-bezier(.3,1.7,.4,1)}
@keyframes coinBoost{0%{transform:scale(1)}45%{transform:scale(1.35);filter:drop-shadow(0 0 10px #7ad03a)}100%{transform:scale(1)}}

/* clover */
.clover{font-size:1.5em;position:relative;filter:drop-shadow(0 2px 3px #0007);
  transform-origin:center;animation:cloverIdle 1.9s ease-in-out infinite}
@keyframes cloverIdle{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.clover.burst{animation:cloverBurst .65s cubic-bezier(.3,1.6,.4,1)}
@keyframes cloverBurst{0%{transform:scale(1) rotate(0);filter:drop-shadow(0 0 0 #7ad03a)}
  45%{transform:scale(1.6) rotate(200deg);filter:drop-shadow(0 0 14px #7ad03a)}
  100%{transform:scale(1) rotate(360deg);filter:drop-shadow(0 2px 3px #0007)}}

/* pot / collector */
.pot{font-size:1.55em;position:relative;filter:drop-shadow(0 2px 4px #0008);
  transform-origin:50% 80%;animation:potIdle 2.1s ease-in-out infinite}
@keyframes potIdle{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-2px) rotate(0)}}
.pot.collect{animation:potCollect .6s ease}
@keyframes potCollect{0%,100%{transform:scale(1) rotate(0)}
  18%{transform:scale(1.22) rotate(-7deg)}38%{transform:scale(1.14) rotate(7deg)}
  58%{transform:scale(1.2) rotate(-5deg)}78%{transform:scale(1.12) rotate(3deg)}}
.pot.collect::after{content:'';position:absolute;inset:-30%;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,#ffe27a88,transparent 65%);animation:potGlow .6s ease}
@keyframes potGlow{0%{opacity:0;transform:scale(.4)}40%{opacity:1}100%{opacity:0;transform:scale(1.3)}}
.pot .ptag{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);
  font-family:'Arial Black';font-size:.42em;color:var(--gold);background:#1c1206cc;
  padding:0 4px;border-radius:5px;white-space:nowrap}

/* sparkle particles */
.spark{position:absolute;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:5;
  background:radial-gradient(circle,#fff,#ffe27a 60%,transparent 70%);
  animation:sparkFly .6s ease-out forwards}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

.fly{position:fixed;z-index:90;font-family:'Arial Black';font-weight:900;color:var(--gold2);
  text-shadow:0 2px 6px #000;pointer-events:none;transition:transform .55s cubic-bezier(.5,0,.4,1),opacity .55s}

/* ---- Win banner ---- */
#winBanner{position:absolute;top:46%;left:50%;z-index:60;opacity:0;
  transform:translate(-50%,-50%) scale(.4);transition:transform .3s cubic-bezier(.22,1.5,.4,1),opacity .3s;
  background:linear-gradient(135deg,#241400,#3a2700);border:2px solid var(--gold);border-radius:16px;
  padding:.7rem 1.8rem;text-align:center;box-shadow:0 0 50px #f2c84b66,0 10px 36px #000b;pointer-events:none}
#winBanner.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.wb-label{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);opacity:.8}
.wb-amt{font-family:'Arial Black';font-size:2.2rem;color:var(--gold);text-shadow:0 0 22px #f2c84b99;line-height:1.05}
.wb-amt.big{color:var(--gold2);animation:bigPulse 1s ease infinite}
@keyframes bigPulse{50%{transform:scale(1.08);text-shadow:0 0 34px #ffe27a}}
.wb-sub{font-size:.62rem;color:#c8a85e}

/* ---- Cascade & rainbow indicators ---- */
#cascadeTag{position:absolute;top:10px;right:12px;z-index:30;opacity:0;transform:scale(.3);
  transition:opacity .25s,transform .35s cubic-bezier(.22,1.7,.4,1);
  background:#1c1206cc;border:1px solid var(--frame);border-radius:9px;padding:.3rem .55rem;text-align:center}
#cascadeTag.show{opacity:1;transform:scale(1)}
.ct-l{font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.ct-n{font-family:'Arial Black';font-size:1.3rem;color:var(--gold);line-height:1}

/* ---- Bonus ribbon ---- */
#bonusRibbon{position:absolute;top:50%;left:50%;z-index:70;opacity:0;
  transform:translate(-50%,-50%) scale(.3);transition:transform .4s cubic-bezier(.22,1.5,.4,1),opacity .35s;
  background:linear-gradient(135deg,#1a0a00,#3a1600);border:3px solid #e8842a;border-radius:18px;
  padding:1rem 2.4rem;text-align:center;box-shadow:0 0 60px #e8842a66;pointer-events:none}
#bonusRibbon.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.br-title{font-family:'Arial Black';font-size:1.3rem;color:#f2a83a;text-shadow:0 0 16px #e8842a;line-height:1.1}
.br-sub{font-size:.74rem;color:#d8a060;margin-top:.3rem}

/* ---- Active feature-spin indicator ---- */
#featChip{position:absolute;top:10px;left:50%;transform:translate(-50%,-14px) scale(.6);z-index:31;
  opacity:0;transition:opacity .3s,transform .4s cubic-bezier(.22,1.8,.4,1);pointer-events:none;
  display:flex;align-items:center;gap:.4rem;white-space:nowrap;
  background:linear-gradient(180deg,#3a2700,#1c1206);border:1.5px solid var(--gold);border-radius:999px;
  padding:.32rem .8rem;font-size:.72rem;font-weight:800;letter-spacing:.04em;color:var(--gold2);
  box-shadow:0 0 18px #f2c84b55,0 4px 14px #000a}
#featChip.show{opacity:1;transform:translate(-50%,0) scale(1)}
#featChip b{color:#fff;font-weight:800}
.fc-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:fcPulse 1s infinite}
@keyframes fcPulse{50%{opacity:.3;transform:scale(.7)}}

/* per-spin cost note under bet */
#betNote{font-size:.56rem;font-weight:700;letter-spacing:.04em;color:var(--gold2);margin-top:1px;display:none}
#betNote.show{display:block}

/* ---- Free-spins HUD chip ---- */
#fsHud{position:absolute;top:10px;left:12px;z-index:30;display:none;
  background:#1c1206e0;border:1px solid #e8842a99;border-radius:9px;padding:.3rem .6rem;
  font-size:.74rem;color:#f2a83a;font-weight:700}
#fsHud.show{display:block}
#fsHud .mode{font-size:.56rem;color:#c8884a;letter-spacing:.1em;text-transform:uppercase;display:block}

@media(max-width:560px){
  #hud{gap:.5rem;padding:0 .6rem}
  .hud-group{min-width:0}
  .hud-value{font-size:.92rem}
  #winGroup{display:none} /* hide live Win; banner still shows it */
  #buyBonusBtn{width:54px;height:54px;font-size:.5rem}
  #spinBtn{width:56px;height:56px;border-width:3px}
  #spinBtn svg{width:26px;height:26px}
  .hud-icon{width:36px;height:36px}.hud-icon svg{width:18px;height:18px}
  #betBox{min-width:80px;height:46px;padding:.2rem .55rem}
  #betDisplay{font-size:1rem}
  .bet-arr{width:26px;height:20px}
  #menuPop{left:62px}
  #infoBadge{display:none}
}

/* ---- HUD (control bar) ---- */
#hud{position:relative;z-index:20;display:flex;align-items:center;gap:1rem;
  height:var(--hud-h);padding:0 1.4rem;
  background:linear-gradient(180deg,rgba(28,20,8,.86),rgba(14,10,4,.96));
  border-top:2px solid var(--frame);box-shadow:0 -6px 24px #0007;backdrop-filter:blur(2px)}

.hud-group{display:flex;flex-direction:column;gap:.12rem;min-width:90px}
.hud-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#9a8657}
.hud-value{font-size:1.15rem;font-weight:700;color:var(--cream);font-variant-numeric:tabular-nums}
.hud-value.accent{color:var(--gold)}
.hud-spacer{flex:1}

/* BUY BONUS coin — overlaps the top edge of the bar */
#buyBonusBtn{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:70px;height:70px;border-radius:50%;flex-shrink:0;transform:translateY(-10px);
  background:radial-gradient(circle at 40% 32%,#fff0a8,#f2c233 55%,#caa017);
  color:#3a2700;font-family:'Arial Black';font-size:.6rem;line-height:1.05;text-align:center;letter-spacing:.02em;
  border:3px solid #fff6;box-shadow:0 4px 14px #f2c84b66,inset 0 2px 0 #fff8,0 0 0 3px #00000022;
  transition:transform .12s}
#buyBonusBtn:hover{transform:translateY(-13px) scale(1.05)}
#buyBonusBtn:active{transform:translateY(-8px) scale(.95)}
#buyBonusBtn:disabled{opacity:.45;cursor:default;transform:translateY(-10px)}

/* icon buttons (menu / autoplay) */
.hud-icon{width:42px;height:42px;border-radius:10px;flex-shrink:0;
  background:#241a0c;border:1px solid var(--frame);color:#bda66e;
  display:flex;align-items:center;justify-content:center;transition:.15s}
.hud-icon:hover{border-color:var(--gold);color:var(--gold)}
.hud-icon.on{border-color:var(--gold);color:var(--gold)}
.hud-icon svg{width:22px;height:22px}

/* BET box */
#betBox{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  min-width:110px;height:54px;padding:.25rem .8rem;border-radius:10px;
  background:#120d05;border:1px solid var(--frame);border-bottom:3px solid var(--gold)}
#betBox .hud-label{margin-bottom:.05rem}
#betDisplay{font-family:'Arial Black';font-size:1.2rem;color:var(--cream);font-variant-numeric:tabular-nums}
.bet-arrows{display:flex;flex-direction:column;gap:3px}
.bet-arr{width:30px;height:24px;background:#241a0c;border:1px solid var(--frame);border-radius:6px;
  font-size:.7rem;display:flex;align-items:center;justify-content:center;color:var(--cream);transition:.12s}
.bet-arr:hover:not(:disabled){border-color:var(--gold);color:var(--gold);background:#33260f}
.bet-arr:disabled{opacity:.3}

/* SPIN — dark disc, light ring, white arrow (reference style) */
#spinBtn{position:relative;width:min(72px,15vw);height:min(72px,15vw);border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 42% 36%,#3a3024,#1a130a 70%);
  border:4px solid #efe3b8;box-shadow:0 4px 18px #000a,inset 0 2px 4px #fff2,0 0 0 2px #00000044;
  color:#efe3b8;display:flex;align-items:center;justify-content:center;transition:transform .1s,box-shadow .15s}
#spinBtn:hover:not(:disabled){transform:scale(1.06);box-shadow:0 4px 22px #f2c84b55,inset 0 2px 4px #fff3,0 0 0 2px #f2c84b66}
#spinBtn:active:not(:disabled){transform:scale(.92)}
#spinBtn:disabled{opacity:.5;cursor:default}
#spinBtn svg{width:32px;height:32px}
#spinBtn.spinning svg{animation:rot .65s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

/* menu popover (music / sfx) */
#menuPop{position:absolute;bottom:calc(var(--hud-h) - 6px);left:84px;z-index:40;display:none;
  flex-direction:column;gap:.1rem;min-width:160px;padding:.4rem;
  background:#1c1408f2;border:1px solid var(--frame);border-radius:10px;box-shadow:0 8px 24px #000a}
#menuPop.show{display:flex}
#menuPop .row{display:flex;align-items:center;justify-content:space-between;gap:.8rem;
  padding:.4rem .55rem;border-radius:7px;font-size:.78rem;color:var(--cream)}
#menuPop .row:hover{background:#2a2010}
#menuPop .row .state{font-size:.7rem;color:var(--muted)}
#menuPop .row.on .state{color:var(--gold)}

/* info strip */
#infoBadge{position:absolute;left:14px;bottom:calc(var(--hud-h) + 8px);z-index:30;display:flex;gap:.9rem;
  background:#1c1206cc;border:1px solid var(--frame2);border-radius:8px;padding:.3rem .6rem;
  font-size:.62rem;color:var(--muted)}
#infoBadge strong{color:var(--gold)}

/* ---- Bonus-buy modal ---- */
#bbOverlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;
  background:#000a;backdrop-filter:blur(3px);padding:1rem;opacity:0;transition:opacity .2s}
#bbOverlay.show{display:flex;opacity:1}
#bbModal{width:min(960px,96vw);max-height:92vh;overflow:auto;background:linear-gradient(180deg,#241a0c,#15100620);
  border:2px solid var(--frame);border-radius:16px;padding:1rem 1.1rem 1.4rem;box-shadow:0 20px 60px #000c;position:relative;
  transform:scale(.7) translateY(30px);opacity:0;transition:transform .42s cubic-bezier(.22,1.6,.4,1),opacity .25s}
#bbOverlay.show #bbModal{transform:scale(1) translateY(0);opacity:1}

<script>
/* =============================================================
   SIR BANDIT — GAME LOGIC
   Mechanics modelled on Hacksaw Gaming "Le Bandit":
   · 6×5 cluster pays (5+ orthogonally-connected matching symbols)
   · Wild substitutes for paytable symbols
   · Super Cascades: winning symbols clear, new ones drop
   · Golden Squares form behind winning positions, persist until a Rainbow lands
   · Rainbow activation reveals Coins (bronze/silver/gold), Four-Leaf Clovers
     (×2–×10 to adjacent coins/pots) and Pots of Gold (collector that sweeps the
     board then re-reveals → chain). Clovers apply first, pots collect after.
   · Free Spins: 3 FS = Luck of the Bandit (8), 4 FS = All That Glitters (12),
     5 FS = Treasure at the End of the Rainbow (12, rainbow guaranteed).
   · Bonus Buy: BonusHunt 3×, Rainbow FeatureSpins 50×, Luck 100×, Glitters 250×.
   ============================================================= */

/* ================= AUDIO (webm assets) =================
   Files live in assets/sir-bandit/. A few names in the brief were
   truncated; reconstructed to their likely real filenames below —
   tweak here if any differ. Missing files just stay silent. */
const SND_DIR = 'assets/sir-bandit/';
const MUSIC = {
  intro:   'music_intro.webm',
  base0:   'music_level_0.webm',   // idle
  base1:   'music_level_1.webm',   // normal spin
  base2:   'music_level_2.webm',   // cascade / win escalation
  bonus0:  'music_bonus_level_0.webm', // bonus trigger
  bonus1:  'music_bonus_level_1.webm', // free spins base
  bonus2:  'music_bonus_level_2.webm', // big win in bonus
  amb:     'city_ambience.webm',
  ambNight:'city_ambience_night.webm',
};
const SFX = {
  click:       'scratch.webm',
  spin:        'camera_drum.webm',
  reelStop:    'happy_2.webm',
  win:         'happy_1.webm',
  cascade:     'coin_swoosh.webm',
  coinReveal:  'coin_swoosh.webm',
  goldenForm:  'clover_multi_3.webm',
  clover:      'clover_activate.webm',
  rainbow:     'rainbow_idle.webm',       // brief: 'ainbow_idle.webm'
  potCollect:  'fuming_3.webm',           // brief: 'uming_3.webm'
  bonusTrigger:'delighted_2.webm',
  bigWin:      'delighted_2.webm',
  noFunds:     ['raccoon_raging_3.webm','infuriated_1.webm'], // brief: 'accoon_..','nfuriated_..'
};
/* ====================================================== */

const COLS=6, ROWS=5;
const HOUSE_EDGE=0.0366;

const BET_STEPS=[0.10,0.20,0.50,1,2,5,10,20,50,100];
let betIdx=4;

/* ---- Symbols ----
   Paytable symbols cluster (5+). To use art: add  img:'/assets/...'  to any entry.
   pay = cluster-size → multiplier-of-bet brackets. */
const SYMBOLS=[
  {id:'reward', emoji:'📷', label:'Camera',   weight:4, pay:{5:3, 8:8,  12:20, 15:50}},   // top pay
  {id:'cheese', emoji:'🧀', label:'Cheese',   weight:5, pay:{5:2, 8:6,  12:15, 15:35}},
  {id:'beer',   emoji:'🍺', label:'Beer',     weight:5, pay:{5:2, 8:5,  12:13, 15:30}},
  {id:'hat',    emoji:'🎩', label:'Top Hat',  weight:5, pay:{5:2, 8:5,  12:12, 15:28}},
  {id:'bread',  emoji:'🥖', label:'Bread',    weight:6, pay:{5:1.5,8:4, 12:10, 15:24}},
  {id:'trap',   emoji:'🪤', label:'Trap',     weight:6, pay:{5:1.5,8:4, 12:10, 15:22}},
  {id:'ace',    glyph:'A', cls:'royal A',     weight:9, pay:{5:0.5,8:1.5,12:3, 15:7}},
  {id:'king',   glyph:'K', cls:'royal K',     weight:9, pay:{5:0.4,8:1.2,12:2.5,15:6}},
  {id:'queen',  glyph:'Q', cls:'royal Q',     weight:9, pay:{5:0.3,8:1,  12:2, 15:5}},
  {id:'jack',   glyph:'J', cls:'royal J',     weight:10,pay:{5:0.25,8:0.8,12:1.6,15:4}},
  {id:'ten',    glyph:'10',cls:'royal T',     weight:11,pay:{5:0.2,8:0.6,12:1.2,15:3}},
  /* specials (no cluster pay) */
  {id:'wild',   emoji:'🦝', label:'Wild',     weight:2, special:'wild'},
  {id:'rainbow',emoji:'🌈', label:'Rainbow',  weight:2, special:'rainbow'},
  {id:'fs',     emoji:'⭐', label:'Bonus',    weight:1, special:'fs'},
];
const SYM=Object.fromEntries(SYMBOLS.map(s=>[s.id,s]));
const PAYTABLE=SYMBOLS.filter(s=>!s.special).map(s=>s.id);

/* weighted draw pool (specials kept rare) */
function buildPool(opts={}){
  const pool=[];
  for(const s of SYMBOLS){
    let w=s.weight;
    if(s.special==='fs') w=opts.fsBoost? s.weight*5 : s.weight;     // BonusHunt boost
    if(s.special==='rainbow') w=opts.noRainbow?0:s.weight;
    if(!s.special) w=s.weight*9;
    for(let i=0;i<w;i++) pool.push(s.id);
  }
  return pool;
}
function draw(pool){return pool[Math.floor(Math.random()*pool.length)];}

/* ---- Coin / clover / pot reveal pools (golden square activation) ---- */
const COIN_TIERS={
  bronze:[0.2,0.5,1,2,3,4],
  silver:[5,10,15,20],
  gold:[25,50,100,250,500],
};
const CLOVER_MULTS=[2,3,4,5,10];
function revealSymbol(opts={}){
  const r=Math.random();
  // probabilities; Treasure mode forbids bronze
  if(!opts.noBronze && r<0.50) return coinReveal('bronze');
  if(r<0.78) return coinReveal('silver');
  if(r<0.90) return coinReveal('gold');
  if(r<0.965) return {type:'clover',mult:CLOVER_MULTS[Math.floor(Math.random()*CLOVER_MULTS.length)]};
  return {type:'pot'};            // ~3.5% collector
}
function coinReveal(tier){
  const arr=COIN_TIERS[tier];
  return {type:'coin',tier,base:arr[Math.floor(Math.random()*arr.length)]};
}

/* =============================================================
   STATE
   ============================================================= */
let balance=1000;            // demo default; overwritten by /api/balance if available
let spinning=false, autoMode=false, autoTimer=null;
let musicOn=true, sfxOn=true;
let fsMode=false, fsSpins=0, fsType=0; // 1 Luck, 2 Glitters, 3 Treasure
let guaranteedRainbow=false, keepGoldenAfterActivate=false;
let featureMode=null;                 // null | 'hunt' (1.5× bet) | 'rain' (2× bet)
const FEATURE_COST={hunt:1.5, rain:2};

const grid=[];               // grid[c][r] = symbol id
const golden=new Set();      // fixed positions 'c-r' that are golden
const reveal={};             // 'c-r' -> reveal object (during coin feature)
for(let c=0;c<COLS;c++){grid[c]=[]; for(let r=0;r<ROWS;r++) grid[c][r]=draw(buildPool());}

/* =============================================================
   DOM
   ============================================================= */
const $=id=>document.getElementById(id);
const gridEl=$('grid'), hudBal=$('hudBal'), hudWin=$('hudWin'), betDisp=$('betDisplay');
const winBanner=$('winBanner'), wbAmt=$('wbAmt'), wbLabel=$('wbLabel');
const ctTag=$('cascadeTag'), ctNum=$('ctNum'), fsHud=$('fsHud'), fsLeftEl=$('fsLeft'), fsModeEl=$('fsMode');
const bonusRib=$('bonusRibbon'), brTitle=$('brTitle'), brSub=$('brSub');

const reels=[];      // reels[c] = {el, track}
const cellEls=[];    // cellEls[c][r]  (moving symbols)
const slotEls=[];    // slotEls[c][r]  (fixed golden-square markers)

function buildBoard(){
  // fixed slot layer (golden markers + tiles — never move)
  const slotsEl=$('slots'); slotsEl.innerHTML=''; slotEls.length=0;
  for(let c=0;c<COLS;c++){
    const col=document.createElement('div'); col.className='slot-col';
    slotsEl.appendChild(col); slotEls[c]=[];
    for(let r=0;r<ROWS;r++){const s=document.createElement('div');s.className='slot';col.appendChild(s);slotEls[c][r]=s;}
  }
  // moving symbol layer
  gridEl.innerHTML=''; reels.length=0; cellEls.length=0;
  for(let c=0;c<COLS;c++){
    const reel=document.createElement('div'); reel.className='reel';
    const track=document.createElement('div'); track.className='reel-track';
    reel.appendChild(track); gridEl.appendChild(reel);
    reels[c]={el:reel,track};
    cellEls[c]=[];
    for(let r=0;r<ROWS;r++){
      const cell=makeCell(c,r);
      track.appendChild(cell); cellEls[c][r]=cell;
    }
  }
  paintGolden();
}
/* sync the fixed golden markers to the golden Set (pop newly-lit ones) */
function paintGolden(){
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    const s=slotEls[c]&&slotEls[c][r]; if(!s) continue;
    const on=golden.has(`${c}-${r}`);
    if(on && !s.classList.contains('golden')){
      s.classList.add('golden','gold-pop');
      setTimeout(()=>s.classList.remove('gold-pop'),440);
    } else if(!on){
      s.classList.remove('golden','gold-pop');
    }
  }
}
function makeCell(c,r){
  const d=document.createElement('div'); d.className='cell'; d.dataset.c=c; d.dataset.r=r;
  paintCell(d,c,r); return d;
}
function paintCell(d,c,r){
  const key=`${c}-${r}`;
  // reveal state (coin feature) takes precedence
  if(reveal[key]){ d.innerHTML=''; d.appendChild(renderReveal(reveal[key])); return; }
  const s=SYM[grid[c][r]];
  d.innerHTML='';
  if(s.img){const img=new Image();img.src=s.img;img.alt=s.label||s.id;d.appendChild(img);}
  else if(s.glyph){const g=document.createElement('span');g.className='glyph '+(s.cls||'');g.textContent=s.glyph;d.appendChild(g);}
  else d.textContent=s.emoji;
}
function renderReveal(rv){
  if(rv.type==='coin'){
    const c=document.createElement('div'); c.className=`coin ${rv.tier} shine`;
    const v=document.createElement('span'); v.className='v';
    v.textContent=(rv.value??rv.base); c.appendChild(v); return c;
  }
  if(rv.type==='clover'){const e=document.createElement('div');e.className='clover pop';e.textContent='🍀';
    const t=document.createElement('span');t.style.cssText='position:absolute;bottom:2px;right:4px;font-family:Arial Black;font-size:.5em;color:#7ad03a';
    t.textContent='×'+rv.mult;e.appendChild(t);return e;}
  // pot
  const e=document.createElement('div');e.className='pot pop';e.textContent='💰';
  const t=document.createElement('span');t.className='ptag';t.textContent=(rv.collected!=null?rv.collected.toFixed(0)+'×':'COLLECT');
  e.appendChild(t);return e;
}
function repaintAll(){for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)paintCell(cellEls[c][r],c,r);}

/* =============================================================
   HELPERS
   ============================================================= */
const delay=ms=>new Promise(r=>setTimeout(r,ms));
const bet=()=>BET_STEPS[betIdx];
function setBalance(n){balance=Math.max(0,Math.round((+n||0)*100)/100);hudBal.textContent=balance.toFixed(2);}
function refreshBet(){
  betDisp.textContent=bet().toFixed(2);$('bbBet').textContent=bet().toFixed(2);
  const note=$('betNote');
  if(featureMode){const cost=(bet()*FEATURE_COST[featureMode]).toFixed(2);note.textContent=cost+' / spin';note.classList.add('show');}
  else note.classList.remove('show');
  $('betDown').disabled=betIdx===0;$('betUp').disabled=betIdx===BET_STEPS.length-1;}
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

/* ---- SFX: short one-shots, cloned so they can overlap ---- */
function playSfx(key){
  if(!sfxOn) return;
  let file=SFX[key]; if(!file) return;
  if(Array.isArray(file)) file=file[Math.floor(Math.random()*file.length)];
  try{
    const a=new Audio(SND_DIR+file);
    a.volume=(key==='coinReveal'||key==='clover')?0.5:0.7;
    a.play().catch(()=>{});
  }catch(_){}
}

/* ---- Layered music manager (intro → base/bonus levels + ambience) ---- */
const Music = (()=>{
  let started=false, curBgmKey=null, curAmbKey=null;
  let bgmEl=null, ambEl=null, introEl=null;
  const TARGET_BGM=0.4, TARGET_AMB=0.18;
  function mk(file,loop,vol){const a=new Audio(SND_DIR+file);a.loop=loop;a.volume=vol;return a;}
  function fade(el,to,ms=600){
    if(!el) return; const from=el.volume, t0=performance.now();
    clearInterval(el._fi);
    el._fi=setInterval(()=>{
      const k=Math.min(1,(performance.now()-t0)/ms);
      el.volume=Math.max(0,Math.min(1,from+(to-from)*k));
      if(k>=1){clearInterval(el._fi); if(to===0){el.pause();}}
    },30);
  }
  function swapBgm(key){
    if(!musicOn||curBgmKey===key) return; curBgmKey=key;
    const next=mk(MUSIC[key],true,0); next.play().catch(()=>{});
    const old=bgmEl; bgmEl=next; fade(next,TARGET_BGM,700); if(old) fade(old,0,700);
  }
  function swapAmb(key){
    if(!musicOn||curAmbKey===key) return; curAmbKey=key;
    const next=mk(MUSIC[key],true,0); next.play().catch(()=>{});
    const old=ambEl; ambEl=next; fade(next,TARGET_AMB,900); if(old) fade(old,0,900);
  }
  return {
    start(){                              // first user interaction
      if(started||!musicOn) return; started=true;
      introEl=mk(MUSIC.intro,false,TARGET_BGM); curBgmKey='intro';
      introEl.play().catch(()=>{ this.base(0); });
      introEl.addEventListener('ended',()=>{ curBgmKey=null; this.base(fsMode?1:1); });
      swapAmb('amb');
    },
    base(level){ if(!started){return;} swapBgm(['base0','base1','base2'][level]||'base1'); swapAmb('amb'); },
    bonus(level){ if(!started){return;} swapBgm(['bonus0','bonus1','bonus2'][level]||'bonus1'); swapAmb('ambNight'); },
    setEnabled(on){
      if(on){ if(!started) this.start(); else { fade(bgmEl,TARGET_BGM); fade(ambEl,TARGET_AMB); } }
      else { fade(bgmEl,0); fade(ambEl,0); fade(introEl,0); }
    }
  };
})();

/* =============================================================
   CLUSTER DETECTION (flood fill, wild substitutes)
   ============================================================= */
function findClusters(){
  const seen=Array.from({length:COLS},()=>Array(ROWS).fill(false));
  const clusters=[];
  const matches=(c,r,id)=>grid[c][r]===id||grid[c][r]==='wild';
  function flood(c,r,id,group){
    if(c<0||c>=COLS||r<0||r>=ROWS||seen[c][r]||!matches(c,r,id)) return;
    seen[c][r]=true; group.push([c,r]);
    flood(c+1,r,id,group);flood(c-1,r,id,group);flood(c,r+1,id,group);flood(c,r-1,id,group);
  }
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    if(seen[c][r]) continue;
    const id=grid[c][r];
    if(SYM[id].special) continue;        // seeds only from paytable symbols
    const group=[]; flood(c,r,id,group);
    if(group.length>=5) clusters.push({id,cells:group});
    else group.forEach(([gc,gr])=>seen[gc][gr]=false); // release wilds for other seeds
  }
  return clusters;
}
function payCluster(cl){
  const s=SYM[cl.id], n=cl.cells.length;
  const brk=Object.keys(s.pay).map(Number).sort((a,b)=>b-a);
  let mult=0; for(const t of brk){ if(n>=t){mult=s.pay[t];break;} }
  if(Math.random()<HOUSE_EDGE*0.5) mult*=0.7;   // RTP shave
  return Math.round(mult*bet()*100)/100;
}
const countSpecial=type=>{let n=0;for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++)if(SYM[grid[c][r]].special===type)n++;return n;};
const hasRainbow=()=>countSpecial('rainbow')>0;

/* =============================================================
   SPIN ANIMATION — real scrolling reels, staggered stop
   ============================================================= */
function genGrid(opts){
  const pool=buildPool(opts);
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++) grid[c][r]=draw(pool);
  if(opts.forceRainbow && !hasRainbow()){
    grid[Math.floor(Math.random()*COLS)][Math.floor(Math.random()*ROWS)]='rainbow';
  }
}
/* drop a single freshly-created cell in from above; fallPct in % of its own height (one row = 100%).
   No forced reflow — cells are brand new each render, so adding the class starts the animation
   from keyframe 0% on the next paint (one layout for the whole board → smooth). */
function dropCell(cell, fallPct, delayMs=0, durMs=500){
  cell.style.setProperty('--fall', (-Math.abs(fallPct))+'%');
  cell.style.setProperty('--dropdel', delayMs+'ms');
  cell.style.setProperty('--dropdur', durMs+'ms');
  cell.classList.add('falling');
}

async function animateSpin(){
  playSfx('spin');
  // re-render the whole board
  for(let c=0;c<COLS;c++){
    const track=reels[c].track; track.innerHTML=''; cellEls[c]=[];
    for(let r=0;r<ROWS;r++){const cell=makeCell(c,r);track.appendChild(cell);cellEls[c][r]=cell;}
    // start the whole column above the reel (clipped by overflow:hidden)
    track.style.transition='none';
    track.style.transform='translateY(-112%)';
  }
  gridEl.getBoundingClientRect();          // single reflow for the whole board
  // slide each column down smoothly, staggered left→right
  let maxEnd=0;
  for(let c=0;c<COLS;c++){
    const del=c*75, dur=480;
    const track=reels[c].track;
    track.style.transition=`transform ${dur}ms cubic-bezier(.16,.72,.26,1) ${del}ms`;
    track.style.transform='translateY(0)';
    maxEnd=Math.max(maxEnd, del+dur);
  }
  await delay(Math.round(maxEnd*0.55));
  playSfx('reelStop');
  await delay(Math.round(maxEnd*0.45)+60);
}

/* =============================================================
   CASCADE STEP — clear winners → golden squares → gravity drop
   (per-column arrays = no index corruption / infinite vanish)
   ============================================================= */
async function cascadeStep(clusters, fast=false){
  const removed=new Set();
  for(const cl of clusters)for(const [c,r] of cl.cells) removed.add(`${c}-${r}`);

  // golden squares form behind winning positions (persist)
  let formed=false;
  for(const key of removed){ if(!golden.has(key)){golden.add(key);formed=true;} }
  if(formed && !fast) playSfx('goldenForm');

  // flash + vanish
  for(const key of removed){const [c,r]=key.split('-').map(Number);cellEls[c][r].classList.add('win-flash');}
  await delay(fast?60:360);
  if(!fast){
    for(const key of removed){const [c,r]=key.split('-').map(Number);
      const el=cellEls[c][r];el.classList.remove('win-flash');el.classList.add('vanish');}
    await delay(270);   // vanish animation length (no animationend dependency → never stalls)
  } else {
    for(const key of removed){const [c,r]=key.split('-').map(Number);cellEls[c][r].classList.remove('win-flash');}
  }
  paintGolden();   // gold markers light up at the cleared positions (fixed; symbols drop onto them)

  // gravity per column (clean rebuild) — track how far each cell falls
  const pool=buildPool();
  const dist=[];                       // dist[c][r] = rows fallen (0 = didn't move)
  for(let c=0;c<COLS;c++){
    const survivors=[];                // {sym, oldR}
    for(let r=0;r<ROWS;r++) if(!removed.has(`${c}-${r}`)) survivors.push({sym:grid[c][r],oldR:r});
    const newCount=ROWS-survivors.length;
    const fresh=[]; for(let i=0;i<newCount;i++) fresh.push(draw(pool));
    grid[c]=fresh.concat(survivors.map(s=>s.sym));
    dist[c]=[];
    for(let r=0;r<newCount;r++) dist[c][r]=newCount-r+0.5;          // new symbols fall in from above the board
    for(let j=0;j<survivors.length;j++){const nr=newCount+j; dist[c][nr]=nr-survivors[j].oldR;} // survivors sink
  }
  // re-render columns (clear any leftover column-strip transform from the spin)
  for(let c=0;c<COLS;c++){
    const track=reels[c].track; track.style.transition='none'; track.style.transform='none';
    track.innerHTML=''; cellEls[c]=[];
    for(let r=0;r<ROWS;r++){const cell=makeCell(c,r);track.appendChild(cell);cellEls[c][r]=cell;}
  }
  if(fast){ await delay(40); return; }
  // animate the real fall (bouncy landing); static survivors stay put
  let maxEnd=0;
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
    const d=dist[c][r]||0; if(d<=0) continue;
    const fall=d*100+50;
    const del=c*22;
    const dur=300+Math.min(d,5)*55;
    dropCell(cellEls[c][r], fall, del, dur);
    maxEnd=Math.max(maxEnd, del+dur);
  }
  playSfx('cascade');
  await delay(Math.max(260, maxEnd+30));
}

/* =============================================================
   COIN FEATURE — rainbow activates golden squares
   reveal → clovers multiply → pots collect → re-reveal chain
   ============================================================= */
async function runCoinFeature(){
  playSfx('rainbow');
  Music[fsMode?'bonus':'base'](2);
  flashRainbow();
  await delay(450);
  let collectedTotal=0;        // value banked by pots
  let potCarry=0;
  const noBronze=(fsType===3);
  const tStart=performance.now();
  const fdelay=ms=>delay(performance.now()-tStart>9000?0:ms); // cap total feature length

  for(let pass=0; pass<8; pass++){
    // reveal every golden square that isn't already revealed
    const keys=[...golden].filter(k=>!reveal[k]);
    if(keys.length===0 && pass>0) break;
    for(const k of keys){
      reveal[k]=revealSymbol({noBronze});
      const [c,r]=k.split('-').map(Number);
      paintCell(cellEls[c][r],c,r);
      playSfx(reveal[k].type==='coin'?'coinReveal':reveal[k].type==='clover'?'clover':'potCollect');
      await fdelay(keys.length>14?40:65);
    }
    await fdelay(180);

    // clovers multiply adjacent coins & pots (8-neighbour)
    const coins=[], pots=[], clovers=[];
    for(const k of golden){const rv=reveal[k];if(!rv)continue;
      const [c,r]=k.split('-').map(Number);
      if(rv.type==='coin'){rv.value=rv.base; coins.push({k,c,r,rv});}
      else if(rv.type==='pot') pots.push({k,c,r,rv});
      else if(rv.type==='clover') clovers.push({k,c,r,rv});}
    if(clovers.length){
      for(const cv of clovers){
        const cvEl=cellEls[cv.c][cv.r].firstElementChild;
        if(cvEl){cvEl.classList.remove('burst');void cvEl.offsetWidth;cvEl.classList.add('burst');}
        spawnSparkles(cellEls[cv.c][cv.r],10,'#7ad03a');
        playSfx('clover');
        await fdelay(120);
        for(const t of [...coins,...pots]){
          if(Math.abs(t.c-cv.c)<=1 && Math.abs(t.r-cv.r)<=1 && !(t.c===cv.c&&t.r===cv.r)){
            if(t.rv.type==='coin'){
              t.rv.value=Math.round(t.rv.value*cv.rv.mult*100)/100;
              paintCell(cellEls[t.c][t.r],t.c,t.r);
              const coinEl=cellEls[t.c][t.r].firstElementChild;
              if(coinEl){coinEl.classList.add('boost');}
              spawnSparkles(cellEls[t.c][t.r],6,'#7ad03a');
            } else t.rv._mult=(t.rv._mult||1)*cv.rv.mult;
          }
        }
        await fdelay(clovers.length>4?180:300);
      }
    }

    const coinSum=coins.reduce((a,x)=>a+x.rv.value,0);

    if(pots.length){
      // pots sweep all coins + carried pot value
      const grab=coinSum+potCarry;
      potCarry=grab;
      for(const p of pots){p.rv.collected=Math.round(grab*(p.rv._mult||1)*100)/100;
        paintCell(cellEls[p.c][p.r],p.c,p.r);
        const potEl=cellEls[p.c][p.r].firstElementChild;
        if(potEl){potEl.classList.remove('collect');void potEl.offsetWidth;potEl.classList.add('collect');}
      }
      playSfx('potCollect');
      await flyToPots(coins,pots);
      for(const p of pots) spawnSparkles(cellEls[p.c][p.r],14,'#ffe27a');
      await fdelay(550);
      // clear coin reveals (collected), keep golden squares → re-reveal next pass
      for(const cn of coins){delete reveal[cn.k];}
      for(const p of pots){delete reveal[p.k];}   // pots re-roll too
      collectedTotal=Math.max(collectedTotal,potCarry);
      // continue loop to re-reveal
    } else {
      // no collector: coins simply pay their summed value (+ any banked pot)
      collectedTotal=coinSum+potCarry;
      await sumCoinsToWin(coins);
      break;
    }
  }
  // clear reveals & (usually) golden squares
  for(const k of Object.keys(reveal)) delete reveal[k];
  if(!keepGoldenAfterActivate) golden.clear();
  repaintAll(); paintGolden();
  return Math.round(collectedTotal*100)/100;
}

/* fly animations */
function spawnSparkles(cell,n=8,color){
  for(let i=0;i<n;i++){
    const s=document.createElement('div');s.className='spark';
    const ang=Math.random()*Math.PI*2, dist=16+Math.random()*24;
    s.style.left='50%';s.style.top='50%';
    s.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(1)+'px');
    s.style.setProperty('--dy',(Math.sin(ang)*dist).toFixed(1)+'px');
    if(color)s.style.background=`radial-gradient(circle,#fff,${color} 60%,transparent 70%)`;
    cell.appendChild(s);
    setTimeout(()=>s.remove(),660);
  }
}
function cellCenter(c,r){const b=cellEls[c][r].getBoundingClientRect();return {x:b.left+b.width/2,y:b.top+b.height/2};}
async function flyToPots(coins,pots){
  if(!pots.length) return;
  if(coins.length) playSfx('coinReveal');     // swoosh as coins launch
  const targets=pots.map(p=>({p,pt:cellCenter(p.c,p.r)}));
  const ps=[]; let i=0;
  for(const cn of coins){
    const from=cellCenter(cn.c,cn.r);
    // nearest collector
    let best=targets[0],bd=Infinity;
    for(const t of targets){const d=(t.pt.x-from.x)**2+(t.pt.y-from.y)**2; if(d<bd){bd=d;best=t;}}
    const target=best.pt;
    const f=document.createElement('div');f.className='fly';f.textContent='🪙';
    f.style.fontSize='26px';f.style.left=from.x+'px';f.style.top=from.y+'px';
    document.body.appendChild(f);
    const midX=(from.x+target.x)/2, midY=Math.min(from.y,target.y)-70-Math.random()*30;
    const del=i*45; i++;
    const anim=f.animate([
      {transform:'translate(-50%,-50%) translate(0,0) scale(.6) rotate(0deg)',opacity:0,offset:0},
      {transform:'translate(-50%,-50%) translate(0,0) scale(1.1) rotate(40deg)',opacity:1,offset:.12},
      {transform:`translate(-50%,-50%) translate(${midX-from.x}px,${midY-from.y}px) scale(1.15) rotate(220deg)`,opacity:1,offset:.55},
      {transform:`translate(-50%,-50%) translate(${target.x-from.x}px,${target.y-from.y}px) scale(.28) rotate(420deg)`,opacity:.25,offset:1}
    ],{duration:560,delay:del,easing:'cubic-bezier(.45,.05,.4,1)',fill:'forwards'});
    ps.push(new Promise(res=>{anim.onfinish=()=>{
      const cell=cellEls[best.p.c][best.p.r];
      if(cell){spawnSparkles(cell,5,'#ffe27a');
        const pe=cell.firstElementChild; if(pe){pe.classList.remove('collect');void pe.offsetWidth;pe.classList.add('collect');}}
      f.remove();res();
    };}));
  }
  await Promise.all(ps);
}
async function sumCoinsToWin(coins){
  // little fly-to-banner flourish
  for(const cn of coins){const from=cellCenter(cn.c,cn.r);
    const f=document.createElement('div');f.className='fly';f.textContent='+'+cn.rv.value;f.style.fontSize='16px';
    f.style.left=from.x+'px';f.style.top=from.y+'px';f.style.transform='translate(-50%,-50%)';
    document.body.appendChild(f);f.getBoundingClientRect();
    f.style.transform='translate(-50%,-90px)';f.style.opacity='0';
    setTimeout(()=>f.remove(),560);}
  await delay(560);
}
function flashRainbow(){
  for(const k of golden){const [c,r]=k.split('-').map(Number);
    slotEls[c][r].animate([{filter:'brightness(1)'},{filter:'brightness(2.4)'},{filter:'brightness(1)'}],{duration:500});}
}

/* =============================================================
   MAIN SPIN
   ============================================================= */
async function doSpin(opts={}){
  if(spinning) return;
  const costMult = (!fsMode && featureMode) ? FEATURE_COST[featureMode] : 1;
  const cost=Math.round(bet()*costMult*100)/100;
  if(!fsMode && !opts.free){
    if(balance<cost){playSfx('noFunds');flashSpinRed();toast('Not enough balance for this spin.');return;}
    setBalance(balance-cost);
  }
  spinning=true; lockUI(true);
  hideBanner(); ctTag.classList.remove('show'); hudWin.textContent='—';
  if(!fsMode && !opts.free) Music.base(1);

  // fresh paid spin clears last round's golden squares; free spins keep them
  if(!fsMode && !opts.free){ golden.clear(); paintGolden(); }

  // apply active feature-spin mode (persists each spin until toggled off)
  const spinOpts={};
  if(!fsMode && !opts.free && featureMode==='hunt') spinOpts.fsBoost=true;
  if((!fsMode && !opts.free && featureMode==='rain') || guaranteedRainbow) spinOpts.forceRainbow=true;

  genGrid(spinOpts);
  await animateSpin();
  // ensure final reveal matches state
  repaintAll();
  await delay(120);

  // base-game free-spin trigger
  if(!fsMode && !opts.free){
    const fsCount=countSpecial('fs');
    if(fsCount>=3){ await startFreeSpins(fsCount); spinning=false; lockUI(false); maybeAuto(); return; }
  }

  let win=0, cascade=0;
  const tCasc=performance.now();
  while(cascade<40){
    const clusters=findClusters();
    if(clusters.length===0) break;
    cascade++;
    const fast = performance.now()-tCasc > 4500;   // long chains resolve quickly
    if(cascade>1 && !fast){ctNum.textContent=cascade;ctTag.classList.add('show');}
    let stepWin=0; for(const cl of clusters) stepWin+=payCluster(cl);
    win+=stepWin;
    if(stepWin>0){if(!fast)playSfx('win');hudWin.textContent='+'+win.toFixed(2);Music[fsMode?'bonus':'base'](2);}
    await cascadeStep(clusters, fast);
    if(!fast) await delay(40);
  }
  ctTag.classList.remove('show');

  // rainbow activation (coin feature)
  if(hasRainbow() && golden.size>0){
    const coinWin=await runCoinFeature();
    win+=coinWin;
    if(coinWin>0) hudWin.textContent='+'+win.toFixed(2);
  } else if(hasRainbow()){
    // rainbow but no golden squares — just clear it
    for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++) if(grid[c][r]==='rainbow') grid[c][r]=draw(buildPool());
    repaintAll();
  }

  // settle
  if(win>0){
    setBalance(balance+win);
    showBanner(win, win>=cost*20);
    hudWin.textContent='+'+win.toFixed(2);
  }
  settle(opts.free||fsMode ? win : win-cost);

  if(!fsMode && !opts.free) Music.base(0);
  spinning=false; lockUI(false);
  return win;
}

/* =============================================================
   FREE SPINS
   ============================================================= */
async function startFreeSpins(fsCount){
  let type,spins,title,sub;
  if(fsCount>=5){type=3;spins=12;title='TREASURE AT THE END OF THE RAINBOW';sub='12 Free Spins · Rainbow guaranteed every spin · no bronze coins';}
  else if(fsCount>=4){type=2;spins=12;title='ALL THAT GLITTERS IS GOLD';sub='12 Free Spins · Golden Squares stay lit even after they activate';}
  else{type=1;spins=8;title='LUCK OF THE BANDIT';sub='8 Free Spins · Golden Squares persist between spins';}
  await runFreeSpins(type,spins,title,sub);
}
async function runFreeSpins(type,spins,title,sub){
  fsMode=true; fsType=type; fsSpins=spins;
  guaranteedRainbow=(type===3);
  keepGoldenAfterActivate=(type===2);
  golden.clear(); for(const k of Object.keys(reveal)) delete reveal[k]; paintGolden();

  playSfx('bonusTrigger');
  Music.bonus(0);
  brTitle.textContent=title; brSub.textContent=sub;
  bonusRib.classList.add('show');
  await delay(2600); bonusRib.classList.remove('show');

  fsModeEl.textContent=title;
  fsHud.classList.add('show'); fsLeftEl.textContent=fsSpins;
  Music.bonus(1);

  let total=0;
  while(fsSpins>0){
    fsLeftEl.textContent=fsSpins;
    const w=await doSpin({free:true})||0;
    total+=w;
    if(w>=bet()*20) Music.bonus(2);
    // retrigger: more FS symbols add spins
    const extra=countSpecial('fs');
    if(extra>=2){fsSpins+=(extra>=3?4:2);toast('+'+(extra>=3?4:2)+' free spins!');}
    fsSpins--;
    await delay(450);
  }
  // end
  fsMode=false; fsType=0; guaranteedRainbow=false; keepGoldenAfterActivate=false;
  fsHud.classList.remove('show');
  golden.clear(); repaintAll(); paintGolden();
  Music.base(0);
  if(total>0){showBanner(total,true,'Total Feature Win');playSfx('bigWin');}
}

   BONUS BUY
   ============================================================= */
const BONUS_BUYS=[
  {key:'hunt', title:'BONUSHUNT FEATURESPINS', desc:'Every spin is 5× more likely to trigger the bonus. Stays on until you turn it off.', icon:'📷', vol:'High',   kind:'toggle'},
  {key:'rain', title:'RAINBOW FEATURESPINS',   desc:'Every spin guarantees a Rainbow lands to activate Golden Squares. Stays on until you turn it off.', icon:'🌈', vol:'Medium', kind:'toggle'},
  {key:'luck', title:'LUCK OF THE BANDIT',      desc:'Buy 8 free spins where Golden Squares persist between spins.', icon:'🎩', vol:'Medium', mult:100, kind:'buy'},
  {key:'glit', title:'ALL THAT GLITTERS IS GOLD',desc:'Buy 12 free spins where Golden Squares stay lit even after activating.', icon:'🧀', vol:'Medium', mult:250, kind:'buy'},
];
function buildBonusBuy(){
  const g=$('bbGrid'); g.innerHTML='';
  BONUS_BUYS.forEach((b,i)=>{
    const card=document.createElement('div'); card.className='bb-card';
    card.style.animationDelay=(i*70)+'ms';
    let priceHtml, btn=document.createElement('button');
    if(b.kind==='toggle'){
      const perSpin=Math.round(bet()*FEATURE_COST[b.key]*100)/100;
      const on=featureMode===b.key;
      priceHtml=`<div class="bb-price">${FEATURE_COST[b.key]}× bet · ${perSpin.toFixed(2)} FC / spin</div>`;
      card.classList.toggle('active',on);
      btn.className='bb-buy '+(on?'enabled':'activate');
      btn.textContent=on?'ENABLED ✓ — TURN OFF':'ENABLE';
      btn.onclick=()=>{toggleFeature(b.key); buildBonusBuy();};
    }else{
      const price=Math.round(b.mult*bet()*100)/100;
      priceHtml=`<div class="bb-price">${price.toFixed(2)} FC</div>`;
      btn.className='bb-buy buy';
      btn.textContent='BUY';
      btn.disabled=balance<price;
      btn.onclick=()=>purchaseBonus(b,price);
    }
    card.innerHTML=`<div class="body">
        <h3>${b.title}</h3><div class="bb-icon">${b.icon}</div>
        <p>${b.desc}</p><div class="bb-vol">Volatility: ${b.vol}</div>
        ${priceHtml}</div>`;
    card.appendChild(btn); g.appendChild(card);
  });
}
function toggleFeature(key){
  playSfx('click');
  featureMode = (featureMode===key) ? null : key;   // one at a time
  updateFeatureUI();
}
function updateFeatureUI(){
  const chip=$('featChip');
  if(featureMode){
    const label = featureMode==='hunt' ? 'BONUSHUNT' : 'RAINBOW SPINS';
    chip.innerHTML=`<span class="fc-dot"></span>${label} <b>· ${FEATURE_COST[featureMode]}× bet</b>`;
    chip.classList.add('show');
  } else chip.classList.remove('show');
  refreshBet();
}
async function purchaseBonus(b,price){
  if(spinning) return;
  if(balance<price){toast('Not enough balance.');return;}
  playSfx('click');
  setBalance(balance-price); settle(-price);
  closeBonusBuy();
  if(b.key==='luck'){ await runFreeSpins(1,8,'LUCK OF THE BANDIT','8 Free Spins · Golden Squares persist between spins'); }
  else if(b.key==='glit'){ await runFreeSpins(2,12,'ALL THAT GLITTERS IS GOLD','12 Free Spins · Golden Squares stay lit even after activating'); }
  maybeAuto();
}
function openBonusBuy(){if(spinning||fsMode)return;buildBonusBuy();$('bbOverlay').classList.add('show');playSfx('click');}

async function settle(delta){
  if(!delta) return;
  try{
    const r=await fetch('/api/sirbandit/settle',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({won:Math.round(delta*100)/100})});
    if(r.ok){const d=await r.json(); if(d&&d.newBal!=null) setBalance(d.newBal);}
  }catch(_){/* offline / demo: keep local balance */}
}

  fetch('/api/balance').then(r=>r.ok?r.json():null).then(d=>{if(d&&d.bal!=null)setBalance(d.bal);}).catch(()=>{});
}
window.addEventListener('message',ev=>{ if(!ev.data)return;
  if(ev.data.type==='fluxer:init'||ev.data.type==='fluxer:sync') setBalance(ev.data.balance??balance);});

/* =============================================================
   CONTROLS
   ============================================================= */
$('betDown').onclick=()=>{if(betIdx>0){betIdx--;refreshBet();playSfx('click');}};
$('betUp').onclick=()=>{if(betIdx<BET_STEPS.length-1){betIdx++;refreshBet();playSfx('click');}};
$('spinBtn').onclick=()=>doSpin();
$('buyBonusBtn').onclick=openBonusBuy;
$('bbClose').onclick=closeBonusBuy;
$('bbOverlay').onclick=e=>{if(e.target===$('bbOverlay'))closeBonusBuy();};
document.addEventListener('keydown',e=>{if(e.code==='Space'&&!spinning&&!$('bbOverlay').classList.contains('show')){e.preventDefault();doSpin();}});
$('autoBtn').onclick=()=>{autoMode=!autoMode;$('autoBtn').classList.toggle('on',autoMode);
  if(!autoMode&&autoTimer){clearTimeout(autoTimer);autoTimer=null;} else if(autoMode&&!spinning) doSpin();};

/* menu popover */
const menuPop=$('menuPop');
$('menuBtn').onclick=e=>{e.stopPropagation();const open=menuPop.classList.toggle('show');$('menuBtn').classList.toggle('on',open);playSfx('click');};
document.addEventListener('click',e=>{if(!menuPop.contains(e.target)&&e.target!==$('menuBtn')){menuPop.classList.remove('show');$('menuBtn').classList.remove('on');}});

$('musicRow').onclick=()=>{
  musicOn=!musicOn;
  $('musicRow').classList.toggle('on',musicOn);
  $('musicState').textContent=musicOn?'On':'Off';
  Music.setEnabled(musicOn);
};
$('sfxRow').onclick=()=>{sfxOn=!sfxOn;$('sfxRow').classList.toggle('on',sfxOn);$('sfxState').textContent=sfxOn?'On':'Off';if(sfxOn)playSfx('click');};
/* init menu states */
$('musicRow').classList.toggle('on',musicOn);$('musicState').textContent=musicOn?'On':'Off';
$('sfxRow').classList.toggle('on',sfxOn);$('sfxState').textContent=sfxOn?'On':'Off';

/* start audio on the very first user interaction (browser autoplay policy) */
function firstInteract(){ Music.start(); window.removeEventListener('pointerdown',firstInteract); window.removeEventListener('keydown',firstInteract); }
window.addEventListener('pointerdown',firstInteract);
window.addEventListener('keydown',firstInteract);

/* =============================================================
   INIT
   ============================================================= */
buildBoard();
refreshBet();
updateFeatureUI();
setBalance(balance);
fetchBalance();
try{const m=document.cookie.match(/(?:^|;\s*)dtag=([^;]*)/);if(m)$('tbTag').textContent=decodeURIComponent(m[1]);}catch(_){}
setInterval(()=>{if(!spinning)fetchBalance();},15000);
</script>
</body>
</html>
