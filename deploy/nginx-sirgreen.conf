# SirGreen — nginx reverse proxy in front of the Bun/Elysia web service.
# Terminates TLS, upgrades the realtime WebSocket, gzips, and lets nginx cache
# static assets so the app server only handles dynamic + WS traffic.
#
#   sudo ln -s .../deploy/nginx-sirgreen.conf /etc/nginx/sites-enabled/sirgreen
#   sudo certbot --nginx -d sirgreen.online        # TLS
#   sudo nginx -t && sudo systemctl reload nginx

upstream sirgreen_web { server 127.0.0.1:8080; keepalive 64; }

# connection-upgrade map (for the /ws WebSocket)
map $http_upgrade $connection_upgrade { default upgrade; "" close; }

server {
  listen 80;
  server_name sirgreen.online www.sirgreen.online;
  # certbot inserts the TLS listener + redirect here.

  # generous client limits but protect against abuse
  client_max_body_size 256k;
  gzip on; gzip_types text/css application/javascript image/svg+xml application/json; gzip_min_length 1024;

  # realtime WebSocket — long-lived, no buffering
  location /ws {
    proxy_pass http://sirgreen_web;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;       # keep sockets open
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }

  # cache static assets at the edge (app server barely touched)
  location /assets/ {
    proxy_pass http://sirgreen_web;
    proxy_cache_valid 200 1d;
    expires 1d; add_header Cache-Control "public";
  }

  location / {
    proxy_pass http://sirgreen_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }
}
