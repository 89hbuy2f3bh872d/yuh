# ─────────────────────────────────────────────────────────────────────────────
# SirGreen Casino — nginx reverse proxy with WebSocket support for the 3D Arena.
#
# The 3D Arena PvP runs over a WebSocket at  wss://<host>/arena/ws .
# A standard proxy_pass DROPS the HTTP "Upgrade" handshake, so the socket sits
# in "pending" forever. The two lines that fix it are:
#       proxy_set_header Upgrade    $http_upgrade;
#       proxy_set_header Connection $connection_upgrade;
#
# SETUP
#   1. Make sure the Node app listens on a LOCAL port (not 80/443 directly).
#      In your bot config set  webPort: 8080  (or whatever matches below).
#   2. Put your TLS cert paths in the ssl_certificate lines.
#   3. Copy this to /etc/nginx/sites-available/sirgreen, symlink into
#      sites-enabled, then:  sudo nginx -t && sudo systemctl reload nginx
#
# CLOUDFLARE NOTE: if the domain is proxied (orange cloud), WebSockets are ON by
# default — no action needed there. This proxy still needs the headers below.
# ─────────────────────────────────────────────────────────────────────────────

# Maps the Upgrade header to the correct Connection value (handles non-WS reqs too).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream sirgreen_app {
    server 127.0.0.1:8080;   # ← must match the Node app's webPort
    keepalive 32;
}

server {
    listen 80;
    server_name sirgreen.online www.sirgreen.online;
    return 301 https://$host$request_uri;   # force HTTPS
}

server {
    listen 443 ssl http2;
    server_name sirgreen.online www.sirgreen.online;

    ssl_certificate     /etc/letsencrypt/live/sirgreen.online/fullchain.pem;   # ← your cert
    ssl_certificate_key /etc/letsencrypt/live/sirgreen.online/privkey.pem;     # ← your key

    # Dedicated location for the realtime FPS socket (kept open + long timeouts).
    location /arena/ws {
        proxy_pass http://sirgreen_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # don't kill an idle-but-alive match socket
        proxy_send_timeout  3600s;
    }

    # Everything else (pages + JSON API). Upgrade headers are harmless here too.
    location / {
        proxy_pass http://sirgreen_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  120s;
    }
}
